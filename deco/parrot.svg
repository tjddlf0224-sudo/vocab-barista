    <linearGradient id="pr_w" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4fc3f7"/><stop offset="1" stop-color="#1f86c4"/></linearGradient>
  </defs>
  <!-- perch -->
