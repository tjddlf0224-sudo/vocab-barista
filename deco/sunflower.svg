      <use href="#p" transform="rotate(22)"/><use href="#p" transform="rotate(67)"/><use href="#p" transform="rotate(112)"/><use href="#p" transform="rotate(157)"/>
      <use href="#p" transform="rotate(202)"/><use href="#p" transform="rotate(247)"/><use href="#p" transform="rotate(292)"/><use href="#p" transform="rotate(337)"/>
    </g>
    <circle r="12" fill="url(#sf_ctr)" stroke="#2e1b0e" stroke-width="1.5"/>
    <circle r="12" fill="none" stroke="#000" stroke-width="0.5" stroke-dasharray="1 2" opacity="0.4"/>
  </g>
  <!-- pot -->
  <path d="M42 70 L78 70 L73 104 L47 104 Z" fill="url(#sf_pot)" stroke="#2c5685" stroke-width="2"/>
  <rect x="38" y="64" width="44" height="12" rx="4" fill="#8fc0ea" stroke="#2c5685" stroke-width="2"/>
  <ellipse cx="52" cy="86" rx="4" ry="10" fill="#fff" opacity="0.2"/>
