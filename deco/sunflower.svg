<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="sf_pot" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7fb3e0"/><stop offset="1" stop-color="#3f74ad"/></linearGradient>
    <radialGradient id="sf_pet" cx="0.5" cy="0.5" r="0.6"><stop offset="0" stop-color="#ffe17a"/><stop offset="1" stop-color="#f5a623"/></radialGradient>
    <radialGradient id="sf_ctr" cx="0.4" cy="0.4" r="0.7"><stop offset="0" stop-color="#7a4a24"/><stop offset="1" stop-color="#3e2412"/></radialGradient>
  </defs>
  <ellipse cx="60" cy="111" rx="32" ry="6" fill="#000" opacity="0.18"/>
  <path d="M58 70 q-6 -18 2 -34" fill="none" stroke="#3f8c34" stroke-width="4" stroke-linecap="round"/>
  <path d="M56 52 q-12 -3 -16 -12 q12 -2 16 6 z" fill="#4a9c3c" stroke="#2f6b27" stroke-width="1.5"/>
  <!-- flower -->
