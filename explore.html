// ---------- 타일맵 엔진 (넓은 맵 + 카메라 추종 + 조이스틱) ----------
const TILESET_SRC = 'assets/tiny-town/Tilemap/tilemap_packed.png';
const TT_COLS = 12, TT_SIZE = 16;   // 타일셋: 12열, 16px

const World = {
  cv:null, ctx:null, sheet:null, ready:false,
  TS:42, dpr:1, viewW:0, viewH:0,
  WT:48, HT:34,                     // 월드 크기(타일)
  base:[], deco:[], barrier:null, trees:[], nodes:[],
  // 플레이어(월드 픽셀 좌표 = 타일중심 단위)
  px:0, py:0, bob:0, facing:1,
  // 조이스틱
  stick:{active:false,id:null,cx:0,cy:0,dx:0,dy:0},
  raf:null,

  init(){
    this.cv=document.getElementById('map'); this.ctx=this.cv.getContext('2d');
    this.sheet=new Image();
    this.sheet.onload=()=>{ this.ready=true; };
    this.sheet.src=TILESET_SRC;
    this.generate();
    // 위치 복원
    const p=Explore.state.pos;
    const valid = p && !this.isBarrier(Math.round(p.x), Math.round(p.y));
    this.px = valid ? p.x : this.start.x;
    this.py = valid ? p.y : this.start.y;
    this._portalArmed = true;
    this.updateZoneName();
    this.resize();
    window.addEventListener('resize', ()=>applyOrientation());
    window.addEventListener('orientationchange', ()=>setTimeout(applyOrientation, 80));
    window.addEventListener('keydown', e=>this.onKey(e));
    window.addEventListener('keyup',   e=>this.onKeyUp(e));
    this.bindStick();
    this.initMinimap(); this.reveal();
    applyOrientation();
    if(this.raf) cancelAnimationFrame(this.raf);
    this.loop();
  },

  // 시드 RNG (안정적 맵)
  _seed:20240624, rnd(){ this._seed=(this._seed*1103515245+12345)&0x7fffffff; return this._seed/0x7fffffff; },

  generate(){
    // 존별 시드/분위기 — 같은 코드로 존마다 다른 레이아웃·나무색
    const zone = ZONES[Explore.state.map.zone] || ZONES.forest;
    this._seed = 20240624 + (Explore.state.map.zone==='deepwood' ? 91237 : 0);
    this._orangeRatio = zone.treeOrange || 0.3;
    this.barrier=new Set(); this.trees=[]; this.nodes=[]; this.base=[]; this.deco=[];
    for(let y=0;y<this.HT;y++){ this.base[y]=[]; this.deco[y]=[];
      for(let x=0;x<this.WT;x++){
        const r=this.rnd();
        this.base[y][x] = r<0.86?0 : (r<0.94?1:2);     // 풀 변형
        this.deco[y][x] = -1;
      }
    }
    const key=(x,y)=>x+','+y;
    // 테두리: 나무 벽
    for(let x=0;x<this.WT;x++){ this.addTree(x,0); this.addTree(x,1); this.addTree(x,this.HT-1); }
    for(let y=0;y<this.HT;y++){ this.addTree(0,y); this.addTree(this.WT-1,y); }
    // 나무 군집
    for(let i=0;i<70;i++){
      const cx=2+Math.floor(this.rnd()*(this.WT-4)), cy=3+Math.floor(this.rnd()*(this.HT-5));
      const n=1+Math.floor(this.rnd()*3);
      for(let j=0;j<n;j++){ const tx=cx+Math.floor(this.rnd()*3-1), ty=cy+Math.floor(this.rnd()*3-1);
        if(tx>1&&tx<this.WT-1&&ty>2&&ty<this.HT-1) this.addTree(tx,ty); }
    }
    // 풀 장식(걷기 가능)
    for(let i=0;i<60;i++){ const x=2+Math.floor(this.rnd()*(this.WT-4)), y=3+Math.floor(this.rnd()*(this.HT-5));
      if(!this.barrier.has(key(x,y))) this.deco[y][x]=[39,42,43][Math.floor(this.rnd()*3)]; }
    // 채집 노드
    const mats=GATHER_MATS;
    let placed=0, tries=0;
    while(placed<28 && tries<400){ tries++;
      const x=2+Math.floor(this.rnd()*(this.WT-4)), y=3+Math.floor(this.rnd()*(this.HT-5));
      if(this.barrier.has(key(x,y))) continue;
      if(this.nodes.some(n=>n.x===x&&n.y===y)) continue;
      const mat=mats[Math.floor(this.rnd()*mats.length)];
      this.nodes.push({x,y,mat,taken:false,reSteps:-1}); placed++;
    }
    // 시작/출구: 맵 하단 가장자리의 '마을로 가는 길' 게이트 — 위험지대 한가운데가 아니라 변두리에서 시작
    const gateX=Math.floor(this.WT/2);
    this.gate ={ x:gateX, y:this.HT-1 };   // 이 줄(하단 가장자리)을 밟으면 마을(카페)로
    this.start={ x:gateX, y:this.HT-7 };   // 입장/부활 시작점 — 팻말보다 위쪽(게이트와 거리 둬 즉시 재진입 방지)
    // 게이트~시작점 광장 비우기(나무/벽 제거)
    for(let yy=this.HT-8; yy<=this.HT-1; yy++)
      for(let dx=-2; dx<=2; dx++){ const xx=gateX+dx;
        if(xx<1||xx>=this.WT-1) continue;
        this.barrier.delete(key(xx,yy));
        this.trees=this.trees.filter(t=>!(t.x===xx&&t.y===yy)); }
    // 광장에 걸친 채집 노드는 제거(겹침 방지)
    this.nodes=this.nodes.filter(n=>!(Math.abs(n.x-gateX)<=2 && n.y>=this.HT-8));
    // 팻말 세우기(통과 불가) — 게이트 옆
    this.sign={ x:gateX-2, y:this.HT-4 };
    this.barrier.add(key(this.sign.x,this.sign.y));
    // 상단 가장자리: 이웃 존으로 가는 포털(이웃 존이 있을 때만)
    const neighbor = zone.next || zone.prev;
    if(neighbor){
      const portalX=Math.floor(this.WT/2);
      this.portal={ x:portalX, y:0 };          // 윗줄을 밟으면 이웃 존으로
      this.portalTarget=neighbor;
      for(let yy=0; yy<=4; yy++) for(let dx=-2; dx<=2; dx++){ const xx=portalX+dx;
        if(xx<1||xx>=this.WT-1) continue; this.barrier.delete(key(xx,yy));
        this.trees=this.trees.filter(t=>!(t.x===xx&&t.y===yy)); }
      this.nodes=this.nodes.filter(n=>!(Math.abs(n.x-portalX)<=2 && n.y<=4));
      this.portalSign={ x:portalX-2, y:3 };
      this.barrier.add(key(this.portalSign.x,this.portalSign.y));
    } else { this.portal=null; this.portalSign=null; }
    // ----- 퀘스트 NPC 배치(걷기 가능 지점, 주변 정리) -----
    this.npcs=[];
    const clearAround=(x,y,r)=>{ for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){ const xx=x+dx,yy=y+dy;
      if(xx<1||xx>=this.WT-1||yy<2||yy>=this.HT-1)continue; this.barrier.delete(key(xx,yy)); this.trees=this.trees.filter(t=>!(t.x===xx&&t.y===yy)); }
      this.nodes=this.nodes.filter(n=>!(Math.abs(n.x-x)<=r&&Math.abs(n.y-y)<=r)); };
    this.secret=null; this.forge=null;
    if(Explore.state.map.zone==='forest'){
      const spots=[ {x:Math.floor(this.WT*0.26), y:Math.floor(this.HT*0.34)},
                    {x:Math.floor(this.WT*0.72), y:Math.floor(this.HT*0.30)},
                    {x:Math.floor(this.WT*0.52), y:Math.floor(this.HT*0.60)} ];
      QUEST_NPCS.forEach((q,i)=>{ const sp=spots[i%spots.length]; clearAround(sp.x,sp.y,1);
        this.barrier.add(key(sp.x,sp.y)); this.npcs.push({ id:q.id, x:sp.x, y:sp.y }); });
      // ----- 대장간(장비 제작소): 시작 지역이라 초반부터 접근 가능. 건물에 와야만 제작 -----
      const fx=Math.floor(this.WT*0.40), fy=Math.floor(this.HT*0.44);
      // 건물(3타일 빌보드, 발끝접지)이 나무와 겹치지 않게 발자국 영역을 비대칭으로 정리(가로±2, 위2~아래3)
      for(let dy=-2; dy<=3; dy++) for(let dx=-2; dx<=2; dx++){
        const xx=fx+dx, yy=fy+dy; if(xx<1||xx>=this.WT-1||yy<2||yy>=this.HT-1) continue;
        this.barrier.delete(key(xx,yy));
        this.trees=this.trees.filter(t=>!(t.x===xx&&t.y===yy));
        this.nodes=this.nodes.filter(n=>!(n.x===xx&&n.y===yy));
      }
      this.barrier.add(key(fx,fy)); this.forge={ x:fx, y:fy };
    }
    if(Explore.state.map.zone==='deepwood'){
      // ----- 숨겨진 어둠의 상인(좌상단 비밀 공간, 진입로만 살짝 트여있음) — 깊은 숲에만 -----
      const sx=3, sy=3; clearAround(sx,sy,1);
      for(let yy=sy+2; yy<=Math.floor(this.HT*0.40); yy++){ this.barrier.delete(key(sx,yy)); this.trees=this.trees.filter(t=>!(t.x===sx&&t.y===yy)); } // 진입로
      this.barrier.add(key(sx,sy)); this.secret={ x:sx, y:sy };
    }
    // 나무는 정적이므로 y정렬을 1회만(렌더 루프의 매 프레임 sort 제거 — 저사양 GC/CPU 절감)
    this.trees.sort((a,b)=>a.y-b.y);
    this.buildExplored();
  },
  addTree(x,y){ const k=x+','+y; if(this.barrier.has(k))return; this.barrier.add(k);
    this.trees.push({x,y,type:this.rnd()<(1-(this._orangeRatio||0.3))?'green':'orange'}); },

  isBarrier(tx,ty){ if(tx<0||ty<0||tx>=this.WT||ty>=this.HT) return true; return this.barrier.has(tx+','+ty); },

  resize(){
    // 회전(세로기기) 상태면 가로로 돌린 영역 크기 사용
    const portrait = document.body.classList.contains('rot');
    const w = portrait ? window.innerHeight : window.innerWidth;
    const h = portrait ? window.innerWidth : window.innerHeight;
    this.dpr=Math.min(window.devicePixelRatio||1,2);
    this.cv.width=Math.floor(w*this.dpr); this.cv.height=Math.floor(h*this.dpr);
    this.cv.style.width=w+'px'; this.cv.style.height=h+'px';
    this.viewW=w; this.viewH=h;
    this.TS=Math.max(34, Math.round(Math.min(w/14, h/8)));   // 화면에 ~14x8 타일
  },

  // ----- 입력: 키보드 -----
  keys:{},
  onKey(e){ if(this.overlayOpen()) return; const m={ArrowUp:'u',ArrowDown:'d',ArrowLeft:'l',ArrowRight:'r',w:'u',s:'d',a:'l',d:'r'}; if(m[e.key]){this.keys[m[e.key]]=1;e.preventDefault();} if(e.key===' '||e.key==='Enter'){this.interact();e.preventDefault();} },
  onKeyUp(e){ const m={ArrowUp:'u',ArrowDown:'d',ArrowLeft:'l',ArrowRight:'r',w:'u',s:'d',a:'l',d:'r'}; if(m[e.key])this.keys[m[e.key]]=0; },

  // ----- 입력: 조이스틱 -----
  bindStick(){
    const zone=document.getElementById('stick-zone');
    const base=document.getElementById('stick-base'), knob=document.getElementById('stick-knob');
    const R=52;
    // 중앙 보정 31px(=(베이스118-노브56)/2). 떼면 정확히 중앙으로 복귀
    const setKnob=(dx,dy)=>{ knob.style.transform=`translate(${31+dx}px, ${-31+dy}px)`; };
    const reset=()=>{ this.stick.active=false; this.stick.dx=0; this.stick.dy=0; setKnob(0,0); };
    zone.addEventListener('pointerdown', e=>{ e.preventDefault();
      const b=base.getBoundingClientRect(); this.stick.active=true; this.stick.id=e.pointerId;
      this.stick.cx=b.left+b.width/2; this.stick.cy=b.top+b.height/2; move(e); zone.setPointerCapture(e.pointerId); });
    zone.addEventListener('pointermove', e=>{ if(this.stick.active&&e.pointerId===this.stick.id) move(e); });
    zone.addEventListener('pointerup',   e=>{ if(e.pointerId===this.stick.id) reset(); });
    zone.addEventListener('pointercancel', reset);
    const self=this;
    function move(e){ let dx=e.clientX-self.stick.cx, dy=e.clientY-self.stick.cy;
      // 콘텐츠가 90° 회전된 상태면 화면 델타를 게임 좌표로 역회전(화면→로컬)
      if(document.body.classList.contains('rot')){ const t=dx; dx=dy; dy=-t; }
      const d=Math.hypot(dx,dy)||1; if(d>R){ dx=dx/d*R; dy=dy/d*R; }
      self.stick.dx=dx/R; self.stick.dy=dy/R; setKnob(dx,dy); }
    reset();
  },

  interact(e){ if(e&&e.preventDefault)e.preventDefault(); if(window.Battle&&Battle.active) return;
    const ptx=Math.round(this.px), pty=Math.round(this.py);
    // 1) 퀘스트 NPC 우선  (Quest/DarkDuel은 최상위 const라 window에 안 붙음 → bare 참조로 호출)
    const npc=(this.npcs||[]).find(n=>Math.abs(n.x-ptx)+Math.abs(n.y-pty)<=1);
    if(npc){ if(typeof Quest!=='undefined') Quest.talk(npc.id); return; }
    // 2) 숨겨진 어둠의 상인
    if(this.secret && (Explore.state.events||{}).darkMerchant!=='gone' && Math.abs(this.secret.x-ptx)+Math.abs(this.secret.y-pty)<=1){
      if(typeof DarkDuel!=='undefined') DarkDuel.meet(); return; }
    // 2.5) 대장간(장비 제작소) — 건물에 와야만 제작 가능
    if(this.forge && Math.abs(this.forge.x-ptx)+Math.abs(this.forge.y-pty)<=1){ this.openForge(); return; }
    // 3) 채집
    let best=null,bd=99;
    for(const n of this.nodes){ if(n.taken)continue; const d=Math.abs(n.x-ptx)+Math.abs(n.y-pty);
      if(d<=1 && d<bd){bd=d;best=n;} }
    if(best) this.collect(best); else this.toast(`주변에 채집할 재료가 없어요 ${UI_ICON.leaf}`);
  },

  collect(n){
    const mat=MATERIALS[n.mat];
    Explore.state.materials[n.mat]=(Explore.state.materials[n.mat]||0)+1;
    n.taken=true; n.reSteps=(Explore.state.steps||0)+40;
    Sfx.play('gather'); exHaptic('light');
    Explore.refreshHUD(); Explore.persist(); this.updateActionBtn();
    const w=this.pickWord();
    this.toast(`<img class="mi" src="${mat.img}" alt=""> <b>${mat.name}</b> +1<br><span class="en">${w.w}</span> · <span class="ko">${w.m}</span>`);
  },
  pickWord(){
    const due=(Explore.cafe.myWords||[]).filter(v=>(v.due||0)<=(Explore.cafe.turnCount||0));
    if(due.length) return due[Math.floor(this.rnd()*due.length)]; // 매번 첫 단어만 나오던 문제 수정
    const pool=window.wordData?[].concat(wordData.easy,wordData.normal,wordData.hard):[];
    return pool.length?pool[Math.floor(this.rnd()*pool.length)]:{w:'coffee',m:'커피'};
  },
  toast(html){ const el=document.getElementById('toast'); el.innerHTML=html; el.classList.add('show');
    clearTimeout(this._tt); this._tt=setTimeout(()=>el.classList.remove('show'),1600); },

  // ----- 이동/업데이트 -----
  // 오버레이(스탯/조합/스펠/동행/전투)가 떠 있으면 이동·인카운터 정지
  overlayOpen(){ return !!(document.querySelector('.ex-overlay.show') || (window.Battle&&Battle.active)); },
  update(f){
    f = f || 1;   // 프레임 배율(delta-time). 미지정 시 60fps 가정
    if(this.overlayOpen()){ this.moving=false; return; }
    let vx=this.stick.dx, vy=this.stick.dy;
    if(this.keys.l)vx-=1; if(this.keys.r)vx+=1; if(this.keys.u)vy-=1; if(this.keys.d)vy+=1;
    const mag=Math.hypot(vx,vy);
    this.moving = mag>0.18;   // 데드존 ↑(살짝 기울임은 무시)
    if(this.moving){
      this.walkT=(this.walkT||0)+0.28*f;   // 보행 위상(팔다리 스윙)
      vx/=Math.max(1,mag); vy/=Math.max(1,mag);
      if(Math.abs(vx)>0.2) this.facing=vx<0?-1:1;
      const SPD=0.058*f;   // 이동 속도(delta-time 반영 — fps 무관 일정)
      const nx=this.px+vx*SPD, ny=this.py+vy*SPD;
      // 충돌: 발 위치 타일 검사
      if(!this.isBarrier(Math.round(nx), Math.round(this.py))) this.px=nx;
      if(!this.isBarrier(Math.round(this.px), Math.round(ny))) this.py=ny;
      this.onMove();
      // 하단 게이트(마을로 가는 길)에 닿으면 카페로 복귀
      if(this.gate && Math.round(this.py)>=this.gate.y && Math.abs(Math.round(this.px)-this.gate.x)<=2)
        this.leaveToVillage();
      // 상단 포털(이웃 존) — 재진입 스팸 방지를 위해 포털을 벗어났다 들어올 때만 발동
      if(this.portal){
        const atPortal = Math.round(this.py)<=this.portal.y && Math.abs(Math.round(this.px)-this.portal.x)<=2;
        if(atPortal && this._portalArmed!==false){ this._portalArmed=false; this.tryZonePortal(); }
        else if(!atPortal && Math.round(this.py) > this.portal.y+3) this._portalArmed=true;
      }
    }
  },
  // 마을(카페)로 복귀 — 다음 입장 때는 팻말 위쪽(start)에서 시작해야 한다.
  // 게이트를 밟은 자리 그대로 복원되면, 조금만 움직여도 다시 게이트에 닿아 마을로 튕긴다.
  leaveToVillage(){ if(this._leaving)return; this._leaving=true; this.moving=false;
    this.toast(`${UI_ICON.village} 마을로 돌아갑니다…`);
    // 게이트 좌표가 아니라 '팻말 위쪽 시작점'을 저장. (_leaving 동안 pagehide가 덮어쓰지 못하게 막아둠)
    Explore.state.pos = this.start ? { x:this.start.x, y:this.start.y } : null;
    try{ Explore.persist(); }catch(e){}
    setTimeout(()=>{ try{ Explore.exitToCafe(); }catch(e){ location.href='index.html'; } }, 450); },
  // 상단 포털: 이웃 존으로 이동(앞으로 갈 땐 레벨 잠금, 되돌아가는 건 자유)
  tryZonePortal(){
    const cur=ZONES[Explore.state.map.zone]||ZONES.forest;
    const targetId=this.portalTarget; const target=ZONES[targetId];
    if(!target) return;
    if(cur.next===targetId && (Explore.state.level||1) < target.minLv){
      this.toast(`${UI_ICON.lock} ${target.name} — Lv ${target.minLv} 이상부터 입장`);
      this.py=Math.min(this.HT-2, this.py+1.5); // 살짝 되튕김
      return;
    }
    this.travelZone(targetId);
  },
  travelZone(zoneId){
    Explore.state.map.zone=zoneId;
    this.generate();
    this.px=this.start.x; this.py=this.start.y; // 도착은 해당 존 하단 시작점
    Explore.state.pos={x:this.px,y:this.py};
    this._portalArmed=true; this.updateZoneName(); this.updateActionBtn(); this.reveal(); this.drawMinimap(); Explore.persist();
    const z=ZONES[zoneId]; this.toast(`${z.name}에 도착했어요!`);
  },
  updateZoneName(){ const z=ZONES[Explore.state.map.zone]||ZONES.forest; const el=document.getElementById('zone-name'); if(el) el.textContent=z.name; const ic=document.getElementById('zone-ic'); if(ic) ic.innerHTML=z.icon||''; },
  _accum:0, _saveT:0,
  onMove(){
    this._accum += 0.085;
    if(this._accum>=1){ this._accum=0; Explore.state.steps=(Explore.state.steps||0)+1;
      // 채집 노드 재생
      for(const n of this.nodes){ if(n.taken && Explore.state.steps>=n.reSteps){ n.taken=false; } }
      // 랜덤 인카운터 (전투 다음 Stage서 구도 재설계)
      if(window.Battle) Battle.maybeEncounter();
    }
    this.updateActionBtn(); // 채집 버튼 강조 갱신
    this.reveal();          // 안개 걷힘(미니맵)
    // 이미 탐색한 지역이라 reveal이 미니맵을 다시 안 그려도, 플레이어 타일이 바뀌면 마커 갱신(실시간 추적)
    const _ptx=Math.round(this.px), _pty=Math.round(this.py);
    if(_ptx!==this._miniPx || _pty!==this._miniPy){ this._miniPx=_ptx; this._miniPy=_pty; this._miniDirty=true; }
    // 주기적 위치 저장
    if((++this._saveT)%30===0){ Explore.state.pos={x:this.px,y:this.py}; this.serializeExplored(); Explore.persist(); }
  },
  // 채집 사거리(맨해튼 1칸) 안에 캘 노드가 있으면 버튼을 초록으로 강조
  updateActionBtn(){ const b=document.getElementById('act-btn'); if(!b)return;
    const ptx=Math.round(this.px), pty=Math.round(this.py);
    const battle=(window.Battle&&Battle.active);
    const npc = !battle && (this.npcs||[]).some(n=>Math.abs(n.x-ptx)+Math.abs(n.y-pty)<=1);
    const secret = !battle && this.secret && (Explore.state.events||{}).darkMerchant!=='gone' && Math.abs(this.secret.x-ptx)+Math.abs(this.secret.y-pty)<=1;
    const forge = !battle && this.forge && Math.abs(this.forge.x-ptx)+Math.abs(this.forge.y-pty)<=1;
    const talk = !!(npc||secret||forge);
    const near = !battle && !talk && this.nodes.some(n=>!n.taken && (Math.abs(n.x-ptx)+Math.abs(n.y-pty))<=1);
    b.classList.toggle('ready', near); b.classList.toggle('talk', talk);
    const tx=b.querySelector('.ab-tx'); if(tx) tx.textContent = forge ? '대장간' : talk ? '대화' : '채집'; },
  release(){ this.stick.active=false; this.stick.dx=0; this.stick.dy=0; this.keys={}; },

  // ----- 렌더 -----
  loop(ts){ this.raf=requestAnimationFrame(t=>this.loop(t));
    // [이동감] delta-time 기반 — 프레임레이트가 흔들려도(네이티브 WKWebView) 이동/애니 속도 일정
    const now = ts || (window.performance && performance.now ? performance.now() : 0);
    let dt = this._lastTs ? (now - this._lastTs)/1000 : 1/60;
    this._lastTs = now;
    if(dt > 0.05) dt = 0.05;   // 백그라운드 복귀 등 큰 점프 방지
    const f = dt * 60;          // 60fps 기준 프레임 배율(1.0=60fps, 2.0=30fps)
    this.update(f); this.bob += 0.1*f; this.render(); if(this._miniDirty) this.drawMinimap(); },
  // ===== 미니맵(안개 걷힘) + 지도 완성 =====
  initMinimap(){ const cv=document.getElementById('minimap'); if(!cv)return; cv.width=this.WT; cv.height=this.HT; this._mmctx=cv.getContext('2d'); this._miniDirty=true; },
  buildExplored(){ const zone=Explore.state.map.zone; const saved=(Explore.state.explored||{})[zone];
    this.explored=[]; this.exploredCount=0;
    for(let y=0;y<this.HT;y++){ this.explored[y]=new Uint8Array(this.WT);
      if(saved&&saved[y]){ const row=saved[y]; for(let x=0;x<this.WT && x<row.length;x++){ if(row[x]==='1'){ this.explored[y][x]=1; this.exploredCount++; } } } }
    this._miniDirty=true; },
  reveal(){ if(!this.explored)return; const px=Math.round(this.px), py=Math.round(this.py); const R=3.4, R2=R*R; let added=0;
    const x0=Math.max(0,Math.floor(px-R)), x1=Math.min(this.WT-1,Math.ceil(px+R));
    const y0=Math.max(0,Math.floor(py-R)), y1=Math.min(this.HT-1,Math.ceil(py+R));
    for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){ const dx=x-px,dy=y-py; if(dx*dx+dy*dy<=R2 && !this.explored[y][x]){ this.explored[y][x]=1; this.exploredCount++; added++; } }
    if(added){ this._miniDirty=true; this.checkMapComplete(); } },
  checkMapComplete(){ const zone=Explore.state.map.zone; if((Explore.state.maps||{})[zone]) return;
    if(this.exploredCount/(this.WT*this.HT) < 0.90) return;
    if(!Explore.state.maps)Explore.state.maps={}; Explore.state.maps[zone]=true;
    if(!Explore.state.items)Explore.state.items=[]; if(!Explore.state.items.includes('map_'+zone)) Explore.state.items.push('map_'+zone);
    this.serializeExplored(); Explore.persist();
    const zn=(ZONES[zone]||{}).name||'지도';
    this.toast(`${UI_ICON.map} <b>${zn} 지도 완성!</b><br><span class="ko">아이템에 지도가 추가됐어요</span>`);
    if(window.Sfx)Sfx.play('levelup'); if(window.exHaptic)exHaptic('success'); },
  _mmColor(x,y){ return this.barrier.has(x+','+y) ? '#4a6b3a' : '#84bd63'; },
  drawMinimap(){ const ctx=this._mmctx; if(!ctx||!this.explored)return; const WT=this.WT,HT=this.HT;
    ctx.fillStyle='#10121a'; ctx.fillRect(0,0,WT,HT);
    for(let y=0;y<HT;y++)for(let x=0;x<WT;x++){ if(!this.explored[y][x])continue; ctx.fillStyle=this._mmColor(x,y); ctx.fillRect(x,y,1,1); }
    const dot=(x,y,c)=>{ if(x<0||y<0||x>=WT||y>=HT||!this.explored[y][x])return; ctx.fillStyle=c; ctx.fillRect(x,y,1,1); };
    const seen=(x,y)=>x>=0&&y>=0&&x<WT&&y<HT&&this.explored[y][x];
    // 마커 블록 — check=true면 미탐험 타일엔 안 그린다(안개 규칙 유지)
    const blk=(x,y,c,r,check)=>{ if(check && !seen(x,y))return; ctx.fillStyle=c; for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){ const xx=x+dx,yy=y+dy; if(xx>=0&&yy>=0&&xx<WT&&yy<HT) ctx.fillRect(xx,yy,1,1); } };
    // 게이트·포털 — 어두운 테두리 + 밝은 코어로 눈에 띄게(1px dot → 5x5 블록)
    if(this.gate){ blk(this.gate.x,HT-1,'#2a1f06',2,true); blk(this.gate.x,HT-1,'#ffcf4d',1,true); }
    if(this.portal){ blk(this.portal.x,0,'#180a2a',2,true); blk(this.portal.x,0,'#c88bff',1,true); }
    // 재료 노드 — 어두운 3x3 테두리 + 밝은 코어(1px → 3x3, 여러 개라 과하지 않게)
    for(const n of (this.nodes||[])) if(!n.taken){ blk(n.x,n.y,'#403008',1,true); dot(n.x,n.y,'#ffe066'); }
    // 어둠의 상인은 미니맵에 표시하지 않음(진짜 숨겨진 이벤트) — 직접 발견해야 함
    if(this.forge && seen(this.forge.x,this.forge.y)){ blk(this.forge.x,this.forge.y,'#3a2410',3); blk(this.forge.x,this.forge.y,'#ffb03a',2); } // 대장간은 유용한 랜드마크라 표시
    // 퀘스트 NPC — 발견 시 크고 선명하게(어두운 테두리+빨강 코어)
    for(const np of (this.npcs||[])){ if(!seen(np.x,np.y))continue; blk(np.x,np.y,'#20060a',3); blk(np.x,np.y,'#ff4d4d',2); }
    // 내 캐릭터 — 항상 가장 눈에 띄게(어두운 테두리 + 밝은 청록 코어)
    const px=Math.round(this.px), py=Math.round(this.py);
    blk(px,py,'#00131c',3); blk(px,py,'#39e6ff',2);
    this._miniDirty=false;
    const badge=document.getElementById('mm-badge'); if(badge){ const done=(Explore.state.maps||{})[Explore.state.map.zone];
      badge.textContent = done?'완성':(Math.round(this.exploredCount/(WT*HT)*100)+'%'); badge.classList.toggle('done', !!done); } },
  serializeExplored(){ if(!this.explored)return; const zone=Explore.state.map.zone; if(!Explore.state.explored)Explore.state.explored={};
    const rows=[]; for(let y=0;y<this.HT;y++){ let s=''; for(let x=0;x<this.WT;x++) s+=this.explored[y][x]?'1':'0'; rows.push(s); }
    Explore.state.explored[zone]=rows; },
  openMap(){ this.drawFullMap(); document.getElementById('map-view').classList.add('show'); },
  closeMap(){ document.getElementById('map-view').classList.remove('show'); },
  drawFullMap(){ const cv=document.getElementById('mapview-canvas'); if(!cv)return;
    const S=Math.max(4, Math.floor(Math.min(360/this.WT, 300/this.HT))); cv.width=this.WT*S; cv.height=this.HT*S;
    const ctx=cv.getContext('2d'); ctx.imageSmoothingEnabled=false;
    ctx.fillStyle='#10121a'; ctx.fillRect(0,0,cv.width,cv.height);
    for(let y=0;y<this.HT;y++)for(let x=0;x<this.WT;x++){ if(!this.explored||!this.explored[y][x])continue; ctx.fillStyle=this._mmColor(x,y); ctx.fillRect(x*S,y*S,S,S); }
    const mark=(x,y,c,big)=>{ if(!this.explored||!this.explored[y]||!this.explored[y][x])return; ctx.fillStyle=c; const b=big?Math.round(S*1.8):S; ctx.fillRect(Math.round(x*S-(b-S)/2),Math.round(y*S-(b-S)/2),b,b); };
    if(this.gate) mark(this.gate.x,this.HT-1,'#ffcf4d',true);
    if(this.portal) mark(this.portal.x,0,'#b46bff',true);
    for(const n of (this.nodes||[])) if(!n.taken) mark(n.x,n.y,'#ffe066');
    for(const np of (this.npcs||[])) mark(np.x,np.y,'#ff6b6b',true);
    // 어둠의 상인은 전체지도에도 표시 안 함(숨겨진 이벤트). 대장간은 랜드마크라 표시.
    if(this.forge) mark(this.forge.x,this.forge.y,'#ffb03a',true);
    const px=Math.round(this.px),py=Math.round(this.py); ctx.fillStyle='#fff'; ctx.fillRect(px*S-1,py*S-1,S+2,S+2);
    const t=document.getElementById('mapview-title'); if(t){ const zn=(ZONES[Explore.state.map.zone]||{}).name||''; const done=(Explore.state.maps||{})[Explore.state.map.zone];
      t.innerHTML = zn+' 지도 '+(done?`<span class="mv-done">완성 ${UI_ICON.map}</span>`:'· '+Math.round(this.exploredCount/(this.WT*this.HT)*100)+'%'); } },
  drawTile(idx,dx,dy,size){ if(idx<0)return; const sx=(idx%TT_COLS)*TT_SIZE, sy=Math.floor(idx/TT_COLS)*TT_SIZE;
    this.ctx.drawImage(this.sheet,sx,sy,TT_SIZE,TT_SIZE,dx,dy,size,size); },

  render(){
    const ctx=this.ctx, TS=this.TS, dpr=this.dpr; if(!TS) return;
    ctx.setTransform(dpr,0,0,dpr,0,0); ctx.imageSmoothingEnabled=true;
    ctx.fillStyle='#8fc36a'; ctx.fillRect(0,0,this.viewW,this.viewH);   // 잔디빛 폴백
    // 카메라(월드픽셀=타일*TS), 플레이어 화면중앙 고정 + 월드 경계 클램프
    const halfW=this.viewW/2, halfH=this.viewH/2;
    let camX=this.px*TS - halfW + TS/2, camY=this.py*TS - halfH + TS/2;
    camX=Math.max(0,Math.min(camX, this.WT*TS - this.viewW));
    camY=Math.max(0,Math.min(camY, this.HT*TS - this.viewH));
    const x0=Math.max(0,Math.floor(camX/TS)-1), x1=Math.min(this.WT-1,Math.ceil((camX+this.viewW)/TS)+1);
    const y0=Math.max(0,Math.floor(camY/TS)-1), y1=Math.min(this.HT-1,Math.ceil((camY+this.viewH)/TS)+2);
    // ----- 바닥: 페인티드 잔디 반복 타일 -----
    const GR=Math.round(TS*5);
    const gcv=grassCanvas(GR);
    if(gcv){ const ox=((camX%GR)+GR)%GR, oy=((camY%GR)+GR)%GR;
      for(let yy=-oy; yy<this.viewH; yy+=GR) for(let xx=-ox; xx<this.viewW; xx+=GR) ctx.drawImage(gcv, Math.round(xx), Math.round(yy)); }
    // ----- 바닥 장식(풀다발/꽃) -----
    for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){ if(this.deco[y][x]<0) continue;
      const dimg=(this.deco[y][x]===42)?MAP_OBJ.flowers:MAP_OBJ.grass_tuft;
      if(dimg&&dimg.complete&&dimg.naturalWidth){ const cx=x*TS-camX+TS/2, cy=y*TS-camY+TS/2;
        const w=TS*1.15, h=w*(dimg.naturalHeight/dimg.naturalWidth);
        ctx.drawImage(dimg, cx-w/2, cy-h*0.6, w, h); } }
    // ----- 채집 노드(빛나는 링 + 아트) -----
    for(const n of this.nodes){ if(n.taken)continue; if(n.x<x0||n.x>x1||n.y<y0||n.y>y1)continue;
      const dx=Math.round(n.x*TS-camX), dy=Math.round(n.y*TS-camY);
      ctx.save(); ctx.globalAlpha=0.35+0.25*Math.sin(this.bob*2); ctx.fillStyle='#fff59d';
      ctx.beginPath(); ctx.ellipse(dx+TS/2,dy+TS*0.82,TS*0.42,TS*0.2,0,0,7); ctx.fill(); ctx.restore();
      const artKey=NODE_ART[n.mat]; const pimg=artKey?MAP_OBJ[artKey]:null;
      if(pimg&&pimg.complete&&pimg.naturalWidth){ const h=TS*1.3, w=h*(pimg.naturalWidth/pimg.naturalHeight);
        ctx.drawImage(pimg, dx+TS/2-w/2, dy+TS*0.92-h, w, h); }
      else { const mimg=MATERIALS[n.mat].img; if(Assets.ready(mimg)){ const s=TS*0.92; ctx.drawImage(Assets.imgs[mimg], dx+(TS-s)/2, dy+(TS-s)/2, s, s); } } }
    // ----- 나무(페인티드, y정렬, 발끝 접지) -----
    const vis=this.trees.filter(t=>t.x>=x0-2&&t.x<=x1+2&&t.y>=y0-3&&t.y<=y1+2); // 이미 y정렬됨
    for(const t of vis){ const timg=(t.type==='green')?MAP_OBJ.tree_green:MAP_OBJ.tree_orange;
      if(!(timg&&timg.complete&&timg.naturalWidth)) continue;
      const gx=Math.round(t.x*TS-camX)+TS/2, gy=Math.round(t.y*TS-camY)+TS;
      const h=TS*2.9, w=h*(timg.naturalWidth/timg.naturalHeight);
      ctx.drawImage(timg, gx-w/2, gy-h, w, h); }
    // ----- 퀘스트 NPC + 상태 마커(❗진행가능 / …진행중 / ✔완료) -----
    for(const np of (this.npcs||[])){ if(np.x<x0-1||np.x>x1+1||np.y<y0-2||np.y>y1+1) continue;
      const def=QUEST_NPCS.find(q=>q.id===np.id)||{};
      let img=Assets.imgs[def.img]; if(!(img&&img.complete&&img.naturalWidth)) img=Assets.imgs[def.portrait]; // 치비 스프라이트 없으면 대화용 전신으로 임시
      const gx=Math.round(np.x*TS-camX)+TS/2, gy=Math.round(np.y*TS-camY)+TS*1.04;
      if(!(img&&img.complete&&img.naturalWidth)) continue;
      const h=TS*1.7, w=h*(img.naturalWidth/img.naturalHeight);
      ctx.fillStyle='rgba(0,0,0,.18)'; ctx.beginPath(); ctx.ellipse(gx,gy,w*0.30,TS*0.11,0,0,7); ctx.fill();
      ctx.drawImage(img, gx-w/2, gy-h, w, h);
      const bob=Math.sin(this.bob*1.5)*TS*0.06;
      // 이름표(머리 위)
      const nameBottom=gy-h-TS*0.05+bob;
      this.drawNameTag(gx, nameBottom, def.name||'', '#ffe9c8');
      // 상태 마커(이름표 위): ❗진행가능 / …진행중 / ✔완료
      const st=(Explore.state.quests||{})[np.id]; const mk= st==='done'?'✔': st==='active'?'…':'!';
      const col= st==='done'?'#7CFC98': st==='active'?'#ffd54f':'#ff5d5d';
      const my=nameBottom-TS*0.86;
      ctx.font='bold '+Math.round(TS*0.6)+'px "Jua",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.lineWidth=Math.max(3,TS*0.06); ctx.strokeStyle='rgba(0,0,0,.55)'; ctx.strokeText(mk,gx,my);
      ctx.fillStyle=col; ctx.fillText(mk,gx,my); }
    // ----- 숨겨진 어둠의 상인: 가까이(3칸 이내) 왔을 때만 희미하게 — 진짜 '숨겨진' 느낌 -----
    if(this.secret && !((Explore.state.events||{}).darkMerchant==='gone')){
      const s=this.secret, sdist=Math.abs(s.x-Math.round(this.px))+Math.abs(s.y-Math.round(this.py));
      if(sdist<=3 && !(s.x<x0-1||s.x>x1+1||s.y<y0-1||s.y>y1+1)){
        const dx=Math.round(s.x*TS-camX)+TS/2, dy=Math.round(s.y*TS-camY)+TS*0.5, pulse=0.5+0.5*Math.sin(this.bob*2);
        const near = sdist<=1 ? 1 : (sdist<=2 ? 0.62 : 0.3);   // 가까울수록 또렷
        ctx.save(); ctx.globalAlpha=(0.2+0.35*pulse)*near; ctx.fillStyle='#7a4fd0';
        ctx.beginPath(); ctx.ellipse(dx,dy+TS*0.32,TS*0.4,TS*0.18,0,0,7); ctx.fill();
        ctx.globalAlpha=0.8*near; ctx.fillStyle='#caa6ff'; ctx.font='bold '+Math.round(TS*0.72)+'px serif';
        ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('✦', dx, dy - TS*0.1 + Math.sin(this.bob*2)*TS*0.08);
        ctx.restore();
      }
    }
    // ----- 대장간(장비 제작소) 건물: 빌보드, 바닥에 딱 붙게(그림자 없이, 발끝을 바닥선에 살짝 묻어 접지) -----
    if(this.forge && !(this.forge.x<x0-2||this.forge.x>x1+2||this.forge.y<y0-4||this.forge.y>y1+2)){
      const f=this.forge, fimg=MAP_OBJ.forge;
      const gx=Math.round(f.x*TS-camX)+TS/2, gy=Math.round(f.y*TS-camY)+TS+Math.round(TS*0.18); // 발끝을 타일바닥보다 살짝 아래로 묻어 '떠보임' 제거
      let topY=gy-TS*2.1; // 라벨 기본 위치(로드 전 대비)
      if(fimg&&fimg.complete&&fimg.naturalWidth){
        const h=TS*3.0, w=h*(fimg.naturalWidth/fimg.naturalHeight);
        ctx.drawImage(fimg, gx-w/2, gy-h, w, h);
        topY=gy-h*0.74; // 지붕 위(연기 아래) 정도
      } else { // 로드 전 폴백: 모루 이모지
        ctx.font=Math.round(TS*1.2)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
        ctx.fillText('⚒️', gx, gy-TS*0.4);
      }
      this.drawNameTag(gx, topY, '대장간', '#ffd9a0');
    }
    // 팻말(마을로 가는 길)
    if(this.sign && this.sign.x>=x0-1 && this.sign.x<=x1+1 && this.sign.y>=y0-1 && this.sign.y<=y1+2){
      this.drawSign(Math.round(this.sign.x*TS-camX), Math.round(this.sign.y*TS-camY), TS); }
    // 포털 팻말(이웃 존)
    if(this.portalSign && this.portalSign.x>=x0-1 && this.portalSign.x<=x1+1 && this.portalSign.y>=y0-2 && this.portalSign.y<=y1+1){
      const tgt=ZONES[this.portalTarget]||{}, cur=ZONES[Explore.state.map.zone]||{};
      const locked = cur.next===this.portalTarget && (Explore.state.level||1) < (tgt.minLv||1);
      // drawSign이 이모지를 제거하므로(폭 측정 오차) 잠김 표시는 🔒 대신 글자로 남긴다
      const label = locked ? `${tgt.name||''} Lv${tgt.minLv} 필요` : `${tgt.name||''} →`;
      this.drawSign(Math.round(this.portalSign.x*TS-camX), Math.round(this.portalSign.y*TS-camY), TS, label, '▲'); }
    // 존 분위기 틴트(밤 등) — 플레이어 직전에 깔아 캐릭터는 또렷하게
    const zt=(ZONES[Explore.state.map.zone]||{}).tint;
    if(zt){ ctx.fillStyle=zt; ctx.fillRect(0,0,this.viewW,this.viewH); }
    // 플레이어(중앙) — 현재 이모지(채용 캐릭터는 다음 Stage)
    const pcx=Math.round(this.px*TS-camX), pcy=Math.round(this.py*TS-camY);
    const ckey=Explore.state.companion||'none'; const pal=CHIBI[ckey]||CHIBI.none;
    this.drawChibi(pcx+TS/2, pcy+TS*1.02, pal, TS*0.95, this.walkT||0, !!this.moving, this.facing, ckey);
  },

  // 걷는 치비 캐릭터 — [에셋] 걷기 스프라이트 4프레임(로드되면), 아니면 절차적 폴백
  drawChibi(cx, footY, pal, s, wp, moving, facing, ckey){
    const ctx=this.ctx;
    // ===== 스프라이트 경로 =====
    const name = (!ckey || ckey==='none') ? ((localStorage.getItem('vb_gender')==='f')?'baristaf':'chef') : ckey;
    const frames = WALK_FRAMES[name];
    if(frames && frames[0] && frames[0].complete && frames[0].naturalWidth>0){
      const idx = moving ? (((Math.floor(wp/(Math.PI/2))%4)+4)%4) : 0;
      const img = (frames[idx] && frames[idx].complete && frames[idx].naturalWidth) ? frames[idx] : frames[0];
      const bob = moving ? Math.abs(Math.sin(wp))*s*0.06 : Math.sin(this.bob)*s*0.03;
      const h = s*1.55, w = h*(img.naturalWidth/img.naturalHeight);
      // 접지 그림자(맵에선 은은히 — 캐릭터가 떠 보이지 않게)
      ctx.fillStyle='rgba(0,0,0,.20)'; ctx.beginPath(); ctx.ellipse(cx, footY, w*0.32, s*0.10, 0,0,7); ctx.fill();
      ctx.save(); ctx.translate(cx, footY-bob); if(facing<0) ctx.scale(-1,1);
      ctx.imageSmoothingEnabled=true;
      ctx.drawImage(img, -w/2, -h, w, h);
      ctx.restore();
      return;
    }
    // ===== 절차적 폴백(스프라이트 로드 전) =====
    const rr=(x,y,w,h,r,col)=>{ ctx.fillStyle=col; ctx.beginPath();
      ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); ctx.fill(); };
    const skin=pal.skin, hair=pal.hair, shirt=pal.shirt, legs=pal.legs||'#4e342e';
    const lphase = moving ? Math.sin(wp) : 0;
    const bounce = moving ? Math.abs(Math.sin(wp))*s*0.08 : Math.sin(this.bob)*s*0.02;
    const fy = footY - bounce;
    // 그림자
    ctx.fillStyle='rgba(0,0,0,.22)'; ctx.beginPath(); ctx.ellipse(cx, footY, s*0.4, s*0.14, 0,0,7); ctx.fill();
    // 다리
    const legW=s*0.2, legH=s*0.3, legGap=s*0.13, legTopY=fy-legH;
    const llLift=Math.max(0,lphase)*s*0.13, rlLift=Math.max(0,-lphase)*s*0.13;
    rr(cx-legGap-legW/2, legTopY-llLift, legW, legH, legW*0.45, legs);
    rr(cx+legGap-legW/2, legTopY-rlLift, legW, legH, legW*0.45, legs);
    // 몸통
    const bodyW=s*0.6, bodyH=s*0.46, bodyY=legTopY-bodyH+s*0.04;
    rr(cx-bodyW/2, bodyY, bodyW, bodyH, s*0.18, shirt);
    if(pal.apron){ rr(cx-bodyW*0.3, bodyY+bodyH*0.16, bodyW*0.6, bodyH*0.9, s*0.1, '#efe2c4');
      ctx.fillStyle='#cfa84a'; ctx.beginPath(); ctx.arc(cx+bodyW*0.16, bodyY+bodyH*0.5, s*0.04,0,7); ctx.fill(); }
    // 긴 머리(뒤)
    const headR=s*0.42, headY=bodyY-headR*0.6;
    if(pal.longhair){ rr(cx-headR*0.92, headY-headR*0.1, headR*0.5, headR*1.7, headR*0.22, hair); rr(cx+headR*0.42, headY-headR*0.1, headR*0.5, headR*1.7, headR*0.22, hair); }
    // 팔(다리와 반대 위상)
    const armW=s*0.15, armH=s*0.32, armSwing=moving? lphase*s*0.1 : 0;
    rr(cx-bodyW/2-armW*0.45, bodyY+s*0.04 + armSwing, armW, armH, armW*0.5, skin);
    rr(cx+bodyW/2-armW*0.55, bodyY+s*0.04 - armSwing, armW, armH, armW*0.5, skin);
    // 머리
    ctx.fillStyle=skin; ctx.beginPath(); ctx.arc(cx, headY, headR,0,7); ctx.fill();
    // 머리카락(윗부분)
    ctx.fillStyle=hair; ctx.beginPath();
    ctx.arc(cx, headY, headR*1.01, Math.PI*0.98, Math.PI*2.02, false);
    ctx.quadraticCurveTo(cx+headR*0.5, headY+headR*0.28, cx, headY+headR*0.12);
    ctx.quadraticCurveTo(cx-headR*0.5, headY+headR*0.28, cx-headR*1.01, headY+headR*0.05);
    ctx.closePath(); ctx.fill();
    // 마녀모자(루나)
    if(pal.hat){ ctx.fillStyle='#4a2d6e';
      ctx.beginPath(); ctx.ellipse(cx, headY-headR*0.5, headR*1.05, headR*0.28,0,0,7); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx-headR*0.65, headY-headR*0.5); ctx.lineTo(cx+headR*0.18, headY-headR*1.85); ctx.lineTo(cx+headR*0.62, headY-headR*0.5); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#ffd54f'; ctx.beginPath(); ctx.arc(cx, headY-headR*0.5, headR*0.13,0,7); ctx.fill(); }
    // 바리스타 모자(기본)
    if(pal.toque){ ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.ellipse(cx, headY-headR*0.45, headR*0.62, headR*0.26,0,0,7); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx, headY-headR*0.72, headR*0.5, headR*0.38,0,0,7); ctx.fill(); }
    // 얼굴
    const fx=facing*headR*0.07;
    ctx.fillStyle='#3a2a1e';
    ctx.beginPath(); ctx.arc(cx-headR*0.26+fx, headY+headR*0.15, headR*0.085,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+headR*0.26+fx, headY+headR*0.15, headR*0.085,0,7); ctx.fill();
    ctx.fillStyle='rgba(255,150,150,.5)';
    ctx.beginPath(); ctx.arc(cx-headR*0.4+fx, headY+headR*0.3, headR*0.1,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+headR*0.4+fx, headY+headR*0.3, headR*0.1,0,7); ctx.fill();
    ctx.strokeStyle='#3a2a1e'; ctx.lineWidth=s*0.022; ctx.beginPath(); ctx.arc(cx+fx, headY+headR*0.26, headR*0.12, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
  },

  // 오브젝트 위 이름표(둥근 다크 pill + 텍스트) — bottomY가 pill 하단
  drawNameTag(cx, bottomY, text, accent){
    const ctx=this.ctx, TS=this.TS;
    ctx.save();
    const fs=Math.max(11, Math.round(TS*0.34));
    ctx.font='bold '+fs+'px "Jua","Nunito",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const tw=ctx.measureText(text).width, padX=Math.round(TS*0.18), padY=Math.round(TS*0.11);
    const bw=tw+padX*2, bh=fs+padY*2, bx=Math.round(cx-bw/2), by=Math.round(bottomY-bh), r=bh/2;
    ctx.fillStyle='rgba(28,18,10,0.74)';
    ctx.beginPath();
    ctx.moveTo(bx+r,by); ctx.arcTo(bx+bw,by,bx+bw,by+bh,r); ctx.arcTo(bx+bw,by+bh,bx,by+bh,r);
    ctx.arcTo(bx,by+bh,bx,by,r); ctx.arcTo(bx,by,bx+bw,by,r); ctx.closePath(); ctx.fill();
    ctx.fillStyle=accent||'#fff3e0'; ctx.fillText(text, cx, by+bh/2+0.5);
    ctx.restore();
  },

  // 팻말: "마을로 가는 길" 표지판 (게이트 옆)
  drawSign(dx, dy, TS, label, arrow){
    label = label || '마을로 가는 길'; arrow = arrow || '▼';
    const ctx=this.ctx; ctx.save();
    const cx=dx+TS/2;
    // 기둥
    ctx.fillStyle='#6b4423';
    ctx.fillRect(cx-TS*0.07, dy+TS*0.30, TS*0.14, TS*0.78);
    // 판자
    const bw=TS*2.45, bh=TS*0.62, bx=cx-bw/2, by=dy+TS*0.02, r=TS*0.12;
    ctx.fillStyle='#b07a40'; ctx.strokeStyle='#5e3a1c'; ctx.lineWidth=Math.max(2,TS*0.05);
    ctx.beginPath();
    ctx.moveTo(bx+r,by); ctx.arcTo(bx+bw,by,bx+bw,by+bh,r); ctx.arcTo(bx+bw,by+bh,bx,by+bh,r);
    ctx.arcTo(bx,by+bh,bx,by,r); ctx.arcTo(bx,by,bx+bw,by,r); ctx.closePath();
    ctx.fill(); ctx.stroke();
    // 나뭇결 라인
    ctx.strokeStyle='rgba(94,58,28,.35)'; ctx.lineWidth=Math.max(1,TS*0.02);
    ctx.beginPath(); ctx.moveTo(bx+r, by+bh*0.32); ctx.lineTo(bx+bw-r, by+bh*0.32);
    ctx.moveTo(bx+r, by+bh*0.68); ctx.lineTo(bx+bw-r, by+bh*0.68); ctx.stroke();
    // 글자 — 판자 폭에 맞춰 자동 축소(넘침 방지)
    // ⚠️ 이모지는 measureText가 실제 렌더 폭보다 작게 재서 축소 계산이 어긋난다(판자 밖으로 삐져나옴).
    //    캔버스 팻말에선 이모지를 빼고 글자만 그린다(→ 화살표는 유지). 대장간 이름표와 같은 처리.
    const clean = String(label).replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE0F}\u{200D}]/gu, '').replace(/\s+/g, ' ').trim();
    const maxW = (bw - r*2 - TS*0.08) * 0.96;   // 측정 오차 대비 4% 여유
    let fs = TS*0.27; ctx.font='bold '+Math.round(fs)+'px "Jua","Nunito",sans-serif';
    let guard = 0;
    while(ctx.measureText(clean).width > maxW && fs > TS*0.10 && guard++ < 200){
        fs -= TS*0.01; ctx.font='bold '+Math.round(fs)+'px "Jua","Nunito",sans-serif';
    }
    ctx.fillStyle='#fff3df'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(clean, cx, by+bh*0.5);
    // 방향 화살표
    ctx.fillStyle='#ffd54f'; ctx.font='bold '+Math.round(TS*0.42)+'px sans-serif';
    ctx.fillText(arrow, cx, arrow==='▲'? dy-TS*0.18 : dy+TS*1.0);
    ctx.restore();
  },

  // 동행 순환 선택
  updateCompChip(){
    const c=COMPANIONS[Explore.state.companion||'none'];
    const lb=document.querySelector('#comp-chip .cc-lb');
    if(lb) lb.textContent='동행'+(c.img? ' '+c.name : '');
  },
  // ----- 동행 선택 화면 -----
  openCompanionSelect(){ this.renderCompCards(); document.getElementById('comp-select').classList.add('show'); },
  closeCompanionSelect(){ document.getElementById('comp-select').classList.remove('show'); },
  renderCompCards(){
    const grid=document.getElementById('cs-grid'); grid.innerHTML='';
    const cur=Explore.state.companion||'none';
    COMP_ORDER.forEach(key=>{
      const c=COMPANIONS[key]; const recruited=Explore.isRecruited(key);
      const sk=(typeof SKILLS!=='undefined'&&SKILLS[key])||null;
      // 기본(동행 없음)은 플레이어 성별에 맞는 바리스타 얼굴로 — 이모지 대신
      const gImg = (key==='none')
        ? ((localStorage.getItem('vb_gender')==='f') ? 'chars/barista_f.png' : 'chars/barista_m.png')
        : c.img;
      const art = gImg ? `<img src="${gImg}" alt="${c.name}">` : UI_ICON.unknown;
      const skIcon = sk ? (UI_ICON[SKILL_ICON[key]] || '') : '';
      let html='';
      if(recruited){
        html = `<div class="cs-art">${art}</div><div class="cs-name">${c.name}</div>`
             + `<div class="cs-skill">${sk? skIcon+' '+sk.name : ''}</div>`;
        if(key===cur) html += `<div class="cs-selbadge">선택중</div>`;
      } else {
        // 잠금 오버레이가 설명을 다 하므로 뒤에 '???' 이름표를 또 두지 않는다(반투명 뒤로 비쳐 지저분)
        html = `<div class="cs-art">${UI_ICON.unknown}</div><div class="cs-name">&nbsp;</div><div class="cs-skill"></div>`
             + `<div class="cs-lockov"><span class="lk">${UI_ICON.lock}</span>카페에서 ${c.name}<br>호감도 MAX 달성 시 해제</div>`;
      }
      const card=document.createElement('div');
      card.className='cs-card'+(key===cur&&recruited?' selected':'')+(recruited?'':' locked');
      card.innerHTML=html;
      if(recruited) card.onclick=()=>World.selectCompanion(key);
      grid.appendChild(card);
    });
  },
  selectCompanion(key){ if(!Explore.isRecruited(key)) return;
    Explore.state.companion=key; Explore.persist(); this.updateCompChip();
    if(window.Battle && Battle.setSelfSprite) Battle.setSelfSprite();
    this.closeCompanionSelect();
  },
  // ----- 스탯(보기 전용) -----
  openStats(){ this.renderStats(); document.getElementById('stats-screen').classList.add('show'); },
  closeStats(){ document.getElementById('stats-screen').classList.remove('show'); },
  // ----- 대장간(장비 제작/장착) — 맵의 대장간 건물에서만 열림 -----
  openForge(){ this.renderForge(); document.getElementById('forge-screen').classList.add('show'); ExploreBgm.play('craft'); },
  closeForge(){ document.getElementById('forge-screen').classList.remove('show'); ExploreBgm.play('map'); },
  costText(cost){ if(!cost)return''; const p=[]; if(cost.gold)p.push(UI_ICON.coin+cost.gold);
    for(const k in cost){ if(k==='gold')continue; p.push((MAT_ICON[k]||k)+cost[k]); } return p.join('  '); },
  canAfford(cost){ if(!cost)return true; if((cost.gold||0)>Explore.cafe.wallet)return false;
    for(const k in cost){ if(k==='gold')continue; if((cost[k]||0)>(Explore.state.materials[k]||0))return false; } return true; },
  forgeItem(slot,id){ const it=(EQUIP_DB[slot]||[]).find(x=>x.id===id); if(!it||!this.canAfford(it.cost))return;
    Explore.cafe.wallet-=(it.cost.gold||0);
    for(const k in it.cost){ if(k==='gold')continue; Explore.state.materials[k]=(Explore.state.materials[k]||0)-it.cost[k]; }
    if(!Explore.state.items)Explore.state.items=[]; Explore.state.items.push(id);
    Explore.state.equip[slot]=id;  // 제작 즉시 장착
    Explore.persist(); Explore.refreshHUD(); this.renderForge(); },
  equipItem(slot,id){ Explore.state.equip[slot]=id; Explore.persist(); Explore.refreshHUD(); this.renderForge(); },
  // ----- 조합소 -----
  openCraft(){ this.renderCraft(); document.getElementById('craft-screen').classList.add('show'); ExploreBgm.play('craft'); },
  closeCraft(){ document.getElementById('craft-screen').classList.remove('show'); ExploreBgm.play('map'); },
  renderCraft(){ this.renderMats(); const owned=Explore.cafe.craftedItems||{}; let h='<div class="eq-grid">';
    CRAFT_DB.forEach(r=>{ const can=this.canAfford(r.cost); const have=owned[r.id]||0;
      h+=`<div class="eq-card"><span class="eq-ic">${craftIcon(r)}</span><div class="eq-info">`
        +`<div class="nm">${r.name}${have?` <small style="color:#7a5a2a">보유 x${have}</small>`:''}</div>`
        +`<div class="bn">${r.edesc}</div><div class="ct">${this.costDetail(r.cost)}</div></div>`
        +`<button class="eq-btn buy" ${can?'':'disabled'} onclick="World.startCraft('${r.id}')">조합</button></div>`; });
    document.getElementById('craft-body').innerHTML=h+'</div>'; },
  // 보유 재료 스트립(전체 재료 + 개수, 0개는 흐리게, 황금원두는 금테)
  renderMats(){ const m=Explore.state.materials||{}; const el=document.getElementById('craft-mats'); if(!el)return;
    el.innerHTML=Object.entries(MATERIALS).map(([k,mat])=>{ const c=m[k]||0;
      return `<div class="cm-chip${c?'':' zero'}${mat.rare?' rare':''}"><img class="cm-ic" src="${mat.img}" onerror="this.replaceWith(document.createTextNode('${mat.icon}'))"><span class="cm-nm">${mat.name}</span><span class="cm-ct">${c}</span></div>`; }).join(''); },
  // 레시피 비용: 재료별 보유/필요를 색으로(충분=초록, 부족=빨강)
  costDetail(cost){ if(!cost)return''; const parts=[];
    if(cost.gold) parts.push(`${UI_ICON.coin}${cost.gold}`);
    for(const k in cost){ if(k==='gold')continue; const have=Explore.state.materials[k]||0; const need=cost[k]; const ok=have>=need;
      parts.push(`<span style="color:${ok?'#2e7d32':'#c62828'};font-weight:bold;">${MAT_ICON[k]||k}${have}/${need}</span>`); }
    return parts.join('  '); },
  startCraft(id){ const r=CRAFT_DB.find(x=>x.id===id); if(!r||!this.canAfford(r.cost)) return; SpellQuiz.open(r); },
  completeCraft(r){ for(const k in r.cost){ Explore.state.materials[k]=(Explore.state.materials[k]||0)-r.cost[k]; }
    if(!Explore.cafe.craftedItems) Explore.cafe.craftedItems={};
    Explore.cafe.craftedItems[r.id]=(Explore.cafe.craftedItems[r.id]||0)+1;
    Explore.persist(); Explore.refreshHUD(); this.renderCraft();
    this.toast(`${craftIcon(r,'cr-ic sm')} <b>${r.name}</b> 조합 성공! 가방에 보관`); },
  renderStats(){
    const s=Explore.state; const eff=Explore.effStats(); const b=eff.bonus;
    const need=expNeed(s.level); const expPct=Math.min(100,(s.exp/need)*100);
    const pass=COMP_PASSIVE[s.companion||'none'];
    const plus=v=> v>0?` <small>(+${v})</small>`:'';
    // 장착 장비는 '그 장비의 실제 이미지'로 보여준다(이모지 X)
    const eqName=slot=>{
      const id=s.equip&&s.equip[slot]; if(!id)return'없음';
      const it=(EQUIP_DB[slot]||[]).find(x=>x.id===id); if(!it)return'없음';
      return `<img class="st-eqimg" src="sprites/eq_${it.id}.png" alt="" onerror="this.remove()">${it.name}`;
    };
    let h='';
    h+=`<div class="st-row"><div class="st-chip">${UI_ICON.level} Lv ${s.level}</div>`
      +`<div class="st-chip">${UI_ICON.hp} ${eff.maxHp}${plus(b.maxHp)}</div>`
      +`<div class="st-chip">${UI_ICON.atk} ${eff.atk}${plus(b.atk)}</div>`
      +`<div class="st-chip">${UI_ICON.def} ${eff.def}${plus(b.def)}</div></div>`;
    h+=`<div class="st-exp"><div style="width:${expPct}%"></div></div><div class="st-expt">EXP ${s.exp} / ${need}</div>`;
    h+=`<div class="st-pass">${UI_ICON.pass} 동행 패시브: ${pass?pass.label:'없음'}</div>`;
    h+=`<div class="st-pass">${UI_ICON.weapon} 무기: ${eqName('weapon')}　${UI_ICON.armor} 방어구: ${eqName('armor')}</div>`;
    h+=`<div style="font-size:.78rem;color:#b8a888;margin-top:8px;">${UI_ICON.forge} 장비 제작·교체는 <b style="color:#ffd54f">원두 숲의 대장간</b>에서 할 수 있어요.</div>`;
    document.getElementById('stats-body').innerHTML=h;
  },
  // 대장간 화면: 무기·방어구 제작/장착
  renderForge(){
    const s=Explore.state; const owned=s.items||[];
    const forge=(slot,list)=>{ let g='<div class="eq-grid">';
      list.forEach(it=>{ const isEq=s.equip[slot]===it.id; const isOwned=owned.includes(it.id);
        const bn=(it.atk?`${UI_ICON.atk}+${it.atk} `:'')+(it.def?`${UI_ICON.def}+${it.def} `:'')+(it.hp?`${UI_ICON.hp}+${it.hp}`:'');
        let btn;
        if(isEq) btn='<button class="eq-btn on" disabled>장착중</button>';
        else if(isOwned) btn=`<button class="eq-btn equip" onclick="World.equipItem('${slot}','${it.id}')">장착</button>`;
        else btn=`<button class="eq-btn buy" ${this.canAfford(it.cost)?'':'disabled'} onclick="World.forgeItem('${slot}','${it.id}')">제작</button>`;
        const icon = `<img src="sprites/eq_${it.id}.png" alt="" onerror="this.onerror=null;this.outerHTML=(window.EQUIP_ICON&&EQUIP_ICON['${it.id}'])||'${it.icon}'">`;
        g+=`<div class="eq-card${isEq?' equipped':''}"><span class="eq-ic">${icon}</span><div class="eq-info"><div class="nm">${it.name}</div><div class="bn">${bn}</div>${isOwned?'':`<div class="ct">${this.costText(it.cost)}</div>`}</div>${btn}</div>`;
      }); return g+'</div>'; };
    let h=`<div class="st-sec">${UI_ICON.weapon} 무기</div>`+forge('weapon',EQUIP_DB.weapon);
    h+=`<div class="st-sec">${UI_ICON.armor} 방어구</div>`+forge('armor',EQUIP_DB.armor);
    document.getElementById('forge-body').innerHTML=h;
  },
};

  // 몬스터를 플레이어 레벨에 맞춰 스케일(정체성=스탯비율 유지) — 신규 즉사·고렙 무의미화 방지
  scaleMonster(base, opts){
    opts = opts || {};
    const plv = Explore.state.level || 1;
    const z = (typeof ZONES!=='undefined') ? ZONES[Explore.state.map.zone] : null;
    const zoneMin = (z && z.minLv) || 1;        // 존 최소 레벨대

const Quest = {
  cur:null, curStage:null,
  _n(id){ return (Explore.state.questN&&Explore.state.questN[id])||0; },
  _info(req){ if(req.type==='item'){ const c=CRAFT_DB.find(x=>x.id===req.key)||{}; return {icon:(c.id?craftIcon(c,'cr-ic sm'):''), name:c.name||req.key}; }
    const m=MATERIALS[req.key]||{}; return {icon:MAT_ICON[req.key]||'', name:m.name||req.key}; },
  _have(req){ if(req.type==='item') return (Explore.cafe.craftedItems||{})[req.key]||0;
    return (Explore.state.materials||{})[req.key]||0; },
  _met(need){ return need.every(req=>this._have(req)>=req.count); },
  _progress(need){ return need.map(req=>{ const i=this._info(req), h=this._have(req), ok=h>=req.count;
    return `<span style="color:${ok?'#4CAF50':'#c9871f'}">${i.icon} ${h} / ${req.count}</span>`; }).join('   '); },
  _stage(def,n){ if(n < def.stages.length) return def.stages[n];
    const e=def.endless, rep=n-def.stages.length, c=e.base+e.step*rep;
    return { ask:e.ask.replace('{c}', c), need:[{type:'mat',key:e.key,count:c}],
      reward:{gold:e.reward.goldBase+e.reward.goldStep*rep, exp:e.reward.exp},
      done:'또 도와줬구나, 정말 고마워! 다음에 또 부탁해도 되지?' }; },
  talk(id){ const def=QUEST_NPCS.find(q=>q.id===id); if(!def)return; this.cur=def;
    if(!Explore.state.quests) Explore.state.quests={}; if(!Explore.state.questN) Explore.state.questN={};
    // 구버전 세이브 마이그레이션: 'done'=1단계 완료로 환산
    if(Explore.state.quests[id]==='done' && Explore.state.questN[id]==null){ Explore.state.questN[id]=1; delete Explore.state.quests[id]; }
    const n=this._n(id), stage=this._stage(def,n), active=Explore.state.quests[id]==='active';
    this.curStage=stage;
    document.getElementById('q-portrait').src=def.portrait||def.img;
    document.getElementById('q-name').textContent=def.name;
    const tx=document.getElementById('q-text'), ac=document.getElementById('q-actions');
    if(active){
      if(this._met(stage.need)){ tx.innerHTML=`부탁한 걸 다 모아왔구나!<br>${this._progress(stage.need)}<br>건네줄까?`;
        ac.innerHTML=`<button class="q-btn ok" onclick="Quest.turnIn()">완료 · 전달</button><button class="q-btn ghost" onclick="Quest.close()">닫기</button>`; }
      else { tx.innerHTML=`${stage.ask}<br><br>진행: ${this._progress(stage.need)}`;
        ac.innerHTML=`<button class="q-btn ghost" onclick="Quest.close()">더 모아올게요</button>`; } }
    else { tx.innerHTML=(n>0?`<span style="color:#9ac47a">${UI_ICON.check} 지난 부탁 고마웠어! 하나 더 부탁해도 될까?</span><br><br>`:'')+stage.ask;
      ac.innerHTML=`<button class="q-btn ok" onclick="Quest.accept()">수락</button><button class="q-btn ghost" onclick="Quest.close()">다음에</button>`; }
    document.getElementById('quest-dlg').classList.add('show');
  },
  accept(){ if(!this.cur)return; if(!Explore.state.quests)Explore.state.quests={};
    Explore.state.quests[this.cur.id]='active'; Explore.persist();
    if(window.Sfx)Sfx.play('correct'); this.talk(this.cur.id); },
  turnIn(){ const def=this.cur, stage=this.curStage; if(!def||!stage)return;
    if(!this._met(stage.need)){ this.talk(def.id); return; }
    // 요구 재료/조합아이템 차감
    stage.need.forEach(req=>{ if(req.type==='item'){ const ci=Explore.cafe.craftedItems||{}; ci[req.key]=(ci[req.key]||0)-req.count; if(ci[req.key]<=0)delete ci[req.key]; Explore.cafe.craftedItems=ci; }
      else { Explore.state.materials[req.key]=(Explore.state.materials[req.key]||0)-req.count; } });
    if(!Explore.state.questN)Explore.state.questN={}; Explore.state.questN[def.id]=this._n(def.id)+1;
    delete Explore.state.quests[def.id];  // 완료 → 다음 단계 수락 대기(available)
    const rwtxt=Explore.grantReward(stage.reward);
    if(window.Sfx)Sfx.play('levelup'); if(window.exHaptic)exHaptic('success');
    document.getElementById('q-text').innerHTML=`${stage.done}<br><span class="lvlup">${rwtxt}</span>`;
    document.getElementById('q-actions').innerHTML=`<button class="q-btn ok" onclick="Quest.close()">좋아!</button>`;
    if(window.World)World.updateActionBtn();
  },
  close(){ document.getElementById('quest-dlg').classList.remove('show'); this.cur=null; this.curStage=null; if(window.World)World.updateActionBtn(); },
};

const DarkDuel = {
  q:0, score:0, total:5, rounds:[], answered:false,
  _rand(){ return window.World?World.rnd():Math.random(); },
  pool(){ let p=[]; if(window.wordData) p=[].concat(wordData.easy||[],wordData.normal||[],wordData.hard||[]);
    p=p.filter(w=>w&&w.w&&w.m);
    if(p.length<8) p=[{w:'coffee',m:'커피'},{w:'water',m:'물'},{w:'book',m:'책'},{w:'friend',m:'친구'},{w:'light',m:'빛'},{w:'music',m:'음악'},{w:'river',m:'강'},{w:'stone',m:'돌'}];
    return p; },
  _shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(this._rand()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; },
  buildRounds(){ const p=this._shuffle(this.pool().slice()); this.rounds=[];
    for(let i=0;i<this.total && i<p.length;i++){ const ans=p[i]; const opts=[ans.m]; let g=0;
      while(opts.length<4 && g<300){ g++; const c=p[Math.floor(this._rand()*p.length)]; if(c.m!==ans.m && !opts.includes(c.m)) opts.push(c.m); }
      this._shuffle(opts); this.rounds.push({ w:ans.w, m:ans.m, opts }); } },
  meet(){ document.getElementById('dm-portrait').src=DARK_MERCHANT.portrait||DARK_MERCHANT.img; this.buildRounds(); this.q=0; this.score=0;

  intro(){ document.getElementById('dm-body').innerHTML=
    `<div class="dm-say">"흐흐… 영어 실력을 시험해볼까?<br>${this.total}문제 중 <b>4개 이상</b> 맞히면 큰 보상을 주지.<br>도전하겠나?"</div>
     <div class="dm-acts"><button class="q-btn ok" onclick="DarkDuel.begin()">${UI_ICON.atk} 대결한다</button><button class="q-btn ghost" onclick="DarkDuel.close()">도망친다</button></div>`; },
  begin(){ this.q=0; this.score=0; this.render(); },
  render(){ const body=document.getElementById('dm-body'); if(this.q>=this.rounds.length) return this.finish();
    const r=this.rounds[this.q]; this.answered=false;

  pick(btn,idx){ if(this.answered)return; this.answered=true; const r=this.rounds[this.q]; const ok=r.opts[idx]===r.m;

    if(ok){ this.score++; if(window.Sfx)Sfx.play('correct'); } else { btn.classList.add('wrong'); if(window.Sfx)Sfx.play('wrong'); if(window.exHaptic)exHaptic('heavy'); }

    document.getElementById('spell-screen').classList.add('show'); },
  pickWord(){ const tc=Explore.cafe.turnCount||0;
    const due=(Explore.cafe.myWords||[]).filter(v=>v.w && /^[a-zA-Z]+$/.test(v.w) && v.w.length>=3 && v.w.length<=9 && (v.due||0)<=tc);
    if(due.length){ const w=due[Math.floor(Math.random()*due.length)]; return {...w,_review:true}; }
    const pool=window.wordData ? [].concat(wordData.easy,wordData.normal,wordData.hard).filter(o=>/^[a-zA-Z]+$/.test(o.w)&&o.w.length>=3&&o.w.length<=8) : [];
    const o=pool.length?pool[Math.floor(Math.random()*pool.length)]:{w:'coffee',m:'커피'}; return {...o,_review:false}; },
  build(){ const letters=this.word.split('');
    for(let i=letters.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [letters[i],letters[j]]=[letters[j],letters[i]]; }
    // 섞은 결과가 정답과 같으면 한 번 더
    if(letters.join('')===this.word && this.word.length>1){ [letters[0],letters[1]]=[letters[1],letters[0]]; }
    this.tiles=letters.map(ch=>({ch,used:false})); this.slots=this.word.split('').map(()=>null); },
  render(){
    const ts=document.getElementById('sp-tiles'); ts.innerHTML='';
    this.tiles.forEach((t,i)=>{ const b=document.createElement('button'); b.className='sp-tile'+(t.used?' used':''); b.textContent=t.ch.toUpperCase(); b.onclick=()=>this.place(i); ts.appendChild(b); });
    const ss=document.getElementById('sp-slots'); ss.innerHTML='';
    this.slots.forEach((ti,i)=>{ const d=document.createElement('div'); d.className='sp-slot'+(ti!==null?' filled':''); d.textContent=ti!==null?this.tiles[ti].ch.toUpperCase():''; if(ti!==null) d.onclick=()=>this.unset(i); ss.appendChild(d); }); },
  place(i){ if(this.tiles[i].used) return; const e=this.slots.indexOf(null); if(e<0) return; this.slots[e]=i; this.tiles[i].used=true; this.render(); },
  unset(i){ const ti=this.slots[i]; if(ti===null) return; this.tiles[ti].used=false; this.slots[i]=null; this.render(); },
  clear(){ this.tiles.forEach(t=>t.used=false); this.slots=this.slots.map(()=>null); this.render(); this.msg('',''); },
  msg(t,k){ const m=document.getElementById('sp-msg'); m.innerHTML=t; m.className='sp-msg'+(k?' '+k:''); },
  submit(){ if(this.slots.includes(null)){ this.msg('빈 칸을 모두 채워줘!','no'); return; }
    const ans=this.slots.map(ti=>this.tiles[ti].ch).join('');
    if(ans===this.word) this.onSuccess(); else this.onWrong(); },
  onWrong(){ Sfx.play('wrong'); exHaptic('heavy'); this.msg(`철자가 틀렸어! 다시 (${this.word.length}글자)`,'no');
    const p=document.getElementById('sp-panel'); p.classList.remove('shake'); void p.offsetWidth; p.classList.add('shake'); },
  onSuccess(){ Sfx.play('correct'); exHaptic('success'); this.msg(`${UI_ICON.check} ${this.word.toUpperCase()} — 정답!`,'ok');
    if(this.isReview) Explore.srsCorrect(this.word);
    World.completeCraft(this.recipe);
    setTimeout(()=>this.close(), 850); },
  cancel(){ this.close(); },
  close(){ document.getElementById('spell-screen').classList.remove('show'); },
};
window.SpellQuiz=SpellQuiz;
window.Battle=Battle; window.World=World; window.Explore=Explore;

// 마을로 나가는 중(leaveToVillage)이면 위치를 덮어쓰지 않는다 — 게이트 좌표가 저장되면
// 다음 입장 때 게이트 위에서 시작해 조금만 움직여도 다시 마을로 튕긴다.
window.addEventListener('pagehide', ()=>{ try{ if(World._leaving) return; Explore.state.pos={x:World.px,y:World.py}; Explore.persist(); }catch(e){} });
window.addEventListener('DOMContentLoaded', ()=>{ Explore.init(); ExploreBgm.init(); });
</script>
