<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Vocab Barista — 탐험</title>
<link rel="stylesheet" href="fonts.css">
<style>
  :root{ --gold:#ffb300; --brown:#5d4037; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body{ margin:0; padding:0; height:100%; overflow:hidden; }
  body{ font-family:'Jua','Nunito',system-ui,sans-serif; background:#1c2f1e; color:#fff8e1;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  #rotator{ position:fixed; top:0; left:0; width:100%; height:100%; }
  #game{ position:fixed; inset:0; }
  #map{ position:absolute; inset:0; width:100%; height:100%; display:block; image-rendering:pixelated; touch-action:none; }

  /* 상단 HUD */
  .topbar{ position:absolute; top:0; left:0; right:0; display:flex; align-items:center; gap:8px;
    padding:8px 12px; z-index:5; pointer-events:none; }
  .topbar > *{ pointer-events:auto; }
  .back-btn{ background:linear-gradient(180deg,#8d6e63,#5d4037); color:#fff8e1; border:none;
    border-radius:11px; padding:7px 12px; font-family:inherit; font-size:.9rem; box-shadow:0 3px 0 rgba(0,0,0,.4); }
  .back-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,.4); }
  .hud-stats{ display:flex; gap:6px; margin-left:auto; font-size:.85rem; flex-wrap:wrap; justify-content:flex-end; }
  .hud-stats .chip{ background:rgba(0,0,0,.42); padding:4px 9px; border-radius:20px; white-space:nowrap; }
  .zone-name{ background:rgba(0,0,0,.42); padding:4px 10px; border-radius:20px; font-size:.82rem; color:var(--gold); }

  /* 토스트 */
  #toast{ position:absolute; top:48px; left:50%; transform:translateX(-50%); background:rgba(20,12,10,.92);
    border:2px solid var(--gold); border-radius:14px; padding:8px 15px; font-size:.98rem; z-index:6;
    opacity:0; transition:opacity .25s; pointer-events:none; text-align:center; max-width:80%; }
  #toast.show{ opacity:1; }
  #toast .en{ color:var(--gold); font-weight:bold; } #toast .ko{ color:#cde; opacity:.85; font-size:.85rem; }

  /* 조이스틱 (좌하단) */
  #stick-zone{ position:absolute; left:0; bottom:0; width:46%; height:62%; z-index:4; touch-action:none; }
  #stick-base{ position:absolute; left:28px; bottom:28px; width:118px; height:118px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.16), rgba(255,255,255,.06));
    border:3px solid rgba(255,255,255,.28); }
  #stick-knob{ position:absolute; left:28px; bottom:28px; width:56px; height:56px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.95), rgba(200,200,200,.8));
    box-shadow:0 3px 8px rgba(0,0,0,.4); transform:translate(31px,-31px); pointer-events:none; }

  /* 채집 버튼 (우하단) */
  .abtn{ position:absolute; right:26px; bottom:34px; width:88px; height:88px; border-radius:50%;
    border:none; z-index:4; font-family:inherit; font-weight:bold; color:#4e342e;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
    background:radial-gradient(circle at 35% 28%, #ffe28a, #ff9f1c 68%, #ef7d00);
    box-shadow:0 5px 0 #a85200, 0 8px 12px rgba(0,0,0,.45), inset 0 2px 3px rgba(255,255,255,.5);
    transition:transform .08s, box-shadow .15s, background .2s; }
  .abtn .ab-ico{ font-size:1.7rem; line-height:1; filter:drop-shadow(0 1px 1px rgba(0,0,0,.3)); }
  .abtn .ab-tx{ font-size:.82rem; letter-spacing:1px; text-shadow:0 1px 0 rgba(255,255,255,.4); }
  .abtn:active{ transform:translateY(3px); box-shadow:0 2px 0 #a85200, 0 4px 7px rgba(0,0,0,.4); }
  /* 채집 가능 범위 안 — 초록빛 강조 + 맥동으로 누르도록 유도 */
  .abtn.ready{ color:#143a16;
    background:radial-gradient(circle at 35% 28%, #c4f8b0, #44c64a 68%, #2e9e3a);
    box-shadow:0 5px 0 #1f7a2a, 0 0 0 4px rgba(76,200,80,.35), 0 8px 18px rgba(40,170,60,.55), inset 0 2px 3px rgba(255,255,255,.5);
    animation:abReady 1.0s ease-in-out infinite; }
  @keyframes abReady{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.08); } }

  /* 가로 회전 안내 (세로일 때) */
  #rotate{ position:fixed; inset:0; z-index:50; display:none; flex-direction:column; gap:14px;
    align-items:center; justify-content:center; background:#16261a; text-align:center; padding:30px; }
  #rotate.show{ display:flex; }
  #rotate .ph{ font-size:3.6rem; animation:rot 1.8s ease-in-out infinite; }
  @keyframes rot{ 0%,40%{transform:rotate(0)} 60%,100%{transform:rotate(-90deg)} }

  /* ===== 동행 선택 ===== */
  .ex-overlay{ position:fixed; inset:0; z-index:30; display:none; align-items:center; justify-content:center;
    background:rgba(20,12,10,.8); padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom); }
  .ex-overlay.show{ display:flex; }
  .cs-panel{ background:linear-gradient(180deg,#3a2620,#2b1a16); border:2px solid var(--gold); border-radius:18px;
    padding:14px 16px; width:100%; max-width:700px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.5); }
  .cs-title{ color:var(--gold); font-size:1.2rem; margin-bottom:12px; }
  .cs-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .cs-card{ position:relative; background:rgba(255,253,245,.96); border:2px solid #b9a87e; border-radius:14px;
    padding:8px 6px; cursor:pointer; transition:transform .1s; overflow:hidden; }
  .cs-card:active{ transform:scale(.97); }
  .cs-card.selected{ border-color:var(--gold); box-shadow:0 0 12px rgba(255,179,0,.7); }
  .cs-card.locked{ cursor:default; }
  .cs-art{ height:86px; display:flex; align-items:flex-end; justify-content:center; }
  .cs-art img{ height:96px; object-fit:contain; }
  .cs-art .emoji{ font-size:3.4rem; }
  .cs-name{ font-weight:bold; color:#3a2620; font-size:1rem; margin-top:5px; }
  .cs-skill{ font-size:.76rem; color:#7a5a2a; margin-top:2px; min-height:1.1em; }
  .cs-selbadge{ position:absolute; top:6px; right:6px; background:var(--gold); color:#3a2620; font-size:.7rem; padding:1px 8px; border-radius:10px; font-weight:bold; }
  .cs-lockov{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px;
    color:#fff; font-size:.76rem; line-height:1.3; background:rgba(20,12,10,.62); border-radius:12px; }
  .cs-lockov .lk{ font-size:1.7rem; }
  .cs-close{ margin-top:14px; background:linear-gradient(180deg,#cfd8dc,#90a4ae); border:none; border-radius:12px;
    padding:9px 32px; font-family:inherit; font-size:1rem; color:#28323a; box-shadow:0 3px 0 #546e7a; }
  .cs-close:active{ transform:translateY(2px); box-shadow:0 1px 0 #546e7a; }
  /* ===== 스탯 & 장비 ===== */
  .st-row{ display:flex; gap:9px; justify-content:center; flex-wrap:wrap; margin:8px 0; }
  .st-chip{ background:rgba(255,253,245,.96); border-radius:12px; padding:7px 14px; color:#3a2620; font-weight:bold; font-size:.95rem; }
  .st-chip small{ color:#2e7d32; font-weight:bold; }
  .st-exp{ height:12px; background:#5a4632; border-radius:7px; overflow:hidden; max-width:320px; margin:5px auto 2px; }
  .st-exp > div{ height:100%; background:linear-gradient(90deg,#9ccc65,#43a047); transition:width .3s; }
  .st-expt{ font-size:.76rem; color:#cdbf9e; }
  .st-pass{ font-size:.9rem; color:#e8dcc4; margin:8px 0 2px; }
  .st-sec{ color:var(--gold); font-size:1rem; margin:13px 0 6px; text-align:left; padding-left:4px; }
  .eq-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .eq-card{ background:rgba(255,253,245,.96); border:2px solid #b9a87e; border-radius:12px; padding:8px 10px; text-align:left; display:flex; align-items:center; gap:9px; }
  .eq-card.equipped{ border-color:var(--gold); box-shadow:0 0 9px rgba(255,179,0,.55); }
  .eq-ic{ font-size:1.7rem; }
  .eq-info{ flex:1; min-width:0; } .eq-info .nm{ font-weight:bold; color:#3a2620; font-size:.92rem; }
  .eq-info .bn{ font-size:.76rem; color:#2e7d32; } .eq-info .ct{ font-size:.72rem; color:#b06a1e; }
  .eq-btn{ border:none; border-radius:10px; padding:8px 13px; font-family:inherit; font-weight:bold; font-size:.85rem; cursor:pointer; white-space:nowrap; }
  .eq-btn.buy{ background:linear-gradient(180deg,#ffe7a8,#ffc34d); box-shadow:0 3px 0 #a9740f; color:#5a3a10; }
  .eq-btn.equip{ background:linear-gradient(180deg,#a5d6a7,#66bb6a); box-shadow:0 3px 0 #2e7d32; color:#15351a; }
  .eq-btn.on{ background:#cfd8dc; color:#546e7a; box-shadow:none; }
  .eq-btn:disabled{ opacity:.45; box-shadow:none; }
  /* ===== 스펠링 조합 퀴즈 ===== */
  #sp-panel.shake{ animation:bshake .3s; }
  .sp-head{ color:var(--gold); font-size:1.12rem; margin-bottom:6px; }
  .sp-prompt{ color:#fff8e1; font-size:1.05rem; margin-bottom:14px; }
  .sp-prompt b{ color:#ffd54f; }
  .sp-slots{ display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-bottom:16px; min-height:50px; }
  .sp-slot{ width:40px; height:50px; border-radius:9px; background:rgba(255,255,255,.1); border:2px dashed rgba(255,255,255,.32);
    display:flex; align-items:center; justify-content:center; font-size:1.5rem; font-weight:bold; color:#fff; }
  .sp-slot.filled{ background:rgba(255,253,245,.96); border-style:solid; border-color:var(--gold); color:#3a2620; cursor:pointer; }
  .sp-tiles{ display:flex; gap:7px; justify-content:center; flex-wrap:wrap; margin-bottom:12px; min-height:52px; }
  .sp-tile{ width:42px; height:52px; border-radius:11px; background:linear-gradient(180deg,#ffe7a8,#ffc34d); box-shadow:0 4px 0 #a9740f;
    border:none; font-size:1.5rem; font-weight:bold; color:#5a3a10; cursor:pointer; font-family:inherit; }
  .sp-tile:active{ transform:translateY(2px); box-shadow:0 2px 0 #a9740f; }
  .sp-tile.used{ visibility:hidden; }
  .sp-msg{ min-height:1.5em; font-size:.96rem; margin-bottom:12px; color:#e8dcc4; }
  .sp-msg.ok{ color:#9ccc65; font-weight:bold; } .sp-msg.no{ color:#ef9a9a; }
  .sp-btns{ display:flex; gap:9px; justify-content:center; }
  .sp-act{ border:none; border-radius:12px; padding:10px 20px; font-family:inherit; font-size:1rem; font-weight:bold; cursor:pointer; }
  .sp-act.cancel{ background:linear-gradient(180deg,#cfd8dc,#90a4ae); color:#28323a; box-shadow:0 3px 0 #546e7a; }
  .sp-act.clear{ background:linear-gradient(180deg,#e0d2b0,#c9b48a); color:#4e342e; box-shadow:0 3px 0 #9c7d4a; }
  .sp-act.ok{ background:linear-gradient(180deg,#a5d6a7,#66bb6a); color:#15351a; box-shadow:0 3px 0 #2e7d32; }
  .sp-act:active{ transform:translateY(2px); }

  /* ===== 전투 (포켓몬식 가로 구도) ===== */
  #battle{ position:fixed; inset:0; z-index:20; display:none; flex-direction:column; }
  #battle.show{ display:flex; }
  .b-arena{ flex:1; position:relative; overflow:hidden;
    background:
      radial-gradient(ellipse 50% 34% at 76% 26%, rgba(255,248,200,.45), transparent 62%), /* 햇살 */
      linear-gradient(180deg,#bfe7f5 0%,#cdeef0 38%,#e6f3d8 50%,#86c95f 50%,#5fae49 100%); }
  .b-arena.shake{ animation:bshake .28s; }
  @keyframes bshake{ 0%,100%{transform:translate(0,0)} 25%{transform:translate(-6px,3px)} 50%{transform:translate(6px,-3px)} 75%{transform:translate(-4px,-2px)} }
  /* 먼 나무 실루엣(둥근 수관) — 줄무늬 대신 */
  .b-trees{ position:absolute; top:34%; left:0; right:0; height:18%; pointer-events:none; opacity:.55;
    background:radial-gradient(circle at 18px 22px, #4f9a44 15px, transparent 16px) repeat-x;
    background-size:38px 36px; }
  .b-trees.far{ top:30%; height:14%; opacity:.32; background-size:30px 30px;
    background:radial-gradient(circle at 14px 18px, #5aa84f 12px, transparent 13px) repeat-x; background-size:30px 30px; }
  /* 깊은 숲(밤) 테마 */
  .b-arena.zone-deepwood{
    background:
      radial-gradient(circle at 82% 20%, #f2f5ff 0 15px, rgba(242,245,255,0) 16px),       /* 달 */
      radial-gradient(circle at 82% 20%, rgba(190,205,255,.5), transparent 16%),           /* 달무리 */
      linear-gradient(180deg,#161a40 0%,#222452 40%,#2a2c46 50%,#21351f 50%,#16271a 100%); }
  .b-arena.zone-deepwood .b-trees{ opacity:.6;
    background:radial-gradient(circle at 18px 22px, #16271c 15px, transparent 16px) repeat-x; background-size:38px 36px; }
  .b-arena.zone-deepwood .b-trees.far{ opacity:.4;
    background:radial-gradient(circle at 14px 18px, #1d3325 12px, transparent 13px) repeat-x; background-size:30px 30px; }
  .platform{ position:absolute; border-radius:50%; background:radial-gradient(ellipse at center, #84c95f 0%, #5da046 68%, transparent 71%); pointer-events:none; }
  .plat-enemy{ width:40%; height:13%; top:40%; right:7%; }
  .plat-self{ width:46%; height:15%; bottom:2%; left:1%; }
  .sprite-enemy{ position:absolute; top:24%; right:12%; width:33%; max-width:148px; filter:drop-shadow(0 8px 6px rgba(0,0,0,.4)); }
  .sprite-enemy img{ width:100%; height:auto; display:block; }
  .sprite-enemy.emoji{ font-size:4.6rem; text-align:center; }
  /* 보스: 더 크고 위협적인 붉은 오라 */
  .sprite-enemy.boss{ width:44%; max-width:200px; top:16%; right:9%; filter:drop-shadow(0 10px 8px rgba(0,0,0,.5)) drop-shadow(0 0 18px rgba(255,60,60,.7)); animation:bossPulse 1.6s ease-in-out infinite; }
  @keyframes bossPulse{ 0%,100%{ filter:drop-shadow(0 10px 8px rgba(0,0,0,.5)) drop-shadow(0 0 14px rgba(255,60,60,.6)); } 50%{ filter:drop-shadow(0 10px 8px rgba(0,0,0,.5)) drop-shadow(0 0 26px rgba(255,90,90,.9)); } }
  .sprite-self{ position:absolute; bottom:4%; left:6%; width:40%; max-width:185px; filter:drop-shadow(0 8px 6px rgba(0,0,0,.4)); }
  .sprite-self img{ width:100%; height:auto; display:block; }
  .sprite-self.emoji{ font-size:4.2rem; text-align:center; }
  .sprite-enemy.enter{ animation:enemyEnter .6s ease-out; }
  @keyframes enemyEnter{ 0%{ transform:translateX(150%) scale(.6); opacity:0 } 100%{ transform:translateX(0) scale(1); opacity:1 } }
  .sprite-enemy.hit{ animation:ehit .4s; } @keyframes ehit{ 0%,100%{transform:none; filter:none} 25%,55%{transform:translateX(5px); filter:brightness(2.4) drop-shadow(0 0 14px #fff)} 40%{transform:translateX(-5px)} }
  .sprite-enemy.lunge{ animation:elunge .3s; } @keyframes elunge{ 50%{ transform:translate(-30px,20px) scale(1.04);} }
  .sprite-enemy.dead{ animation:edead .6s forwards; } @keyframes edead{ to{ transform:translateY(26px) scale(.15); opacity:0;} }
  .sprite-self.lunge{ animation:slunge .3s; } @keyframes slunge{ 50%{ transform:translate(34px,-24px) scale(1.06);} }
  .sprite-self.hit{ animation:shit .4s; } @keyframes shit{ 0%,100%{transform:none; filter:none} 30%{transform:scale(.93); filter:brightness(.5) sepia(1) hue-rotate(-25deg)} }
  .binfo{ position:absolute; top:12px; width:43%; max-width:228px; background:rgba(255,253,245,.93); border:2px solid #4e342e; border-radius:12px; padding:5px 11px 7px; box-shadow:0 3px 8px rgba(0,0,0,.3); transition:opacity .3s; }
  .binfo-self{ left:12px; } .binfo-enemy{ right:12px; }
  .binfo-top{ display:flex; justify-content:space-between; align-items:baseline; font-size:.92rem; color:#3a2620; font-weight:bold; }
  .binfo-top .lvtag{ font-size:.76rem; color:#9a6a1e; }
  .hpbar{ height:11px; border-radius:7px; background:#d8cbb0; overflow:hidden; border:1px solid #b3a276; margin-top:4px; }
  .hpfill{ height:100%; width:100%; border-radius:7px; transition:width .45s ease; background:linear-gradient(90deg,#66bb6a,#43a047); }
  .hpfill.mid{ background:linear-gradient(90deg,#ffca28,#ffa000); } .hpfill.low{ background:linear-gradient(90deg,#ef5350,#c62828); }
  .hptext{ text-align:right; font-size:.7rem; color:#5a4632; margin-top:1px; }
  .dmg-pop{ position:absolute; font-size:1.8rem; font-weight:bold; color:#fff; pointer-events:none; text-shadow:0 2px 3px #000; animation:dpop 1s forwards; z-index:6; }
  .dmg-pop.crit{ color:#ffd54f; font-size:2.3rem; } .dmg-pop.miss{ color:#eee; }
  @keyframes dpop{ 0%{ transform:translateY(0) scale(.6); opacity:0 } 20%{ transform:translateY(-10px) scale(1.15); opacity:1 } 100%{ transform:translateY(-54px) scale(1); opacity:0 } }
  .b-bottom{ background:linear-gradient(180deg,#3a2620,#2b1a16); border-top:3px solid var(--gold); padding:10px 14px calc(10px + env(safe-area-inset-bottom)); }
  .b-msg{ min-height:2.1em; color:#fff8e1; font-size:1.02rem; line-height:1.35; margin-bottom:9px; padding:1px 3px; }
  .b-cmds{ display:grid; grid-template-columns:1fr 1.3fr 0.85fr 0.85fr; gap:8px; transition:opacity .3s; }
  .cmd-item{ background:linear-gradient(180deg,#a5d6a7,#66bb6a); box-shadow:0 4px 0 #2e7d32; color:#173b1a; }
  .cmd-item:active{ box-shadow:0 2px 0 #2e7d32; }
  /* 전투 아이템 미니 메뉴 */
  #b-itemmenu{ position:absolute; left:0; right:0; bottom:100%; margin-bottom:8px; display:none; z-index:8; }
  #b-itemmenu.show{ display:block; }
  .bi-card{ display:flex; align-items:center; gap:10px; background:#fff; border-radius:13px; padding:9px 12px; margin:0 14px 8px; box-shadow:0 5px 14px rgba(0,0,0,.35); }
  .bi-ic{ font-size:1.5rem; } .bi-nm{ font-weight:bold; color:#3a2a16; font-size:.95rem; } .bi-bn{ font-size:.78rem; color:#7a5a2a; }
  .bi-use{ margin-left:auto; border:none; border-radius:11px; padding:7px 14px; font-family:inherit; font-weight:bold; color:#fff; background:linear-gradient(180deg,#66bb6a,#388e3c); box-shadow:0 3px 0 #2e7d32; cursor:pointer; }
  .bi-use:active{ transform:translateY(2px); box-shadow:none; }
  .bi-empty{ background:rgba(255,255,255,.95); border-radius:13px; padding:12px; margin:0 14px 8px; text-align:center; color:#7a5a2a; font-size:.88rem; }
  .b-cmd{ position:relative; overflow:hidden; border:none; border-radius:15px; font-family:inherit; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; padding:9px 6px 8px; line-height:1.05; }
  .b-cmd .cmd-ic{ font-size:1.45rem; } .b-cmd .cmd-lb{ font-size:.92rem; font-weight:bold; }
  .b-cmd:active{ transform:translateY(2px); }
  .b-cmd:disabled{ opacity:.55; }
  .cmd-atk{ background:linear-gradient(180deg,#ffe7a8,#ffc34d); box-shadow:0 4px 0 #a9740f; color:#5a3a10; }
  .cmd-atk:active{ box-shadow:0 2px 0 #a9740f; }
  .cmd-flee{ background:linear-gradient(180deg,#cfd8dc,#90a4ae); box-shadow:0 4px 0 #546e7a; color:#28323a; }
  .cmd-flee:active{ box-shadow:0 2px 0 #546e7a; }
  /* 스킬 버튼 — 충전 중엔 어둡고 게이지 차오름, 가득 차면 발광 */
  .cmd-skill{ background:linear-gradient(180deg,#48415c,#322c40); box-shadow:0 4px 0 #1e1a29; color:#d6cce8; }
  .cmd-skill:active{ box-shadow:0 2px 0 #1e1a29; }
  .cmd-skill .skill-fill{ position:absolute; left:0; right:0; bottom:0; height:0%; z-index:0;
    background:linear-gradient(180deg,rgba(186,104,255,.5),rgba(140,60,230,.8)); transition:height .35s ease; }
  .cmd-skill .cmd-ic, .cmd-skill .cmd-lb{ position:relative; z-index:1; }
  .cmd-skill.ready{ background:linear-gradient(180deg,#c884ff,#8a2be2); color:#fff;
    box-shadow:0 4px 0 #5e1a9e, 0 0 18px rgba(180,110,255,.75); animation:skillPulse 1s infinite; }
  .cmd-skill.ready .skill-fill{ display:none; }
  .cmd-skill.ready:active{ box-shadow:0 2px 0 #5e1a9e; }
  @keyframes skillPulse{ 0%,100%{ filter:brightness(1) } 50%{ filter:brightness(1.2) } }
  /* 스킬 발동 플래시 */
  #b-flash{ position:absolute; inset:0; z-index:4; pointer-events:none; opacity:0; }
  #b-flash.go{ animation:bflash .55s ease-out; }
  @keyframes bflash{ 0%{opacity:0} 22%{opacity:.75} 100%{opacity:0} }

<script>
// ============================================================
// Vocab Barista — 탐험 (가로 / 스크롤 맵 / 조이스틱 / 전투)
// ============================================================
const CAFE_KEY='vb_save_v7', EXPLORE_KEY='vb_explore_v1';

const SaveBridge = {
  loadCafe(){ try{ return JSON.parse(localStorage.getItem(CAFE_KEY))||{}; }catch(e){ return {}; } },
  patchCafe(p){ let c={}; try{ c=JSON.parse(localStorage.getItem(CAFE_KEY))||{}; }catch(e){} Object.assign(c,p); localStorage.setItem(CAFE_KEY,JSON.stringify(c)); },
  loadExplore(){ let ex={}; try{ ex=JSON.parse(localStorage.getItem(EXPLORE_KEY))||{}; }catch(e){}
    return { level:ex.level||1, exp:ex.exp||0,
      stats:Object.assign({maxHp:30,hp:30,atk:8,def:4},ex.stats||{}),
      equip:Object.assign({weapon:null,armor:null},ex.equip||{}),
      materials:ex.materials||{}, items:ex.items||[], companion:ex.companion||'none',
      map:ex.map||{zone:'forest'}, pos:ex.pos||null, steps:ex.steps||0 }; },
  saveExplore(s){ localStorage.setItem(EXPLORE_KEY,JSON.stringify(s)); },
};

// 효과음 + 햅틱 (카페의 음소거 설정 공유) — 탐험이 무음이던 문제 보완
const Sfx = {
  ctx:null, muted:false,
  init(){ try{ this.muted = !!SaveBridge.loadCafe().isMuted; }catch(e){} },
  _ac(){ if(!this.ctx){ try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } }
    if(this.ctx.state==='suspended') this.ctx.resume(); return this.ctx; },
  tone(freq, dur, type, vol){ if(this.muted) return; const ac=this._ac(); if(!ac) return;
    const o=ac.createOscillator(), g=ac.createGain(); o.connect(g); g.connect(ac.destination);
    const now=ac.currentTime; o.type=type||'sine'; o.frequency.setValueAtTime(freq, now);
    g.gain.setValueAtTime(vol||0.18, now); g.gain.exponentialRampToValueAtTime(0.0001, now+(dur||0.15));
    o.start(now); o.stop(now+(dur||0.15)); },
  play(kind){
    switch(kind){
      case 'gather': this.tone(660,0.1,'sine',0.16); setTimeout(()=>this.tone(990,0.12,'sine',0.16),70); break;
      case 'hit':    this.tone(180,0.1,'square',0.14); break;
      case 'crit':   this.tone(140,0.16,'sawtooth',0.2); setTimeout(()=>this.tone(280,0.12,'square',0.16),60); break;
      case 'miss':   this.tone(200,0.12,'sine',0.1); break;
      case 'enemy':  this.tone(120,0.12,'sawtooth',0.13); break;
      case 'win':    [523,659,784,1046].forEach((f,i)=>setTimeout(()=>this.tone(f,0.16,'sine',0.18),i*90)); break;
      case 'levelup':[659,880,1318].forEach((f,i)=>setTimeout(()=>this.tone(f,0.18,'triangle',0.18),i*100)); break;
      case 'correct':this.tone(523,0.1,'sine',0.16); setTimeout(()=>this.tone(1046,0.14,'sine',0.16),90); break;
      case 'wrong':  this.tone(160,0.22,'sawtooth',0.16); break;
    }
  }
};
function exHaptic(kind){
  try { const H=window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.Haptics;
    if(H){ if(kind==='success')H.notification({type:'SUCCESS'}); else if(kind==='heavy')H.impact({style:'HEAVY'}); else H.impact({style:'LIGHT'}); return; } } catch(e){}
  if(navigator.vibrate) navigator.vibrate(kind==='heavy'?60:kind==='success'?[30,40,30]:15);
}

const Explore = {
  cafe:null, state:null,
  init(){
    const c=SaveBridge.loadCafe();
    this.cafe={ wallet:c.wallet||0, myWords:Array.isArray(c.myWords)?c.myWords:[], turnCount:c.turnCount||0,
                collectedChars:Array.isArray(c.collectedChars)?c.collectedChars:[],
                craftedItems:(c.craftedItems&&typeof c.craftedItems==='object')?c.craftedItems:{} };
    this.state=SaveBridge.loadExplore();
    if(!this.isRecruited(this.state.companion)) this.state.companion='none';  // 미채용 동행은 기본으로
    Sfx.init();
    Assets.preloadAll();
    this.refreshHUD();
    lockLandscape();
    World.init();
    World.updateCompChip();
  },
  persist(){ SaveBridge.patchCafe({ wallet:this.cafe.wallet, myWords:this.cafe.myWords, turnCount:this.cafe.turnCount, craftedItems:this.cafe.craftedItems }); SaveBridge.saveExplore(this.state); },
  // 스펠링 조합 정답 시 SRS 갱신(오답노트 단어면 박스↑, 졸업하면 제거)
  srsCorrect(word){ const arr=this.cafe.myWords||[]; const v=arr.find(x=>x.w&&x.w.toLowerCase()===word);
    if(v){ v.box=(v.box||1)+1; v.due=(this.cafe.turnCount||0)+(v.box*2); if(v.box>=5){ this.cafe.myWords=arr.filter(x=>x!==v); } this.persist(); } },
  // 채용 여부: 카페 손님 도감에 해당 메인 캐릭터가 등록(=만난 적 있음)되면 동행 가능
  isRecruited(key){ if(!key||key==='none') return true; const c=COMPANIONS[key]; return !!(c&&c.charId&&(this.cafe&&this.cafe.collectedChars||[]).includes(c.charId)); },
  // 장비+동행 패시브 보너스 합산
  effBonus(){ const b={maxHp:0,atk:0,def:0,goldPct:0}; const eq=this.state.equip||{};
    ['weapon','armor'].forEach(slot=>{ const it=(EQUIP_DB[slot]||[]).find(x=>x.id===eq[slot]); if(it){ b.atk+=it.atk||0; b.def+=it.def||0; b.maxHp+=it.hp||0; } });
    const p=COMP_PASSIVE[this.state.companion||'none']; if(p){ b.atk+=p.atk||0; b.def+=p.def||0; b.maxHp+=p.maxHp||0; b.goldPct+=p.goldPct||0; }
    return b; },
  effStats(){ const s=this.state.stats; const b=this.effBonus(); const maxHp=s.maxHp+b.maxHp;
    return { hp:Math.min(s.hp,maxHp), maxHp, atk:s.atk+b.atk, def:s.def+b.def, base:s, bonus:b }; },
  exitToCafe(){ this.persist(); try{ unlockOrientation(); }catch(e){}
    try{ localStorage.setItem('vb_resume_paused','1'); }catch(e){} // 카페 복귀 시 일시정지 화면으로
    location.href='index.html'; },
  refreshHUD(){
    const s=this.state,c=this.cafe;
    document.getElementById('hud-gold').textContent=c.wallet;
    document.getElementById('hud-level').textContent=s.level;
    const e=this.effStats(); document.getElementById('hud-hp').textContent=e.hp+'/'+e.maxHp;
    document.getElementById('hud-mats').textContent='🎒 '+Object.values(s.materials).reduce((n,v)=>n+(v||0),0);
  },
};

// ---------- 화면 방향 ----------
async function lockLandscape(){
  try{ const P=window.Capacitor&&window.Capacitor.Plugins; if(P&&P.ScreenOrientation) await P.ScreenOrientation.lock({orientation:'landscape'}); }catch(e){}
  try{ if(screen.orientation&&screen.orientation.lock) await screen.orientation.lock('landscape'); }catch(e){}
}
async function unlockOrientation(){
  try{ const P=window.Capacitor&&window.Capacitor.Plugins; if(P&&P.ScreenOrientation) await P.ScreenOrientation.lock({orientation:'portrait'}); }catch(e){}
  try{ if(screen.orientation&&screen.orientation.unlock) screen.orientation.unlock(); }catch(e){}
}
// 세로로 들고 있으면 콘텐츠를 90° 회전해 자동으로 가로 화면처럼(iOS 웹은 기기회전 강제 불가 → CSS 회전). 가로면 그대로.
function applyOrientation(){
  const rot = document.getElementById('rotator'); if(!rot) return;
  const portrait = window.innerHeight > window.innerWidth;
  if(portrait){
    document.body.classList.add('rot');
    rot.style.width  = window.innerHeight+'px';
    rot.style.height = window.innerWidth+'px';
    rot.style.transformOrigin = 'top left';
    rot.style.transform = 'rotate(90deg) translateY(-'+window.innerWidth+'px)';
  } else {
    document.body.classList.remove('rot');
    rot.style.width=''; rot.style.height=''; rot.style.transform=''; rot.style.transformOrigin='';
  }
  if(window.World && World.resize) World.resize();
}
function checkRotate(){ applyOrientation(); } // 하위호환

// ---------- 재료 (커스텀 SVG 스프라이트) ----------
const MATERIALS = {
  bean:     { name:'커피 원두', icon:'☕', img:'sprites/bean.svg' },
  berry:    { name:'커피 체리', icon:'🍒', img:'sprites/cherry.svg' },
  milk:     { name:'우유',     icon:'🥛', img:'sprites/milk.svg' },
  syrup:    { name:'시럽',     icon:'🍯', img:'sprites/syrup.svg' },
  cacao:    { name:'카카오',   icon:'🟤', img:'sprites/cacao.svg' },
  goldbean: { name:'황금 원두', icon:'🌟', img:'sprites/goldbean.svg', rare:true }, // 채집X, 전투 희귀 드롭만
};
// 채집 노드로 등장하는 재료(황금 원두는 제외 — 전투 보상으로만 획득)
const GATHER_MATS = Object.keys(MATERIALS).filter(k => !MATERIALS[k].rare);
// ---------- 동행 캐릭터 (채용 게이팅은 Stage C, 지금은 자유 선택해 미리보기) ----------
const COMPANIONS = {
  none: { name:'기본',  emoji:'🧑‍🍳', img:null, battleImg:'chars/chef_back.png', charId:null },
  roa:  { name:'로아',  img:'chars/roa.png',  battleImg:'chars/roa_back.png',  charId:'m_roa' },
  luna: { name:'루나',  img:'chars/luna.png', battleImg:'chars/luna_back.png', charId:'m_luna' },
  sera: { name:'세라',  img:'chars/sera.png', battleImg:'chars/sera_back.png', charId:'m_sera' },
};
const COMP_ORDER = ['none','roa','luna','sera'];
// ---------- 맵 치비(걷는 캐릭터) 동행별 색 ----------
const CHIBI = {
  none: { skin:'#f1cfa6', hair:'#3a2a1e', shirt:'#6d4c41', legs:'#4e342e', toque:true, apron:true },
  roa:  { skin:'#f1cfa6', hair:'#e8eaf0', shirt:'#2b3a55', legs:'#1f2a40', apron:true },
  luna: { skin:'#f3d6b6', hair:'#cdb8ea', shirt:'#3a2456', legs:'#2a1840', hat:true, longhair:true },
  sera: { skin:'#f6d8b6', hair:'#d8a85c', shirt:'#cdbdf0', legs:'#9b86c9', longhair:true },
};
// ---------- 동행 패시브 ----------
const COMP_PASSIVE = {
  none: null,
  roa:  { atk:3,    label:'공격력 +3' },
  luna: { maxHp:15, label:'최대 HP +15' },
  sera: { goldPct:0.25, label:'골드 획득 +25%' },
};
// ---------- 장비 (대장간: 골드+재료로 제작) ----------
const EQUIP_DB = {
  weapon: [
    { id:'w_bean',  name:'원두 검',    icon:'🗡️', atk:4, cost:{gold:200, bean:5} },
    { id:'w_roast', name:'로스팅 창',  icon:'🔱', atk:8, cost:{gold:600, bean:12, berry:6} },
  ],
  armor: [
    { id:'a_foam',  name:'우유거품 방패', icon:'🛡️', def:3, hp:10, cost:{gold:200, berry:5} },
    { id:'a_bean',  name:'원두 갑옷',     icon:'🧥', def:6, hp:20, cost:{gold:600, bean:8, berry:8} },
  ],
};
const MAT_ICON = Object.fromEntries(Object.entries(MATERIALS).map(([k,m])=>[k,m.icon]));
// ---------- 조합 레시피 (재료+스펠링퀴즈 → 카페에서 쓰는 특별 아이템) ----------
const CRAFT_DB = [
  { id:'cr_mood',  name:'카페라떼',     icon:'😊', cost:{bean:2,milk:2},     effect:'mood',   where:'cafe',   edesc:'카페: 다음 손님 3명 골드 +50%' },
  { id:'cr_time',  name:'타임 시럽',    icon:'⏳', cost:{syrup:3},           effect:'time',   where:'cafe',   edesc:'카페: 지금 손님 시간 +5초' },
  { id:'cr_score', name:'골든 블렌드',  icon:'💯', cost:{goldbean:1,bean:2}, effect:'double', where:'cafe',   edesc:'카페: 다음 정답 점수 2배' },
  { id:'cr_heart', name:'하트 마카롱',  icon:'💖', cost:{cacao:2,milk:1},    effect:'affection', where:'cafe', edesc:'카페: 메인 손님 호감 +10' },
  { id:'cr_atk',   name:'더블 샷',      icon:'⚔️', cost:{bean:3},            effect:'atkup',  where:'battle', edesc:'탐험: 이번 전투 공격력 +50%' },
  { id:'cr_def',   name:'크림 실드',    icon:'🛡️', cost:{milk:2,berry:2},    effect:'defup',  where:'battle', edesc:'탐험: 이번 전투 받는 피해 −50%' },
];
// ---------- 이미지 프리로더 ----------
const Assets = {
  imgs:{},
  load(src){ if(!src) return null; if(this.imgs[src]) return this.imgs[src]; const i=new Image(); i.src=src; this.imgs[src]=i; return i; },
  ready(src){ const i=this.imgs[src]; return !!(i&&i.complete&&i.naturalWidth); },
  preloadAll(){
    Object.values(MATERIALS).forEach(m=>this.load(m.img));
    Object.values(COMPANIONS).forEach(c=>{ this.load(c.img); this.load(c.battleImg); });
    Object.values(MONSTERS).forEach(m=>this.load(m.art));
  },
};

// ---------- 타일맵 엔진 (넓은 맵 + 카메라 추종 + 조이스틱) ----------
const TILESET_SRC = 'assets/tiny-town/Tilemap/tilemap_packed.png';
const TT_COLS = 12, TT_SIZE = 16;   // 타일셋: 12열, 16px

const World = {
  cv:null, ctx:null, sheet:null, ready:false,
  TS:42, dpr:1, viewW:0, viewH:0,
  WT:48, HT:34,                     // 월드 크기(타일)
  base:[], deco:[], barrier:null, trees:[], nodes:[],
  // 플레이어(월드 픽셀 좌표 = 타일중심 단위)
  px:0, py:0, bob:0, facing:1,
  // 조이스틱
  stick:{active:false,id:null,cx:0,cy:0,dx:0,dy:0},
  raf:null,

  init(){
    this.cv=document.getElementById('map'); this.ctx=this.cv.getContext('2d');
    this.sheet=new Image();
    this.sheet.onload=()=>{ this.ready=true; };
    this.sheet.src=TILESET_SRC;
    this.generate();
    // 위치 복원
    const p=Explore.state.pos;
    const valid = p && !this.isBarrier(Math.round(p.x), Math.round(p.y));

    this._portalArmed = true;
    this.updateZoneName();
    this.resize();
    window.addEventListener('resize', ()=>applyOrientation());
    window.addEventListener('orientationchange', ()=>setTimeout(applyOrientation, 80));
    window.addEventListener('keydown', e=>this.onKey(e));
    window.addEventListener('keyup',   e=>this.onKeyUp(e));
    this.bindStick();

    if(this.raf) cancelAnimationFrame(this.raf);

  },

  // 시드 RNG (안정적 맵)
  _seed:20240624, rnd(){ this._seed=(this._seed*1103515245+12345)&0x7fffffff; return this._seed/0x7fffffff; },

  generate(){
    // 존별 시드/분위기 — 같은 코드로 존마다 다른 레이아웃·나무색
    const zone = ZONES[Explore.state.map.zone] || ZONES.forest;
    this._seed = 20240624 + (Explore.state.map.zone==='deepwood' ? 91237 : 0);
    this._orangeRatio = zone.treeOrange || 0.3;
    this.barrier=new Set(); this.trees=[]; this.nodes=[]; this.base=[]; this.deco=[];
    for(let y=0;y<this.HT;y++){ this.base[y]=[]; this.deco[y]=[];
      for(let x=0;x<this.WT;x++){
        const r=this.rnd();
        this.base[y][x] = r<0.86?0 : (r<0.94?1:2);     // 풀 변형
        this.deco[y][x] = -1;
      }
    }
    const key=(x,y)=>x+','+y;
    // 테두리: 나무 벽
    for(let x=0;x<this.WT;x++){ this.addTree(x,0); this.addTree(x,1); this.addTree(x,this.HT-1); }
    for(let y=0;y<this.HT;y++){ this.addTree(0,y); this.addTree(this.WT-1,y); }
    // 나무 군집
    for(let i=0;i<70;i++){
      const cx=2+Math.floor(this.rnd()*(this.WT-4)), cy=3+Math.floor(this.rnd()*(this.HT-5));
      const n=1+Math.floor(this.rnd()*3);
      for(let j=0;j<n;j++){ const tx=cx+Math.floor(this.rnd()*3-1), ty=cy+Math.floor(this.rnd()*3-1);
        if(tx>1&&tx<this.WT-1&&ty>2&&ty<this.HT-1) this.addTree(tx,ty); }
    }
    // 풀 장식(걷기 가능)
    for(let i=0;i<60;i++){ const x=2+Math.floor(this.rnd()*(this.WT-4)), y=3+Math.floor(this.rnd()*(this.HT-5));
      if(!this.barrier.has(key(x,y))) this.deco[y][x]=[39,42,43][Math.floor(this.rnd()*3)]; }
    // 채집 노드
    const mats=GATHER_MATS;
    let placed=0, tries=0;
    while(placed<28 && tries<400){ tries++;
      const x=2+Math.floor(this.rnd()*(this.WT-4)), y=3+Math.floor(this.rnd()*(this.HT-5));
      if(this.barrier.has(key(x,y))) continue;
      if(this.nodes.some(n=>n.x===x&&n.y===y)) continue;
      const mat=mats[Math.floor(this.rnd()*mats.length)];
      this.nodes.push({x,y,mat,taken:false,reSteps:-1}); placed++;
    }
    // 시작/출구: 맵 하단 가장자리의 '마을로 가는 길' 게이트 — 위험지대 한가운데가 아니라 변두리에서 시작
    const gateX=Math.floor(this.WT/2);
    this.gate ={ x:gateX, y:this.HT-1 };   // 이 줄(하단 가장자리)을 밟으면 마을(카페)로
    this.start={ x:gateX, y:this.HT-7 };   // 입장/부활 시작점 — 팻말보다 위쪽(게이트와 거리 둬 즉시 재진입 방지)
    // 게이트~시작점 광장 비우기(나무/벽 제거)
    for(let yy=this.HT-8; yy<=this.HT-1; yy++)
      for(let dx=-2; dx<=2; dx++){ const xx=gateX+dx;
        if(xx<1||xx>=this.WT-1) continue;
        this.barrier.delete(key(xx,yy));
        this.trees=this.trees.filter(t=>!(t.x===xx&&t.y===yy)); }
    // 광장에 걸친 채집 노드는 제거(겹침 방지)
    this.nodes=this.nodes.filter(n=>!(Math.abs(n.x-gateX)<=2 && n.y>=this.HT-8));
    // 팻말 세우기(통과 불가) — 게이트 옆
    this.sign={ x:gateX-2, y:this.HT-4 };
    this.barrier.add(key(this.sign.x,this.sign.y));
    // 상단 가장자리: 이웃 존으로 가는 포털(이웃 존이 있을 때만)
    const neighbor = zone.next || zone.prev;
    if(neighbor){
      const portalX=Math.floor(this.WT/2);
      this.portal={ x:portalX, y:0 };          // 윗줄을 밟으면 이웃 존으로
      this.portalTarget=neighbor;
      for(let yy=0; yy<=4; yy++) for(let dx=-2; dx<=2; dx++){ const xx=portalX+dx;
        if(xx<1||xx>=this.WT-1) continue; this.barrier.delete(key(xx,yy));
        this.trees=this.trees.filter(t=>!(t.x===xx&&t.y===yy)); }
      this.nodes=this.nodes.filter(n=>!(Math.abs(n.x-portalX)<=2 && n.y<=4));
      this.portalSign={ x:portalX-2, y:3 };
      this.barrier.add(key(this.portalSign.x,this.portalSign.y));
    } else { this.portal=null; this.portalSign=null; }
    // 나무는 정적이므로 y정렬을 1회만(렌더 루프의 매 프레임 sort 제거 — 저사양 GC/CPU 절감)
    this.trees.sort((a,b)=>a.y-b.y);
  },
  addTree(x,y){ const k=x+','+y; if(this.barrier.has(k))return; this.barrier.add(k);
    this.trees.push({x,y,type:this.rnd()<(1-(this._orangeRatio||0.3))?'green':'orange'}); },

  isBarrier(tx,ty){ if(tx<0||ty<0||tx>=this.WT||ty>=this.HT) return true; return this.barrier.has(tx+','+ty); },

  resize(){
    // 회전(세로기기) 상태면 가로로 돌린 영역 크기 사용
    const portrait = document.body.classList.contains('rot');
    const w = portrait ? window.innerHeight : window.innerWidth;
    const h = portrait ? window.innerWidth : window.innerHeight;
    this.dpr=Math.min(window.devicePixelRatio||1,2);
    this.cv.width=Math.floor(w*this.dpr); this.cv.height=Math.floor(h*this.dpr);
    this.cv.style.width=w+'px'; this.cv.style.height=h+'px';
    this.viewW=w; this.viewH=h;
    this.TS=Math.max(34, Math.round(Math.min(w/14, h/8)));   // 화면에 ~14x8 타일
  },

  // ----- 입력: 키보드 -----
  keys:{},
  onKey(e){ if(this.overlayOpen()) return; const m={ArrowUp:'u',ArrowDown:'d',ArrowLeft:'l',ArrowRight:'r',w:'u',s:'d',a:'l',d:'r'}; if(m[e.key]){this.keys[m[e.key]]=1;e.preventDefault();} if(e.key===' '||e.key==='Enter'){this.interact();e.preventDefault();} },
  onKeyUp(e){ const m={ArrowUp:'u',ArrowDown:'d',ArrowLeft:'l',ArrowRight:'r',w:'u',s:'d',a:'l',d:'r'}; if(m[e.key])this.keys[m[e.key]]=0; },

  // ----- 입력: 조이스틱 -----
  bindStick(){
    const zone=document.getElementById('stick-zone');
    const base=document.getElementById('stick-base'), knob=document.getElementById('stick-knob');
    const R=52;
    // 중앙 보정 31px(=(베이스118-노브56)/2). 떼면 정확히 중앙으로 복귀
    const setKnob=(dx,dy)=>{ knob.style.transform=`translate(${31+dx}px, ${-31+dy}px)`; };
    const reset=()=>{ this.stick.active=false; this.stick.dx=0; this.stick.dy=0; setKnob(0,0); };
    zone.addEventListener('pointerdown', e=>{ e.preventDefault();
      const b=base.getBoundingClientRect(); this.stick.active=true; this.stick.id=e.pointerId;
      this.stick.cx=b.left+b.width/2; this.stick.cy=b.top+b.height/2; move(e); zone.setPointerCapture(e.pointerId); });
    zone.addEventListener('pointermove', e=>{ if(this.stick.active&&e.pointerId===this.stick.id) move(e); });
    zone.addEventListener('pointerup',   e=>{ if(e.pointerId===this.stick.id) reset(); });
    zone.addEventListener('pointercancel', reset);
    const self=this;
    function move(e){ let dx=e.clientX-self.stick.cx, dy=e.clientY-self.stick.cy;
      // 콘텐츠가 90° 회전된 상태면 화면 델타를 게임 좌표로 역회전(화면→로컬)
      if(document.body.classList.contains('rot')){ const t=dx; dx=dy; dy=-t; }
      const d=Math.hypot(dx,dy)||1; if(d>R){ dx=dx/d*R; dy=dy/d*R; }
      self.stick.dx=dx/R; self.stick.dy=dy/R; setKnob(dx,dy); }
    reset();
  },

  interact(e){ if(e&&e.preventDefault)e.preventDefault(); if(window.Battle&&Battle.active) return;
    const ptx=Math.round(this.px), pty=Math.round(this.py);
    let best=null,bd=99;
    for(const n of this.nodes){ if(n.taken)continue; const d=Math.abs(n.x-ptx)+Math.abs(n.y-pty);
      if(d<=1 && d<bd){bd=d;best=n;} }
    if(best) this.collect(best); else this.toast('주변에 채집할 재료가 없어요 🍃');
  },

  collect(n){
    const mat=MATERIALS[n.mat];
    Explore.state.materials[n.mat]=(Explore.state.materials[n.mat]||0)+1;
    n.taken=true; n.reSteps=(Explore.state.steps||0)+40;
    Sfx.play('gather'); exHaptic('light');
    Explore.refreshHUD(); Explore.persist(); this.updateActionBtn();
    const w=this.pickWord();
    this.toast(`${mat.icon} <b>${mat.name}</b> +1<br><span class="en">${w.w}</span> · <span class="ko">${w.m}</span>`);
  },
  pickWord(){
    const due=(Explore.cafe.myWords||[]).filter(v=>(v.due||0)<=(Explore.cafe.turnCount||0));
    if(due.length) return due[Math.floor(this.rnd()*due.length)]; // 매번 첫 단어만 나오던 문제 수정
    const pool=window.wordData?[].concat(wordData.easy,wordData.normal,wordData.hard):[];
    return pool.length?pool[Math.floor(this.rnd()*pool.length)]:{w:'coffee',m:'커피'};
  },
  toast(html){ const el=document.getElementById('toast'); el.innerHTML=html; el.classList.add('show');
    clearTimeout(this._tt); this._tt=setTimeout(()=>el.classList.remove('show'),1600); },

  // ----- 이동/업데이트 -----
  // 오버레이(스탯/조합/스펠/동행/전투)가 떠 있으면 이동·인카운터 정지
  overlayOpen(){ return !!(document.querySelector('.ex-overlay.show') || (window.Battle&&Battle.active)); },
  update(){
    if(this.overlayOpen()){ this.moving=false; return; }
    let vx=this.stick.dx, vy=this.stick.dy;
    if(this.keys.l)vx-=1; if(this.keys.r)vx+=1; if(this.keys.u)vy-=1; if(this.keys.d)vy+=1;
    const mag=Math.hypot(vx,vy);
    this.moving = mag>0.18;   // 데드존 ↑(살짝 기울임은 무시)
    if(this.moving){
      this.walkT=(this.walkT||0)+0.28;   // 보행 위상(팔다리 스윙)
      vx/=Math.max(1,mag); vy/=Math.max(1,mag);
      if(Math.abs(vx)>0.2) this.facing=vx<0?-1:1;
      const SPD=0.058;   // 이동 속도 둔화(기존 0.085)
      const nx=this.px+vx*SPD, ny=this.py+vy*SPD;
      // 충돌: 발 위치 타일 검사
      if(!this.isBarrier(Math.round(nx), Math.round(this.py))) this.px=nx;
      if(!this.isBarrier(Math.round(this.px), Math.round(ny))) this.py=ny;
      this.onMove();
      // 하단 게이트(마을로 가는 길)에 닿으면 카페로 복귀
      if(this.gate && Math.round(this.py)>=this.gate.y && Math.abs(Math.round(this.px)-this.gate.x)<=2)
        this.leaveToVillage();
      // 상단 포털(이웃 존) — 재진입 스팸 방지를 위해 포털을 벗어났다 들어올 때만 발동
      if(this.portal){
        const atPortal = Math.round(this.py)<=this.portal.y && Math.abs(Math.round(this.px)-this.portal.x)<=2;
        if(atPortal && this._portalArmed!==false){ this._portalArmed=false; this.tryZonePortal(); }
        else if(!atPortal && Math.round(this.py) > this.portal.y+3) this._portalArmed=true;
      }
    }
  },
  // 마을(카페)로 복귀 — 다음 입장 때 게이트 시작점에서 시작
  leaveToVillage(){ if(this._leaving)return; this._leaving=true; this.moving=false;
    this.toast('🏘️ 마을로 돌아갑니다…');
    Explore.state.pos=null;
    setTimeout(()=>{ try{ Explore.exitToCafe(); }catch(e){ location.href='index.html'; } }, 450); },
  // 상단 포털: 이웃 존으로 이동(앞으로 갈 땐 레벨 잠금, 되돌아가는 건 자유)
  tryZonePortal(){
    const cur=ZONES[Explore.state.map.zone]||ZONES.forest;
    const targetId=this.portalTarget; const target=ZONES[targetId];
    if(!target) return;
    if(cur.next===targetId && (Explore.state.level||1) < target.minLv){
      this.toast(`🔒 ${target.name} — Lv ${target.minLv} 이상부터 입장`);
      this.py=Math.min(this.HT-2, this.py+1.5); // 살짝 되튕김
      return;
    }
    this.travelZone(targetId);
  },
  travelZone(zoneId){
    Explore.state.map.zone=zoneId;
    this.generate();
    this.px=this.start.x; this.py=this.start.y; // 도착은 해당 존 하단 시작점
    Explore.state.pos={x:this.px,y:this.py};
    this._portalArmed=true; this.updateZoneName(); this.updateActionBtn(); Explore.persist();
    const z=ZONES[zoneId]; this.toast(`${z.name}에 도착했어요!`);
  },
  updateZoneName(){ const el=document.getElementById('zone-name'); if(el){ const z=ZONES[Explore.state.map.zone]||ZONES.forest; el.textContent=z.name; } },
  _accum:0, _saveT:0,
  onMove(){
    this._accum += 0.085;
    if(this._accum>=1){ this._accum=0; Explore.state.steps=(Explore.state.steps||0)+1;
      // 채집 노드 재생
      for(const n of this.nodes){ if(n.taken && Explore.state.steps>=n.reSteps){ n.taken=false; } }
      // 랜덤 인카운터 (전투 다음 Stage서 구도 재설계)
      if(window.Battle) Battle.maybeEncounter();
    }
    this.updateActionBtn(); // 채집 버튼 강조 갱신
    // 주기적 위치 저장
    if((++this._saveT)%30===0){ Explore.state.pos={x:this.px,y:this.py}; Explore.persist(); }
  },
  // 채집 사거리(맨해튼 1칸) 안에 캘 노드가 있으면 버튼을 초록으로 강조
  updateActionBtn(){ const b=document.getElementById('act-btn'); if(!b)return;
    const ptx=Math.round(this.px), pty=Math.round(this.py);
    const near=(window.Battle&&Battle.active) ? false :
      this.nodes.some(n=>!n.taken && (Math.abs(n.x-ptx)+Math.abs(n.y-pty))<=1);
    b.classList.toggle('ready', near); },
  release(){ this.stick.active=false; this.stick.dx=0; this.stick.dy=0; this.keys={}; },

  // ----- 렌더 -----
  loop(){ this.raf=requestAnimationFrame(()=>this.loop()); this.update(); this.bob+=0.1; this.render(); },
  drawTile(idx,dx,dy,size){ if(idx<0)return; const sx=(idx%TT_COLS)*TT_SIZE, sy=Math.floor(idx/TT_COLS)*TT_SIZE;
    this.ctx.drawImage(this.sheet,sx,sy,TT_SIZE,TT_SIZE,dx,dy,size,size); },

  render(){
    const ctx=this.ctx, TS=this.TS, dpr=this.dpr; if(!TS) return;
    ctx.setTransform(dpr,0,0,dpr,0,0); ctx.imageSmoothingEnabled=false;
    ctx.fillStyle='#5fae49'; ctx.fillRect(0,0,this.viewW,this.viewH);
    if(!this.ready) return;
    // 카메라(월드픽셀=타일*TS), 플레이어 화면중앙 고정 + 월드 경계 클램프
    const halfW=this.viewW/2, halfH=this.viewH/2;
    let camX=this.px*TS - halfW + TS/2, camY=this.py*TS - halfH + TS/2;
    camX=Math.max(0,Math.min(camX, this.WT*TS - this.viewW));
    camY=Math.max(0,Math.min(camY, this.HT*TS - this.viewH));
    const x0=Math.max(0,Math.floor(camX/TS)-1), x1=Math.min(this.WT-1,Math.ceil((camX+this.viewW)/TS)+1);
    const y0=Math.max(0,Math.floor(camY/TS)-1), y1=Math.min(this.HT-1,Math.ceil((camY+this.viewH)/TS)+2);
    // 바닥 + 장식
    for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){ const dx=Math.round(x*TS-camX), dy=Math.round(y*TS-camY);
      this.drawTile(this.base[y][x],dx,dy,TS); if(this.deco[y][x]>=0) this.drawTile(this.deco[y][x],dx,dy,TS); }
    // 채집 노드(빛나는 링 + 스프라이트)
    for(const n of this.nodes){ if(n.taken)continue; if(n.x<x0||n.x>x1||n.y<y0||n.y>y1)continue;
      const dx=Math.round(n.x*TS-camX), dy=Math.round(n.y*TS-camY);
      ctx.save(); ctx.globalAlpha=0.35+0.25*Math.sin(this.bob*2); ctx.fillStyle='#fff59d';
      ctx.beginPath(); ctx.ellipse(dx+TS/2,dy+TS*0.78,TS*0.42,TS*0.2,0,0,7); ctx.fill(); ctx.restore();
      const mimg=MATERIALS[n.mat].img;
      if(Assets.ready(mimg)){ const s=TS*0.92; ctx.drawImage(Assets.imgs[mimg], dx+(TS-s)/2, dy+(TS-s)/2, s, s); } }
    // 나무(2칸: 본체+상단), y정렬
    const vis=this.trees.filter(t=>t.x>=x0-1&&t.x<=x1+1&&t.y>=y0-1&&t.y<=y1+1); // 이미 y정렬됨
    for(const t of vis){ const dx=Math.round(t.x*TS-camX), dy=Math.round(t.y*TS-camY);
      const top=t.type==='green'?4:3, bot=t.type==='green'?16:15;
      this.drawTile(bot,dx,dy,TS); this.drawTile(top,dx,dy-TS,TS); }
    // 팻말(마을로 가는 길)
    if(this.sign && this.sign.x>=x0-1 && this.sign.x<=x1+1 && this.sign.y>=y0-1 && this.sign.y<=y1+2){
      this.drawSign(Math.round(this.sign.x*TS-camX), Math.round(this.sign.y*TS-camY), TS); }
    // 포털 팻말(이웃 존)
    if(this.portalSign && this.portalSign.x>=x0-1 && this.portalSign.x<=x1+1 && this.portalSign.y>=y0-2 && this.portalSign.y<=y1+1){
      const tgt=ZONES[this.portalTarget]||{}, cur=ZONES[Explore.state.map.zone]||{};
      const locked = cur.next===this.portalTarget && (Explore.state.level||1) < (tgt.minLv||1);
      const label = locked ? `🔒 ${tgt.name||''} Lv${tgt.minLv}` : `${tgt.name||''} →`;
      this.drawSign(Math.round(this.portalSign.x*TS-camX), Math.round(this.portalSign.y*TS-camY), TS, label, '▲'); }
    // 존 분위기 틴트(밤 등) — 플레이어 직전에 깔아 캐릭터는 또렷하게
    const zt=(ZONES[Explore.state.map.zone]||{}).tint;
    if(zt){ ctx.fillStyle=zt; ctx.fillRect(0,0,this.viewW,this.viewH); }
    // 플레이어(중앙) — 현재 이모지(채용 캐릭터는 다음 Stage)
    const pcx=Math.round(this.px*TS-camX), pcy=Math.round(this.py*TS-camY);
    const ckey=Explore.state.companion||'none'; const pal=CHIBI[ckey]||CHIBI.none;
    this.drawChibi(pcx+TS/2, pcy+TS*1.02, pal, TS*0.95, this.walkT||0, !!this.moving, this.facing);
  },

  // 걷는 치비 캐릭터 (팔다리 스윙)
  drawChibi(cx, footY, pal, s, wp, moving, facing){
    const ctx=this.ctx;
    const rr=(x,y,w,h,r,col)=>{ ctx.fillStyle=col; ctx.beginPath();
      ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); ctx.fill(); };
    const skin=pal.skin, hair=pal.hair, shirt=pal.shirt, legs=pal.legs||'#4e342e';
    const lphase = moving ? Math.sin(wp) : 0;
    const bounce = moving ? Math.abs(Math.sin(wp))*s*0.08 : Math.sin(this.bob)*s*0.02;
    const fy = footY - bounce;
    // 그림자
    ctx.fillStyle='rgba(0,0,0,.22)'; ctx.beginPath(); ctx.ellipse(cx, footY, s*0.4, s*0.14, 0,0,7); ctx.fill();
    // 다리
    const legW=s*0.2, legH=s*0.3, legGap=s*0.13, legTopY=fy-legH;
    const llLift=Math.max(0,lphase)*s*0.13, rlLift=Math.max(0,-lphase)*s*0.13;
    rr(cx-legGap-legW/2, legTopY-llLift, legW, legH, legW*0.45, legs);
    rr(cx+legGap-legW/2, legTopY-rlLift, legW, legH, legW*0.45, legs);
    // 몸통
    const bodyW=s*0.6, bodyH=s*0.46, bodyY=legTopY-bodyH+s*0.04;
    rr(cx-bodyW/2, bodyY, bodyW, bodyH, s*0.18, shirt);
    if(pal.apron){ rr(cx-bodyW*0.3, bodyY+bodyH*0.16, bodyW*0.6, bodyH*0.9, s*0.1, '#efe2c4');
      ctx.fillStyle='#cfa84a'; ctx.beginPath(); ctx.arc(cx+bodyW*0.16, bodyY+bodyH*0.5, s*0.04,0,7); ctx.fill(); }
    // 긴 머리(뒤)
    const headR=s*0.42, headY=bodyY-headR*0.6;
    if(pal.longhair){ rr(cx-headR*0.92, headY-headR*0.1, headR*0.5, headR*1.7, headR*0.22, hair); rr(cx+headR*0.42, headY-headR*0.1, headR*0.5, headR*1.7, headR*0.22, hair); }
    // 팔(다리와 반대 위상)
    const armW=s*0.15, armH=s*0.32, armSwing=moving? lphase*s*0.1 : 0;
    rr(cx-bodyW/2-armW*0.45, bodyY+s*0.04 + armSwing, armW, armH, armW*0.5, skin);
    rr(cx+bodyW/2-armW*0.55, bodyY+s*0.04 - armSwing, armW, armH, armW*0.5, skin);
    // 머리
    ctx.fillStyle=skin; ctx.beginPath(); ctx.arc(cx, headY, headR,0,7); ctx.fill();
    // 머리카락(윗부분)
    ctx.fillStyle=hair; ctx.beginPath();
    ctx.arc(cx, headY, headR*1.01, Math.PI*0.98, Math.PI*2.02, false);
    ctx.quadraticCurveTo(cx+headR*0.5, headY+headR*0.28, cx, headY+headR*0.12);
    ctx.quadraticCurveTo(cx-headR*0.5, headY+headR*0.28, cx-headR*1.01, headY+headR*0.05);
    ctx.closePath(); ctx.fill();
    // 마녀모자(루나)
    if(pal.hat){ ctx.fillStyle='#4a2d6e';
      ctx.beginPath(); ctx.ellipse(cx, headY-headR*0.5, headR*1.05, headR*0.28,0,0,7); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx-headR*0.65, headY-headR*0.5); ctx.lineTo(cx+headR*0.18, headY-headR*1.85); ctx.lineTo(cx+headR*0.62, headY-headR*0.5); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#ffd54f'; ctx.beginPath(); ctx.arc(cx, headY-headR*0.5, headR*0.13,0,7); ctx.fill(); }
    // 바리스타 모자(기본)
    if(pal.toque){ ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.ellipse(cx, headY-headR*0.45, headR*0.62, headR*0.26,0,0,7); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx, headY-headR*0.72, headR*0.5, headR*0.38,0,0,7); ctx.fill(); }
    // 얼굴
    const fx=facing*headR*0.07;
    ctx.fillStyle='#3a2a1e';
    ctx.beginPath(); ctx.arc(cx-headR*0.26+fx, headY+headR*0.15, headR*0.085,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+headR*0.26+fx, headY+headR*0.15, headR*0.085,0,7); ctx.fill();
    ctx.fillStyle='rgba(255,150,150,.5)';
    ctx.beginPath(); ctx.arc(cx-headR*0.4+fx, headY+headR*0.3, headR*0.1,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+headR*0.4+fx, headY+headR*0.3, headR*0.1,0,7); ctx.fill();
    ctx.strokeStyle='#3a2a1e'; ctx.lineWidth=s*0.022; ctx.beginPath(); ctx.arc(cx+fx, headY+headR*0.26, headR*0.12, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
  },

  // 팻말: "마을로 가는 길" 표지판 (게이트 옆)
  drawSign(dx, dy, TS, label, arrow){
    label = label || '🏘️ 마을로 가는 길'; arrow = arrow || '▼';
    const ctx=this.ctx; ctx.save();
    const cx=dx+TS/2;
    // 기둥
    ctx.fillStyle='#6b4423';
    ctx.fillRect(cx-TS*0.07, dy+TS*0.30, TS*0.14, TS*0.78);
    // 판자
    const bw=TS*2.45, bh=TS*0.62, bx=cx-bw/2, by=dy+TS*0.02, r=TS*0.12;
    ctx.fillStyle='#b07a40'; ctx.strokeStyle='#5e3a1c'; ctx.lineWidth=Math.max(2,TS*0.05);
    ctx.beginPath();
    ctx.moveTo(bx+r,by); ctx.arcTo(bx+bw,by,bx+bw,by+bh,r); ctx.arcTo(bx+bw,by+bh,bx,by+bh,r);
    ctx.arcTo(bx,by+bh,bx,by,r); ctx.arcTo(bx,by,bx+bw,by,r); ctx.closePath();
    ctx.fill(); ctx.stroke();
    // 나뭇결 라인
    ctx.strokeStyle='rgba(94,58,28,.35)'; ctx.lineWidth=Math.max(1,TS*0.02);
    ctx.beginPath(); ctx.moveTo(bx+r, by+bh*0.32); ctx.lineTo(bx+bw-r, by+bh*0.32);
    ctx.moveTo(bx+r, by+bh*0.68); ctx.lineTo(bx+bw-r, by+bh*0.68); ctx.stroke();
    // 글자
    ctx.fillStyle='#fff3df'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='bold '+Math.round(TS*0.27)+'px "Jua","Nunito",sans-serif';
    ctx.fillText(label, cx, by+bh*0.5);
    // 방향 화살표
    ctx.fillStyle='#ffd54f'; ctx.font='bold '+Math.round(TS*0.42)+'px sans-serif';
    ctx.fillText(arrow, cx, arrow==='▲'? dy-TS*0.18 : dy+TS*1.0);
    ctx.restore();
  },

  // 동행 순환 선택
  updateCompChip(){
    const c=COMPANIONS[Explore.state.companion||'none'];
    const el=document.getElementById('comp-chip');
    if(el) el.textContent='동행 '+(c.img? c.name : '🧑‍🍳');
  },
  // ----- 동행 선택 화면 -----
  openCompanionSelect(){ this.renderCompCards(); document.getElementById('comp-select').classList.add('show'); },
  closeCompanionSelect(){ document.getElementById('comp-select').classList.remove('show'); },
  renderCompCards(){
    const grid=document.getElementById('cs-grid'); grid.innerHTML='';
    const cur=Explore.state.companion||'none';
    COMP_ORDER.forEach(key=>{
      const c=COMPANIONS[key]; const recruited=Explore.isRecruited(key);
      const sk=(typeof SKILLS!=='undefined'&&SKILLS[key])||null;
      const art = c.img ? `<img src="${c.img}" alt="${c.name}">` : `<span class="emoji">${c.emoji}</span>`;
      let html='';
      if(recruited){
        html = `<div class="cs-art">${art}</div><div class="cs-name">${c.name}</div>`
             + `<div class="cs-skill">${sk?sk.icon+' '+sk.name:''}</div>`;
        if(key===cur) html += `<div class="cs-selbadge">선택중</div>`;
      } else {
        html = `<div class="cs-art"><span class="emoji">❓</span></div><div class="cs-name">???</div><div class="cs-skill"></div>`
             + `<div class="cs-lockov"><span class="lk">🔒</span>카페에서 ${c.name} 손님을<br>만나면 해제</div>`;
      }
      const card=document.createElement('div');
      card.className='cs-card'+(key===cur&&recruited?' selected':'')+(recruited?'':' locked');
      card.innerHTML=html;
      if(recruited) card.onclick=()=>World.selectCompanion(key);
      grid.appendChild(card);
    });
  },
  selectCompanion(key){ if(!Explore.isRecruited(key)) return;
    Explore.state.companion=key; Explore.persist(); this.updateCompChip();
    if(window.Battle && Battle.setSelfSprite) Battle.setSelfSprite();
    this.closeCompanionSelect();
  },
  // ----- 스탯 & 장비(대장간) -----
  openStats(){ this.renderStats(); document.getElementById('stats-screen').classList.add('show'); },
  closeStats(){ document.getElementById('stats-screen').classList.remove('show'); },
  costText(cost){ if(!cost)return''; const p=[]; if(cost.gold)p.push('🪙'+cost.gold);
    for(const k in cost){ if(k==='gold')continue; p.push((MAT_ICON[k]||k)+cost[k]); } return p.join('  '); },
  canAfford(cost){ if(!cost)return true; if((cost.gold||0)>Explore.cafe.wallet)return false;
    for(const k in cost){ if(k==='gold')continue; if((cost[k]||0)>(Explore.state.materials[k]||0))return false; } return true; },
  forgeItem(slot,id){ const it=(EQUIP_DB[slot]||[]).find(x=>x.id===id); if(!it||!this.canAfford(it.cost))return;
    Explore.cafe.wallet-=(it.cost.gold||0);
    for(const k in it.cost){ if(k==='gold')continue; Explore.state.materials[k]=(Explore.state.materials[k]||0)-it.cost[k]; }
    if(!Explore.state.items)Explore.state.items=[]; Explore.state.items.push(id);
    Explore.state.equip[slot]=id;  // 제작 즉시 장착
    Explore.persist(); Explore.refreshHUD(); this.renderStats(); },
  equipItem(slot,id){ Explore.state.equip[slot]=id; Explore.persist(); Explore.refreshHUD(); this.renderStats(); },
  // ----- 조합소 -----
  openCraft(){ this.renderCraft(); document.getElementById('craft-screen').classList.add('show'); },
  closeCraft(){ document.getElementById('craft-screen').classList.remove('show'); },
  renderCraft(){ const owned=Explore.cafe.craftedItems||{}; let h='<div class="eq-grid">';
    CRAFT_DB.forEach(r=>{ const can=this.canAfford(r.cost); const have=owned[r.id]||0;
      h+=`<div class="eq-card"><span class="eq-ic">${r.icon}</span><div class="eq-info">`
        +`<div class="nm">${r.name}${have?` <small style="color:#7a5a2a">보유 x${have}</small>`:''}</div>`
        +`<div class="bn">${r.edesc}</div><div class="ct">${this.costText(r.cost)}</div></div>`
        +`<button class="eq-btn buy" ${can?'':'disabled'} onclick="World.startCraft('${r.id}')">조합</button></div>`; });
    document.getElementById('craft-body').innerHTML=h+'</div>'; },
  startCraft(id){ const r=CRAFT_DB.find(x=>x.id===id); if(!r||!this.canAfford(r.cost)) return; SpellQuiz.open(r); },
  completeCraft(r){ for(const k in r.cost){ Explore.state.materials[k]=(Explore.state.materials[k]||0)-r.cost[k]; }
    if(!Explore.cafe.craftedItems) Explore.cafe.craftedItems={};
    Explore.cafe.craftedItems[r.id]=(Explore.cafe.craftedItems[r.id]||0)+1;
    Explore.persist(); Explore.refreshHUD(); this.renderCraft();
    this.toast(`${r.icon} <b>${r.name}</b> 조합 성공! 🎒 가방에 보관`); },
  renderStats(){
    const s=Explore.state; const eff=Explore.effStats(); const b=eff.bonus;
    const need=expNeed(s.level); const expPct=Math.min(100,(s.exp/need)*100);
    const pass=COMP_PASSIVE[s.companion||'none']; const owned=s.items||[];
    const plus=v=> v>0?` <small>(+${v})</small>`:'';
    let h='';
    h+=`<div class="st-row"><div class="st-chip">⭐ Lv ${s.level}</div>`
      +`<div class="st-chip">❤️ ${eff.maxHp}${plus(b.maxHp)}</div>`
      +`<div class="st-chip">⚔️ ${eff.atk}${plus(b.atk)}</div>`
      +`<div class="st-chip">🛡️ ${eff.def}${plus(b.def)}</div></div>`;
    h+=`<div class="st-exp"><div style="width:${expPct}%"></div></div><div class="st-expt">EXP ${s.exp} / ${need}</div>`;
    h+=`<div class="st-pass">🤝 동행 패시브: ${pass?pass.label:'없음'}</div>`;
    const forge=(slot,list)=>{ let g='<div class="eq-grid">';
      list.forEach(it=>{ const isEq=s.equip[slot]===it.id; const isOwned=owned.includes(it.id);
        const bn=(it.atk?`⚔️+${it.atk} `:'')+(it.def?`🛡️+${it.def} `:'')+(it.hp?`❤️+${it.hp}`:'');
        let btn;
        if(isEq) btn='<button class="eq-btn on" disabled>장착중</button>';
        else if(isOwned) btn=`<button class="eq-btn equip" onclick="World.equipItem('${slot}','${it.id}')">장착</button>`;
        else btn=`<button class="eq-btn buy" ${this.canAfford(it.cost)?'':'disabled'} onclick="World.forgeItem('${slot}','${it.id}')">제작</button>`;
        g+=`<div class="eq-card${isEq?' equipped':''}"><span class="eq-ic">${it.icon}</span><div class="eq-info"><div class="nm">${it.name}</div><div class="bn">${bn}</div>${isOwned?'':`<div class="ct">${this.costText(it.cost)}</div>`}</div>${btn}</div>`;
      }); return g+'</div>'; };
    h+=`<div class="st-sec">🗡️ 무기</div>`+forge('weapon',EQUIP_DB.weapon);
    h+=`<div class="st-sec">🛡️ 방어구</div>`+forge('armor',EQUIP_DB.armor);
    document.getElementById('stats-body').innerHTML=h;
  },
};

// 몬스터 도감(id로 조회) — 존이 이 id들을 참조
const MONSTERS = {
  slime:      { id:'slime',      name:'원두 슬라임', emoji:'🫧', art:'monsters/slime.svg',      lv:3, hp:24, atk:7,  def:2,  exp:14, gold:12, drop:'bean'  },
  boar:       { id:'boar',       name:'들 멧돼지',   emoji:'🐗', art:'monsters/boar.svg',       lv:5, hp:34, atk:10, def:4,  exp:22, gold:20, drop:'berry' },
  crow:       { id:'crow',       name:'까마귀 떼',   emoji:'🐦‍⬛', art:'monsters/crow.svg',      lv:4, hp:18, atk:12, def:1,  exp:18, gold:16, drop:'bean'  },
  golem:      { id:'golem',      name:'로스팅 골렘', emoji:'🪨', art:'monsters/golem.svg',      lv:8, hp:80, atk:16, def:10, exp:60, gold:50, drop:'berry' },
  shadowwolf: { id:'shadowwolf', name:'그림자 늑대', emoji:'🐺', art:'monsters/shadowwolf.svg', lv:7, hp:42, atk:16, def:4,  exp:32, gold:26, drop:'berry' },
  wisp:       { id:'wisp',       name:'도깨비불',   emoji:'🔵', art:'monsters/wisp.svg',       lv:6, hp:28, atk:14, def:2,  exp:28, gold:24, drop:'bean'  },
};
// 존(지역) 레지스트리 — 이름/해제레벨/난이도/틴트/몬스터풀/보스/이웃
const ZONES = {
  forest:   { name:'🌲 원두 숲', minLv:1, diff:1.0,  tint:null,                     monsters:['slime','boar','crow'],      boss:'golem', next:'deepwood', treeOrange:0.3 },
  deepwood: { name:'🌑 깊은 숲', minLv:6, diff:1.4,  tint:'rgba(14,16,52,0.52)',    monsters:['shadowwolf','wisp','crow'], boss:'golem', prev:'forest',   treeOrange:0.7 },
};
// 동행별 고유 스킬 (게이지 가득 차면 사용)
const SKILLS = {
  none: { name:'에스프레소 샷', icon:'☕', mult:2.2, color:'#ff8a3d' },
  roa:  { name:'시그니처 일격', icon:'⚔️', mult:2.6, noMiss:true, alwaysCrit:true, color:'#ffd54f' },
  luna: { name:'달빛 세례',     icon:'🌙', mult:2.0, ignoreDef:true, color:'#b46bff' },
  sera: { name:'스타라이트 쇼', icon:'⭐', mult:1.8, heal:0.3, color:'#ff8fc4' },
};
function expNeed(level){ return Math.floor(40*Math.pow(level,1.6)); }

const Battle = {
  active:false, busy:false, enemy:null, eHp:0, eMax:0, lastStep:-99, gauge:0, GMAX:100, _canAct:false,
  _seed:777, _rand(){ this._seed=(this._seed*1103515245+12345)&0x7fffffff; return this._seed/0x7fffffff; },
  maybeEncounter(){ if(this.active)return; const s=Explore.state; if((s.steps-this.lastStep)<12)return;
    if(this._rand()<0.12){
      const zone=ZONES[s.map.zone]||ZONES.forest;
      const bossOk = (s.level >= (zone.minLv+3)) && this._rand()<0.12; // 충분히 강하면 가끔 보스
      this.start(bossOk?{boss:true}:{});
    } },
  // 몬스터를 플레이어 레벨에 맞춰 스케일(정체성=스탯비율 유지) — 신규 즉사·고렙 무의미화 방지
  scaleMonster(base, opts){
    opts = opts || {};
    const plv = Explore.state.level || 1;
    const z = (typeof ZONES!=='undefined') ? ZONES[Explore.state.map.zone] : null;
    const zoneMin = (z && z.minLv) || 1;        // 존 최소 레벨대
    const diff = ((z && z.diff) || 1) * (opts.boss ? 1.7 : 1); // 존 난이도 + 보스 가중
    let lv = Math.max(plv + Math.floor(this._rand()*4) - 1, zoneMin); // 플레이어±, 존 하한
    if(opts.boss) lv = Math.max(plv, zoneMin) + 2;                    // 보스는 약간 위
    if(lv < 1) lv = 1;
    const f = Math.pow(1.16, lv - (base.lv || lv)) * diff;
    return { ...base, lv, isBoss: !!opts.boss,
      name: opts.boss ? ('💀 ' + base.name) : base.name,
      hp:   Math.max(8, Math.round(base.hp  * f)),
      atk:  Math.max(2, Math.round(base.atk * f)),
      def:  Math.max(0, Math.round(base.def * f)),
      exp:  Math.max(4, Math.round(base.exp * f * (opts.boss?2:1))),
      gold: Math.max(4, Math.round(base.gold* f * (opts.boss?3:1))) };
  },
  start(opts){ opts = opts || {};
    const zone = ZONES[Explore.state.map.zone] || ZONES.forest;
    let base = opts.base;
    if(!base){ const ids = opts.boss ? [zone.boss] : zone.monsters;
      base = MONSTERS[ids[Math.floor(this._rand()*ids.length)]] || MONSTERS.slime; }
    const m = this.scaleMonster(base, opts);
    this.enemy=m; this.eMax=m.hp; this.eHp=m.hp; this.active=true; this.busy=false; this.lastStep=Explore.state.steps;
    this.atkBuff=1; this.dmgReduce=0; this.hideItems(); // 전투 아이템 버프는 전투마다 초기화
    World.release();
    const es=document.getElementById('e-sprite'); es.className='sprite-enemy'+(m.isBoss?' boss':'');
    if(m.art){ es.innerHTML='<img src="'+m.art+'">'; } else { es.classList.add('emoji'); es.textContent=m.emoji; }
    document.getElementById('e-name').textContent=m.name;
    document.getElementById('e-lv').textContent='Lv '+(m.lv||3);
    this.setSelfSprite(); this.setSkillLabel(); this.renderBars(); // 게이지는 전투 간 누적(리셋 안 함)
    // 전투 배경에 현재 존 테마 적용(숲/깊은숲 밤)
    const arena=document.getElementById('b-arena');
    arena.classList.remove('zone-forest','zone-deepwood'); arena.classList.add('zone-'+(Explore.state.map.zone||'forest'));
    const battle=document.getElementById('battle'); battle.classList.add('show','intro');
    void es.offsetWidth; es.classList.add('enter');
    this.setButtons(false);
    this.msg(m.isBoss ? `⚔️ <b>${m.name}</b> — 보스가 길을 막아섰다!` : `🐾 앗! 야생 <b>${m.name}</b>이(가) 나타났다!`);
    clearTimeout(this._introT);
    this._introT=setTimeout(()=>{ battle.classList.remove('intro'); es.classList.remove('enter'); this.msg('무엇을 할까?'); this.setButtons(true); }, 1400); },
  // 메시지/아레나 탭 → 등장 연출이나 현재 대기를 빨리 넘김
  skipTap(){ const battle=document.getElementById('battle');
    if(battle.classList.contains('intro')){ clearTimeout(this._introT); battle.classList.remove('intro');
      document.getElementById('e-sprite').classList.remove('enter'); this.msg('무엇을 할까?'); this.setButtons(true); return; }
    if(this._skip){ clearTimeout(this._skipT); const r=this._skip; this._skip=null; r(); } },
  setSelfSprite(){ const comp=COMPANIONS[Explore.state.companion||'none']; const ps=document.getElementById('p-self'); ps.className='sprite-self';
    const bi=comp&&(comp.battleImg||comp.img);
    // 이미지가 없거나 로드 실패하면 이모지로 폴백(기본 요리사 뒷모습 PNG 추가 전까지 안전)
    if(bi){ ps.innerHTML='<img src="'+bi+'" onerror="this.parentNode.classList.add(\'emoji\');this.parentNode.textContent=\'🧑‍🍳\'">'; }
    else { ps.classList.add('emoji'); ps.textContent='🧑‍🍳'; } },
  pStat(){ return Explore.effStats(); },
  renderBars(){ const p=this.pStat(); this.setBar('e',this.eHp,this.eMax); this.setBar('p',p.hp,p.maxHp);
    document.getElementById('e-hptext').textContent=Math.max(0,this.eHp)+'/'+this.eMax;
    document.getElementById('p-hptext').textContent=Math.max(0,p.hp)+'/'+p.maxHp;
    document.getElementById('p-name').textContent='나'; document.getElementById('p-lv').textContent='Lv '+Explore.state.level; },
  setBar(who,hp,max){ const f=document.getElementById(who+'-hpfill'); const pct=Math.max(0,Math.min(100,hp/max*100));
    f.style.width=pct+'%'; f.className='hpfill'+(pct<=25?' low':(pct<=50?' mid':'')); },
  calc(atk,def,mult){ let b=atk*mult-def*0.5; b*=0.85+this._rand()*0.3; const crit=this._rand()<0.12; if(crit)b*=1.6; return {dmg:Math.max(1,Math.round(b)),crit}; },
  setButtons(on){ this._canAct=on; document.getElementById('cmd-atk').disabled=!on; document.getElementById('cmd-flee').disabled=!on;
    const ib=document.getElementById('cmd-item'); if(ib) ib.disabled=!on; if(!on) this.hideItems(); this.refreshSkill(); },
  // ----- 전투 소비 아이템(공격력↑/방어력↑) — 같은 craftedItems 공유, 이번 전투 한정 버프 -----
  toggleItems(){ if(this.busy||!this.active)return; const m=document.getElementById('b-itemmenu');
    if(m.classList.contains('show')){ this.hideItems(); return; } this.renderItems(); m.classList.add('show'); },
  hideItems(){ const m=document.getElementById('b-itemmenu'); if(m) m.classList.remove('show'); },
  renderItems(){ const owned=Explore.cafe.craftedItems||{}; const list=CRAFT_DB.filter(r=>r.where==='battle'&&(owned[r.id]||0)>0);
    const m=document.getElementById('b-itemmenu');
    if(!list.length){ m.innerHTML='<div class="bi-empty">전투 아이템이 없어요.<br>조합소에서 ⚔️·🛡️ 아이템을 만들어보세요!</div>'; return; }
    m.innerHTML=list.map(r=>`<div class="bi-card"><span class="bi-ic">${r.icon}</span><div><div class="bi-nm">${r.name} <small style="color:#999">x${owned[r.id]}</small></div><div class="bi-bn">${r.edesc.replace(/^탐험:\s*/,'')}</div></div><button class="bi-use" onclick="Battle.useBattleItem('${r.id}')">사용</button></div>`).join(''); },
  useBattleItem(id){ if(this.busy||!this.active)return; const r=CRAFT_DB.find(x=>x.id===id); const owned=Explore.cafe.craftedItems||{};
    if(!r||!(owned[id]>0))return;
    owned[id]--; if(owned[id]<=0) delete owned[id]; Explore.cafe.craftedItems=owned; Explore.persist();
    if(r.effect==='atkup'){ this.atkBuff=1.5; this.msg(`⚔️ <b>${r.name}</b> 사용! 이번 전투 공격력 +50%`); }
    else if(r.effect==='defup'){ this.dmgReduce=0.5; this.msg(`🛡️ <b>${r.name}</b> 사용! 이번 전투 받는 피해 −50%`); }
    Sfx.play('correct'); exHaptic('success'); this.hideItems(); },
  refreshSkill(){ const sb=document.getElementById('cmd-skill'); if(!sb)return; const ready=this.gauge>=this.GMAX;
    const fill=document.getElementById('skill-fill'); if(fill) fill.style.height=Math.min(100,this.gauge/this.GMAX*100)+'%';
    sb.disabled=!(this._canAct&&ready); sb.classList.toggle('ready', ready&&!!this._canAct); },
  addGauge(n){ this.gauge=Math.min(this.GMAX,(this.gauge||0)+n); this.refreshSkill(); },
  setSkillLabel(){ const sk=SKILLS[Explore.state.companion||'none']||SKILLS.none; document.getElementById('skill-ic').textContent=sk.icon; document.getElementById('skill-lb').textContent=sk.name; },
  skillFlash(sk){ const f=document.getElementById('b-flash'); if(!f)return; f.style.background='radial-gradient(circle, '+(sk.color||'#fff')+'cc, transparent 72%)'; f.classList.remove('go'); void f.offsetWidth; f.classList.add('go'); },
  async useSkill(){ if(this.busy||!this.active||this.gauge<this.GMAX)return; this.busy=true; this.setButtons(false);
    const sk=SKILLS[Explore.state.companion||'none']||SKILLS.none; const p=this.pStat();
    const ps=document.getElementById('p-self'), es=document.getElementById('e-sprite');
    this.msg(`${sk.icon} <b>${sk.name}</b>!`); this.skillFlash(sk); ps.classList.add('lunge'); await this.wait(230);
    const def=sk.ignoreDef?0:this.enemy.def; let b=p.atk*sk.mult-def*0.5; b*=0.95+this._rand()*0.2;
    const crit=sk.alwaysCrit||this._rand()<0.2; if(crit)b*=1.6; const dmg=Math.max(1,Math.round(b));
    this.eHp-=dmg; es.classList.add('hit'); this.shake();
    Sfx.play(crit?'crit':'hit'); exHaptic('heavy');
    this.pop('e','-'+dmg+(crit?'!':''),crit?'crit':null);
    let m=`${sk.name}! ${this.enemy.name}에게 <b>${dmg}</b> 피해!${crit?' 치명타!':''}`;
    if(sk.heal){ const h=Math.round(p.maxHp*sk.heal); Explore.state.stats.hp=Math.min(p.maxHp,p.hp+h); m+=`<br>✨ 체력 ${h} 회복!`; Explore.refreshHUD(); }
    this.msg(m); this.renderBars(); await this.wait(750); es.classList.remove('hit'); ps.classList.remove('lunge');
    this.gauge=0; this.refreshSkill();
    if(this.eHp<=0) return this.win(); await this.enemyTurn(); },
  msg(h){ document.getElementById('b-msg').innerHTML=h; },
  shake(){ const a=document.getElementById('b-arena'); a.classList.remove('shake'); void a.offsetWidth; a.classList.add('shake'); setTimeout(()=>a.classList.remove('shake'),300); },
  pop(who,t,k){ const host=document.getElementById(who+'-pop'); const el=document.createElement('div'); el.className='dmg-pop'+(k?' '+k:''); el.textContent=t; el.style.left=(this._rand()*26)+'px'; host.appendChild(el); setTimeout(()=>el.remove(),1000); },
  wait(ms){ return new Promise(r=>{ this._skip=r; this._skipT=setTimeout(()=>{ this._skip=null; r(); }, ms); }); },
  async playerAttack(kind){ if(this.busy||!this.active)return; this.busy=true; this.setButtons(false);
    const p=this.pStat(); const power=kind==='power'; const miss=power?0.25:0.05;
    const ps=document.getElementById('p-self'), es=document.getElementById('e-sprite');
    ps.classList.add('lunge'); await this.wait(150);
    if(this._rand()<miss){ Sfx.play('miss'); this.pop('e','MISS','miss'); this.msg('공격이 빗나갔다…'); await this.wait(650); }
    else { const {dmg,crit}=this.calc(p.atk,this.enemy.def,(power?1.7:1.0)*(this.atkBuff||1)); this.eHp-=dmg;
      Sfx.play(crit?'crit':'hit'); exHaptic(crit?'heavy':'light');
      es.classList.add('hit'); this.shake(); this.pop('e','-'+dmg+(crit?'!':''),crit?'crit':null);
      this.msg(`${power?'강공격! ':''}${this.enemy.name}에게 <b>${dmg}</b> 피해!${crit?' 치명타!':''}`); this.renderBars(); await this.wait(550); es.classList.remove('hit'); }
    ps.classList.remove('lunge'); this.addGauge(22);
    if(this.eHp<=0) return this.win(); await this.enemyTurn(); },
  async enemyTurn(){ const ps=document.getElementById('p-self'), es=document.getElementById('e-sprite');
    es.classList.add('lunge'); await this.wait(180); const p=this.pStat();
    if(this._rand()<0.05){ this.pop('p','MISS','miss'); this.msg(`${this.enemy.name}의 공격이 빗나갔다!`); await this.wait(600); }
    else { let {dmg,crit}=this.calc(this.enemy.atk,p.def,1.0); dmg=Math.max(1,Math.round(dmg*(1-(this.dmgReduce||0)))); Explore.state.stats.hp=p.hp-dmg;
      Sfx.play('enemy'); exHaptic('heavy');
      ps.classList.add('hit'); this.shake(); this.pop('p','-'+dmg,crit?'crit':null);
      this.msg(`${this.enemy.name}의 공격! 나에게 <b>${dmg}</b> 피해!`); this.renderBars(); Explore.refreshHUD(); this.addGauge(16); await this.wait(600); ps.classList.remove('hit'); }
    es.classList.remove('lunge');
    if(Explore.state.stats.hp<=0) return this.lose(); this.busy=false; this.setButtons(true); },
  async win(){ const e=this.enemy; Sfx.play('win'); exHaptic('success'); document.getElementById('e-sprite').classList.add('dead'); this.msg(`${e.name}을(를) 쓰러뜨렸다!`); await this.wait(700);
    const gold=Math.round(e.gold*(1+Explore.effBonus().goldPct)); Explore.cafe.wallet+=gold; Explore.state.materials[e.drop]=(Explore.state.materials[e.drop]||0)+1;
    let txt=`승리! 🪙+${gold} · ${MATERIALS[e.drop].icon}${MATERIALS[e.drop].name}+1 · ⭐EXP+${e.exp}`; Explore.state.exp+=e.exp;
    // 황금 원두 희귀 드롭(보스 35% · 일반 12%) — 골든 블렌드 조합 재료
    if(this._rand() < (e.isBoss?0.35:0.12)){ Explore.state.materials.goldbean=(Explore.state.materials.goldbean||0)+1; txt+=`<br><span class="lvlup">🌟 황금 원두를 발견했다! (+1)</span>`; }
    const ups=[]; while(Explore.state.exp>=expNeed(Explore.state.level)){ Explore.state.exp-=expNeed(Explore.state.level); Explore.state.level++;
      const st=Explore.state.stats; st.maxHp+=8; st.atk+=3; st.def+=2; st.hp=st.maxHp; ups.push(Explore.state.level); }
    if(ups.length){ txt+=`<br><span class="lvlup">🎉 레벨 업! Lv ${ups[ups.length-1]} (HP·공·방 상승, 체력 회복)</span>`; setTimeout(()=>Sfx.play('levelup'),450); }
    this.msg(txt); this.renderBars(); Explore.refreshHUD(); Explore.persist(); this.setButtons(false);
    await this.wait(1500); this.close(); },   // 결과 잠깐 보여주고 자동으로 전투 종료(탭하면 즉시)
  async lose(){ this.msg('정신을 잃었다… 카페 근처에서 깨어났다. (체력 회복)'); Explore.state.stats.hp=Math.max(1,Math.round(Explore.state.stats.maxHp*0.5));
    // 마을 입구(시작점) 근처로 이동 — 쓰러진 자리에 그대로 두지 않음
    if(window.World && World.start){ World.px=World.start.x; World.py=World.start.y;
      Explore.state.pos={x:World.px,y:World.py}; if(World.updateActionBtn) World.updateActionBtn(); }
    this.lastStep=Explore.state.steps; // 부활 직후 즉시 재전투 방지
    await this.wait(900); this.renderBars(); Explore.refreshHUD(); Explore.persist(); this.setButtons(false);
    await this.wait(1500); this.close(); },
  async flee(){ if(this.busy||!this.active)return; this.busy=true; this.setButtons(false);
    if(this._rand()<0.55){ this.msg('무사히 도망쳤다!'); await this.wait(700); return this.close(); }
    this.msg('도망치지 못했다!'); await this.wait(700); await this.enemyTurn(); },
  close(){ this.active=false; this.busy=false; clearTimeout(this._introT);
    const battle=document.getElementById('battle'); battle.classList.remove('show','intro');
    document.getElementById('e-sprite').classList.remove('dead','hit','lunge','enter');
    document.getElementById('p-self').classList.remove('hit','lunge');
    const f=document.getElementById('cmd-flee'); f.textContent='🏃 도망'; f.onclick=()=>Battle.flee();
    Explore.refreshHUD(); Explore.persist(); },
};
// ============================================================
//  스펠링 조합 퀴즈 (조합 완성 관문 · SRS 오답노트 우선) — 단어 학습 핵심
// ============================================================
const SpellQuiz = {
  recipe:null, word:'', meaning:'', isReview:false, tiles:[], slots:[],
  open(recipe){ this.recipe=recipe; const w=this.pickWord();
    this.word=w.w.toLowerCase(); this.meaning=w.m||''; this.isReview=!!w._review;
    document.getElementById('sp-item').textContent=recipe.name;
    document.getElementById('sp-mean').textContent=this.meaning;
    this.build(); this.render(); this.msg('','');
    document.getElementById('spell-screen').classList.add('show'); },
  pickWord(){ const tc=Explore.cafe.turnCount||0;
    const due=(Explore.cafe.myWords||[]).filter(v=>v.w && /^[a-zA-Z]+$/.test(v.w) && v.w.length>=3 && v.w.length<=9 && (v.due||0)<=tc);
    if(due.length){ const w=due[Math.floor(Math.random()*due.length)]; return {...w,_review:true}; }
    const pool=window.wordData ? [].concat(wordData.easy,wordData.normal,wordData.hard).filter(o=>/^[a-zA-Z]+$/.test(o.w)&&o.w.length>=3&&o.w.length<=8) : [];
    const o=pool.length?pool[Math.floor(Math.random()*pool.length)]:{w:'coffee',m:'커피'}; return {...o,_review:false}; },
  build(){ const letters=this.word.split('');
    for(let i=letters.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [letters[i],letters[j]]=[letters[j],letters[i]]; }
    // 섞은 결과가 정답과 같으면 한 번 더
    if(letters.join('')===this.word && this.word.length>1){ [letters[0],letters[1]]=[letters[1],letters[0]]; }
    this.tiles=letters.map(ch=>({ch,used:false})); this.slots=this.word.split('').map(()=>null); },
  render(){
    const ts=document.getElementById('sp-tiles'); ts.innerHTML='';
    this.tiles.forEach((t,i)=>{ const b=document.createElement('button'); b.className='sp-tile'+(t.used?' used':''); b.textContent=t.ch.toUpperCase(); b.onclick=()=>this.place(i); ts.appendChild(b); });
    const ss=document.getElementById('sp-slots'); ss.innerHTML='';
    this.slots.forEach((ti,i)=>{ const d=document.createElement('div'); d.className='sp-slot'+(ti!==null?' filled':''); d.textContent=ti!==null?this.tiles[ti].ch.toUpperCase():''; if(ti!==null) d.onclick=()=>this.unset(i); ss.appendChild(d); }); },
  place(i){ if(this.tiles[i].used) return; const e=this.slots.indexOf(null); if(e<0) return; this.slots[e]=i; this.tiles[i].used=true; this.render(); },
  unset(i){ const ti=this.slots[i]; if(ti===null) return; this.tiles[ti].used=false; this.slots[i]=null; this.render(); },
  clear(){ this.tiles.forEach(t=>t.used=false); this.slots=this.slots.map(()=>null); this.render(); this.msg('',''); },
  msg(t,k){ const m=document.getElementById('sp-msg'); m.textContent=t; m.className='sp-msg'+(k?' '+k:''); },
  submit(){ if(this.slots.includes(null)){ this.msg('빈 칸을 모두 채워줘!','no'); return; }
    const ans=this.slots.map(ti=>this.tiles[ti].ch).join('');
    if(ans===this.word) this.onSuccess(); else this.onWrong(); },
  onWrong(){ Sfx.play('wrong'); exHaptic('heavy'); this.msg(`철자가 틀렸어! 다시 (${this.word.length}글자)`,'no');
    const p=document.getElementById('sp-panel'); p.classList.remove('shake'); void p.offsetWidth; p.classList.add('shake'); },
  onSuccess(){ Sfx.play('correct'); exHaptic('success'); this.msg(`✅ ${this.word.toUpperCase()} — 정답!`,'ok');
    if(this.isReview) Explore.srsCorrect(this.word);
    World.completeCraft(this.recipe);
    setTimeout(()=>this.close(), 850); },
  cancel(){ this.close(); },
  close(){ document.getElementById('spell-screen').classList.remove('show'); },
};
window.SpellQuiz=SpellQuiz;
window.Battle=Battle; window.World=World; window.Explore=Explore;

window.addEventListener('pagehide', ()=>{ try{ Explore.state.pos={x:World.px,y:World.py}; Explore.persist(); }catch(e){} });
window.addEventListener('DOMContentLoaded', ()=>Explore.init());
</script>
