<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Vocab Barista — 탐험</title>
<link rel="stylesheet" href="fonts.css">
<style>
  :root{ --gold:#ffb300; --brown:#5d4037; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body{ margin:0; padding:0; height:100%; overflow:hidden; }
  body{ font-family:'Jua','Nunito',system-ui,sans-serif; background:#1c2f1e; color:#fff8e1;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  #rotator{ position:fixed; top:0; left:0; width:100%; height:100%; }
  #game{ position:fixed; inset:0; }
  #map{ position:absolute; inset:0; width:100%; height:100%; display:block; image-rendering:pixelated; touch-action:none; }

  /* 상단 HUD */
  .topbar{ position:absolute; top:0; left:0; right:0; display:flex; align-items:center; gap:8px;
    padding:8px 12px; z-index:5; pointer-events:none; }
  .topbar > *{ pointer-events:auto; }
  .back-btn{ background:linear-gradient(180deg,#8d6e63,#5d4037); color:#fff8e1; border:none;
    border-radius:11px; padding:7px 12px; font-family:inherit; font-size:.9rem; box-shadow:0 3px 0 rgba(0,0,0,.4);
    display:inline-flex; align-items:center; gap:6px; }
  .back-btn svg{ width:16px; height:16px; display:block; flex:none; }
  .back-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,.4); }
  .hud-stats{ display:flex; gap:6px; margin-left:auto; font-size:.85rem; flex-wrap:wrap; justify-content:flex-end; }
  .hud-stats .chip{ background:rgba(0,0,0,.42); padding:4px 9px; border-radius:20px; white-space:nowrap; }
  .zone-name{ background:rgba(0,0,0,.42); padding:4px 10px; border-radius:20px; font-size:.82rem; color:var(--gold); }
  /* ===== 미니맵 ===== */
  #minimap-wrap{ position:absolute; top:54px; right:12px; z-index:4; text-align:center; cursor:pointer; }
  #minimap{ width:120px; height:85px; image-rendering:pixelated; image-rendering:crisp-edges; border:2px solid rgba(255,255,255,.55); border-radius:8px; background:#10121a; box-shadow:0 3px 8px rgba(0,0,0,.45); display:block; }
  .mm-badge{ margin-top:3px; font-size:.66rem; color:#fff; background:rgba(0,0,0,.55); border-radius:8px; padding:1px 8px; display:inline-block; font-family:'Jua',sans-serif; }
  .mm-badge.done{ background:#e0761f; }
  /* ===== 전체 지도 뷰 ===== */
  .mv-box{ background:linear-gradient(180deg,#fffdf7,#fff2d8); border:3px solid #caa26a; border-radius:20px; padding:16px; text-align:center; font-family:'Jua','Nunito',sans-serif; box-shadow:0 12px 30px rgba(0,0,0,.4); max-width:92vw; }
  .mv-title{ font-size:1.1rem; font-weight:bold; color:#5b3b1a; margin-bottom:10px; }
  .mv-done{ color:#e0761f; }
  .mv-canvas{ image-rendering:pixelated; border:2px solid #8a6a3a; border-radius:8px; background:#10121a; max-width:82vw; height:auto; }
  .mv-legend{ font-size:.72rem; color:#6b5334; margin:10px 0; }

  /* 토스트 */
  #toast{ position:absolute; top:48px; left:50%; transform:translateX(-50%); background:rgba(20,12,10,.92);
    border:2px solid var(--gold); border-radius:14px; padding:8px 15px; font-size:.98rem; z-index:6;
    opacity:0; transition:opacity .25s; pointer-events:none; text-align:center; max-width:80%; }
  #toast.show{ opacity:1; }
  #toast .en{ color:var(--gold); font-weight:bold; } #toast .ko{ color:#cde; opacity:.85; font-size:.85rem; }

  /* 조이스틱 (좌하단) */
  #stick-zone{ position:absolute; left:0; bottom:0; width:46%; height:62%; z-index:4; touch-action:none; }
  #stick-base{ position:absolute; left:28px; bottom:28px; width:118px; height:118px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.16), rgba(255,255,255,.06));
    border:3px solid rgba(255,255,255,.28); }
  #stick-knob{ position:absolute; left:28px; bottom:28px; width:56px; height:56px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.95), rgba(200,200,200,.8));
    box-shadow:0 3px 8px rgba(0,0,0,.4); transform:translate(31px,-31px); pointer-events:none; }

  /* 채집 버튼 (우하단) */
  /* 채집 버튼 — 깔끔한 프로스티드(반투명+블러) + 흰 아이콘 */
  .abtn{ position:absolute; right:26px; bottom:34px; width:82px; height:82px; border-radius:50%;
    border:2px solid rgba(255,255,255,.7); z-index:4; font-family:inherit; font-weight:bold; color:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
    background:rgba(255,255,255,.16); -webkit-backdrop-filter:blur(7px); backdrop-filter:blur(7px);
    box-shadow:0 4px 12px rgba(0,0,0,.28), inset 0 1px 2px rgba(255,255,255,.4);
    transition:transform .1s, background .2s, box-shadow .2s, border-color .2s; }
  .abtn .ab-ico{ display:flex; line-height:0; filter:drop-shadow(0 1px 2px rgba(0,0,0,.45)); }
  .abtn .ab-ico svg{ width:32px; height:32px; display:block; }
  .abtn .ab-tx{ font-size:.8rem; letter-spacing:1px; text-shadow:0 1px 3px rgba(0,0,0,.55); }
  .abtn:active{ transform:scale(.93); background:rgba(255,255,255,.28); }
  /* 채집 가능 범위 안 — 초록빛 링 강조 + 은은한 맥동 */
  .abtn.ready{ border-color:rgba(120,240,150,.95); background:rgba(90,220,130,.26);
    box-shadow:0 0 0 3px rgba(90,220,130,.3), 0 4px 16px rgba(40,180,90,.4), inset 0 1px 2px rgba(255,255,255,.4);
    animation:abReady 1.1s ease-in-out infinite; }
  @keyframes abReady{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.06); } }
  /* 회복 물약 버튼 (채집 버튼 위) */
  /* 회복 물약 버튼 — 채집과 동일한 프로스티드 스타일 */
  .hbtn{ position:absolute; right:37px; bottom:130px; width:58px; height:58px; border-radius:50%;
    border:2px solid rgba(255,255,255,.7); z-index:4; font-family:inherit; color:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(255,255,255,.16); -webkit-backdrop-filter:blur(7px); backdrop-filter:blur(7px);
    box-shadow:0 4px 12px rgba(0,0,0,.28), inset 0 1px 2px rgba(255,255,255,.4);
    transition:transform .1s, background .2s, filter .2s, opacity .2s; }
  .hbtn .hb-ico{ display:flex; line-height:0; filter:drop-shadow(0 1px 2px rgba(0,0,0,.45)); }
  .hbtn .hb-ico svg{ width:25px; height:25px; display:block; }
  .hbtn .hb-ct{ font-size:.68rem; font-weight:bold; line-height:1; margin-top:1px; text-shadow:0 1px 3px rgba(0,0,0,.55); }
  .hbtn:active{ transform:scale(.93); background:rgba(255,255,255,.28); }
  .hbtn.empty{ filter:grayscale(.5); opacity:.45; }

  /* 가로 회전 안내 (세로일 때) */
  #rotate{ position:fixed; inset:0; z-index:50; display:none; flex-direction:column; gap:14px;
    align-items:center; justify-content:center; background:#16261a; text-align:center; padding:30px; }
  #rotate.show{ display:flex; }
  #rotate .ph{ font-size:3.6rem; animation:rot 1.8s ease-in-out infinite; }
  @keyframes rot{ 0%,40%{transform:rotate(0)} 60%,100%{transform:rotate(-90deg)} }

  /* ===== 동행 선택 ===== */
  .ex-overlay{ position:fixed; inset:0; z-index:30; display:none; align-items:center; justify-content:center;
    background:rgba(20,12,10,.8); padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom); }
  .ex-overlay.show{ display:flex; }
  .cs-panel{ background:linear-gradient(180deg,#3a2620,#2b1a16); border:2px solid var(--gold); border-radius:18px;
    padding:14px 16px; width:100%; max-width:700px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.5); }
  .cs-title{ color:var(--gold); font-size:1.2rem; margin-bottom:12px; }
  .cs-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .cs-card{ position:relative; background:rgba(255,253,245,.96); border:2px solid #b9a87e; border-radius:14px;
    padding:8px 6px; cursor:pointer; transition:transform .1s; overflow:hidden; }
  .cs-card:active{ transform:scale(.97); }
  .cs-card.selected{ border-color:var(--gold); box-shadow:0 0 12px rgba(255,179,0,.7); }
  .cs-card.locked{ cursor:default; }
  .cs-art{ height:86px; display:flex; align-items:flex-end; justify-content:center; }
  .cs-art img{ height:96px; object-fit:contain; }
  .cs-art .emoji{ font-size:3.4rem; }
  .cs-name{ font-weight:bold; color:#3a2620; font-size:1rem; margin-top:5px; }
  .cs-skill{ font-size:.76rem; color:#7a5a2a; margin-top:2px; min-height:1.1em; }
  .cs-selbadge{ position:absolute; top:6px; right:6px; background:var(--gold); color:#3a2620; font-size:.7rem; padding:1px 8px; border-radius:10px; font-weight:bold; }
  .cs-lockov{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px;
    color:#fff; font-size:.76rem; line-height:1.3; background:rgba(20,12,10,.62); border-radius:12px; }
  .cs-lockov .lk{ font-size:1.7rem; line-height:1; }
  .cs-lockov .lk .uic{ width:1.7rem; height:1.7rem; vertical-align:0; }
  .cs-art .uic{ width:44%; height:auto; opacity:.75; }
  .cs-close{ margin-top:14px; background:linear-gradient(180deg,#cfd8dc,#90a4ae); border:none; border-radius:12px;
    padding:9px 32px; font-family:inherit; font-size:1rem; color:#28323a; box-shadow:0 3px 0 #546e7a; }
  .cs-close:active{ transform:translateY(2px); box-shadow:0 1px 0 #546e7a; }
  /* ===== 스탯 & 장비 ===== */
  /* UI 아이콘(SVG) — 이모지 대체. 글자와 같은 줄에 자연스럽게 붙도록 */
  .uic{ width:1.15em; height:1.15em; vertical-align:-0.22em; display:inline-block; flex:0 0 auto; }
  .mi{ width:1.15em; height:1.15em; vertical-align:-0.22em; display:inline-block; object-fit:contain; margin-right:1px; }
  .st-chip .uic{ width:1.05em; height:1.05em; margin-right:2px; }
  .cs-skill .uic{ width:1em; height:1em; vertical-align:-0.15em; margin-right:2px; }
  .st-eqimg{ width:1.5em; height:1.5em; object-fit:contain; vertical-align:-0.4em; margin-right:1px; }
  .st-row{ display:flex; gap:9px; justify-content:center; flex-wrap:wrap; margin:8px 0; }
  .st-chip{ background:rgba(255,253,245,.96); border-radius:12px; padding:7px 14px; color:#3a2620; font-weight:bold; font-size:.95rem; }
  .st-chip small{ color:#2e7d32; font-weight:bold; }
  .st-exp{ height:12px; background:#5a4632; border-radius:7px; overflow:hidden; max-width:320px; margin:5px auto 2px; }
  .st-exp > div{ height:100%; background:linear-gradient(90deg,#9ccc65,#43a047); transition:width .3s; }
  .st-expt{ font-size:.76rem; color:#cdbf9e; }
  .st-pass{ font-size:.9rem; color:#e8dcc4; margin:8px 0 2px; }
  .st-sec{ color:var(--gold); font-size:1rem; margin:13px 0 6px; text-align:left; padding-left:4px; }
  /* 조합소 보유 재료 스트립 */
  .cm-label{ color:#e8d8b0; font-size:.82rem; font-weight:bold; margin:2px 2px 6px; }
  .cm-wrap{ display:flex; flex-wrap:wrap; gap:7px; margin-bottom:14px; padding-bottom:12px; border-bottom:1px dashed #6a5640; }
  .cm-chip{ display:flex; align-items:center; gap:6px; background:rgba(255,253,245,.96); border:1.5px solid #b9a87e; border-radius:11px; padding:5px 10px 5px 6px; }
  .cm-chip .cm-ic{ width:24px; height:24px; object-fit:contain; }
  .cm-chip .cm-nm{ font-size:.8rem; color:#5a4326; font-weight:bold; }
  .cm-chip .cm-ct{ font-size:.82rem; font-weight:900; color:#2e7d32; min-width:16px; text-align:right; }
  .cm-chip.zero{ opacity:.42; filter:grayscale(.6); }
  .cm-chip.rare{ border-color:var(--gold); background:linear-gradient(180deg,#fff8e1,#ffeaa7); }
  .eq-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .eq-card{ background:rgba(255,253,245,.96); border:2px solid #b9a87e; border-radius:12px; padding:8px 10px; text-align:left; display:flex; align-items:center; gap:9px; }
  .eq-card.equipped{ border-color:var(--gold); box-shadow:0 0 9px rgba(255,179,0,.55); }
  .cr-ic{ width:38px; height:38px; object-fit:contain; display:block; filter:drop-shadow(0 1px 1px rgba(0,0,0,.25)); }
  .cr-ic.sm{ width:1.35em; height:1.35em; display:inline-block; vertical-align:-0.32em; margin-right:2px; }
  .eq-ic{ font-size:1.7rem; width:38px; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .eq-ic svg{ width:36px; height:36px; display:block; filter:drop-shadow(0 1px 1px rgba(0,0,0,.25)); }
  .eq-ic img{ width:40px; height:40px; object-fit:contain; display:block; filter:drop-shadow(0 1px 1px rgba(0,0,0,.28)); }
  .eq-info{ flex:1; min-width:0; } .eq-info .nm{ font-weight:bold; color:#3a2620; font-size:.92rem; }
  .eq-info .bn{ font-size:.76rem; color:#2e7d32; } .eq-info .ct{ font-size:.72rem; color:#b06a1e; }
  .eq-btn{ border:none; border-radius:10px; padding:8px 13px; font-family:inherit; font-weight:bold; font-size:.85rem; cursor:pointer; white-space:nowrap; }
  .eq-btn.buy{ background:linear-gradient(180deg,#ffe7a8,#ffc34d); box-shadow:0 3px 0 #a9740f; color:#5a3a10; }
  .eq-btn.equip{ background:linear-gradient(180deg,#a5d6a7,#66bb6a); box-shadow:0 3px 0 #2e7d32; color:#15351a; }
  .eq-btn.on{ background:#cfd8dc; color:#546e7a; box-shadow:none; }
  .eq-btn:disabled{ opacity:.45; box-shadow:none; }
  /* ===== 스펠링 조합 퀴즈 ===== */
  #sp-panel.shake{ animation:bshake .3s; }
  .sp-head{ color:var(--gold); font-size:1.12rem; margin-bottom:6px; }
  .sp-prompt{ color:#fff8e1; font-size:1.05rem; margin-bottom:14px; }
  .sp-prompt b{ color:#ffd54f; }
  .sp-slots{ display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-bottom:16px; min-height:50px; }
  .sp-slot{ width:40px; height:50px; border-radius:9px; background:rgba(255,255,255,.1); border:2px dashed rgba(255,255,255,.32);
    display:flex; align-items:center; justify-content:center; font-size:1.5rem; font-weight:bold; color:#fff; }
  .sp-slot.filled{ background:rgba(255,253,245,.96); border-style:solid; border-color:var(--gold); color:#3a2620; cursor:pointer; }
  .sp-tiles{ display:flex; gap:7px; justify-content:center; flex-wrap:wrap; margin-bottom:12px; min-height:52px; }
  .sp-tile{ width:42px; height:52px; border-radius:11px; background:linear-gradient(180deg,#ffe7a8,#ffc34d); box-shadow:0 4px 0 #a9740f;
    border:none; font-size:1.5rem; font-weight:bold; color:#5a3a10; cursor:pointer; font-family:inherit; }
  .sp-tile:active{ transform:translateY(2px); box-shadow:0 2px 0 #a9740f; }
  .sp-tile.used{ visibility:hidden; }
  .sp-msg{ min-height:1.5em; font-size:.96rem; margin-bottom:12px; color:#e8dcc4; }
  .sp-msg.ok{ color:#9ccc65; font-weight:bold; } .sp-msg.no{ color:#ef9a9a; }
  .sp-btns{ display:flex; gap:9px; justify-content:center; }
  .sp-act{ border:none; border-radius:12px; padding:10px 20px; font-family:inherit; font-size:1rem; font-weight:bold; cursor:pointer; }
  .sp-act.cancel{ background:linear-gradient(180deg,#cfd8dc,#90a4ae); color:#28323a; box-shadow:0 3px 0 #546e7a; }
  .sp-act.clear{ background:linear-gradient(180deg,#e0d2b0,#c9b48a); color:#4e342e; box-shadow:0 3px 0 #9c7d4a; }
  .sp-act.ok{ background:linear-gradient(180deg,#a5d6a7,#66bb6a); color:#15351a; box-shadow:0 3px 0 #2e7d32; }
  .sp-act:active{ transform:translateY(2px); }

  /* ===== 전투 (포켓몬식 가로 구도) ===== */
  #battle{ position:fixed; inset:0; z-index:20; display:none; flex-direction:column; }
  #battle.show{ display:flex; }
  .b-arena{ flex:1; position:relative; overflow:hidden;
    background:#cdeef0 url('scenes/forest.png') center/cover no-repeat; }  /* [에셋] 원두 숲 전투 배경 */
  .b-arena.shake{ animation:bshake .28s; }
  @keyframes bshake{ 0%,100%{transform:translate(0,0)} 25%{transform:translate(-6px,3px)} 50%{transform:translate(6px,-3px)} 75%{transform:translate(-4px,-2px)} }
  /* [에셋] 배경 이미지에 실제 나무·안개가 있으므로 CSS 나무/안개 레이어는 숨김 */
  .b-trees, .b-fog{ display:none; }
  /* 깊은 숲(밤) 전투 배경 */
  .b-arena.zone-deepwood{ background:#161a40 url('scenes/deepwood.png') center/cover no-repeat; }
  /* [수정] 접지 그림자/플랫폼 제거 — 배경 이미지에 지면이 있어 불필요 */
  .platform{ display:none; }
  .plat-enemy{ width:40%; height:13%; top:40%; right:7%; }
  .plat-self{ width:46%; height:15%; bottom:2%; left:1%; }
  /* ===== [트랙A] 저비용 전투 연출(juice) — 에셋 없이 CSS/JS만 ===== */
  /* 근경 파스텔 안개(깊이감) */
  .b-fog{ position:absolute; left:0; right:0; bottom:0; height:28%; pointer-events:none; z-index:3;
    background:radial-gradient(ellipse 62% 100% at 50% 125%, rgba(255,255,255,.22), transparent 72%); }
  .b-arena.zone-deepwood .b-fog{ background:radial-gradient(ellipse 62% 100% at 50% 125%, rgba(150,170,255,.14), transparent 72%); }
  /* 비네트(가장자리 어둡게 → 시선을 중앙 캐릭터로) + 존별 톤 */
  .b-vignette{ position:absolute; inset:0; pointer-events:none; z-index:4;
    background:radial-gradient(ellipse 80% 72% at 50% 46%, transparent 56%, rgba(0,0,0,.26) 100%); mix-blend-mode:multiply; }
  .b-arena.zone-deepwood .b-vignette{ background:radial-gradient(ellipse 82% 74% at 50% 46%, transparent 54%, rgba(8,6,26,.34) 100%); }
  /* 스프라이트는 안개·비네트 위(선명하게 도드라지게) */
  .sprite-enemy, .sprite-self{ z-index:5; }
  /* idle 미세 바운스 — 스프라이트 '이미지'에만 적용해 hit/lunge 컨테이너 트랜스폼과 충돌 없음 */
  @keyframes idleBob{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
  .sprite-enemy img{ animation:idleBob 3.2s ease-in-out infinite; }
  .sprite-self.has-img img{ animation:idleBob 3.8s ease-in-out infinite; }
  /* 타격 파티클 */
  .hit-particle{ position:absolute; width:9px; height:9px; border-radius:50%; background:#fff; pointer-events:none; z-index:9;
    box-shadow:0 0 6px 1px rgba(255,240,180,.9); animation:hpart .5s ease-out forwards; }
  .hit-particle.crit{ background:#ffd54f; width:12px; height:12px; box-shadow:0 0 8px 2px rgba(255,213,79,.95); }
  @keyframes hpart{ 0%{transform:translate(0,0) scale(1); opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(.3); opacity:0} }
  /* 임팩트 플래시(히트스탑 느낌) */
  .impact-flash{ position:absolute; inset:0; pointer-events:none; z-index:6; background:rgba(255,255,255,.5); animation:impflash .13s ease-out forwards; }
  @keyframes impflash{ 0%{opacity:.55} 100%{opacity:0} }
  .sprite-enemy{ position:absolute; top:24%; right:12%; width:33%; max-width:148px; filter:drop-shadow(0 8px 6px rgba(0,0,0,.4)); }
  .sprite-enemy img{ width:100%; height:auto; display:block; }
  .sprite-enemy.emoji{ font-size:4.6rem; text-align:center; }
  /* 보스: 더 크고 위협적인 붉은 오라 */
  .sprite-enemy.boss{ width:44%; max-width:200px; top:16%; right:9%; filter:drop-shadow(0 10px 8px rgba(0,0,0,.5)) drop-shadow(0 0 18px rgba(255,60,60,.7)); animation:bossPulse 1.6s ease-in-out infinite; }

    background:linear-gradient(180deg,rgba(186,104,255,.5),rgba(140,60,230,.8)); transition:height .35s ease; }

  @keyframes scRing{ 0%{transform:scale(0);opacity:1} 100%{transform:scale(9);opacity:0;border-width:1px} }
  .sc-drop{ left:68%; top:33%; width:11px; height:14px; margin:-7px; border-radius:50% 50% 50% 0; background:radial-gradient(circle at 35% 30%, #a86a3c, #4a2c15); animation:scDrop .6s ease-out forwards; animation-delay:var(--dl,0s); opacity:0; }

  @keyframes scSteam{ 0%{transform:scale(.3) translateY(0);opacity:.8} 100%{transform:scale(2.4) translateY(-40px);opacity:0} }
  /* 로아: 골든 슬래시 */
  .ss-flash{ inset:0; background:radial-gradient(circle at 66% 34%, rgba(255,236,150,.7), transparent 60%); animation:ssFlash .42s ease-out forwards; }

  @keyframes ssArc{ 0%{transform:rotate(var(--rot)) scale(0);opacity:0} 30%{opacity:1} 100%{transform:rotate(calc(var(--rot) + 65deg)) scale(1.5);opacity:0} }
  .ss-spark{ left:66%; top:34%; width:6px; height:6px; margin:-3px; border-radius:50%; background:#fff6c2; box-shadow:0 0 8px #ffd54f; animation:ssSpark .5s ease-out forwards; animation-delay:var(--dl,0s); opacity:0; }
  @keyframes ssSpark{ 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0} }

  @keyframes smMoon{ 0%{transform:scale(0) rotate(-40deg);opacity:0} 40%{opacity:1} 82%{transform:scale(1) rotate(0);opacity:1} 100%{transform:scale(1.06);opacity:0} }

  @keyframes smRing{ 0%{transform:rotate(0) scale(.4);opacity:0} 30%{opacity:1} 100%{transform:rotate(180deg) scale(1.4);opacity:0} }
  .sm-spark{ top:-4%; left:var(--lx,50%); width:var(--sz,7px); height:var(--sz,7px); border-radius:50%; background:#dcccff; box-shadow:0 0 8px #b98cff; animation:smFall 1s ease-in forwards; animation-delay:var(--dl,0s); opacity:0; }

  /* 세라: 스타라이트 쇼 */

<script>
// ============================================================
// Vocab Barista — 탐험 (가로 / 스크롤 맵 / 조이스틱 / 전투)
// ============================================================

// ===== 탐험 BGM =====
// 네이티브(AppDelegate)가 백그라운드 전환 직전에 호출 — 최상위 const라 window.ExploreBgm은 없다.
window.__vbReleaseAudio = function(){ try{ ExploreBgm.hardStop(); }catch(e){} };
const ExploreBgm = {
  // ★ Web Audio API 기반(index.html의 BgMusic과 같은 이유·같은 방식).
  // <audio>는 iOS 잠금화면 Now Playing에 등록돼 앱을 꺼도 남는다. AudioContext는 안 남는다.
  _tracks: {
    map:    'bgm/explore.mp3',
    battle: 'bgm/battle.mp3',
    boss:   'bgm/boss.mp3',
    craft:  'bgm/craft.mp3',
  },
  isMuted: false,
  _current: null,
  _ctx: null, _buf: {}, _lru: [], _MAXBUF: 3,
  _src: null, _gain: null, _playToken: 0, _released: false,

  _ac() {
    if(!this._ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) return null;
      this._ctx = new AC();
    }
    return this._ctx;
  },
  _touch(k){ const i=this._lru.indexOf(k); if(i>=0) this._lru.splice(i,1); this._lru.push(k); },
  _put(k,buf){
    this._buf[k]=buf; this._touch(k);
    while(this._lru.length > this._MAXBUF){
      const d=this._lru.shift();
      if(d !== this._current) delete this._buf[d]; else this._lru.push(d);
    }
  },
  _load(url,key){
    if(this._buf[key]){ this._touch(key); return Promise.resolve(this._buf[key]); }
    const ctx=this._ac(); if(!ctx) return Promise.reject(new Error('no AudioContext'));
    return fetch(url).then(r=>r.arrayBuffer()).then(ab=>new Promise((res,rej)=>{
      const p=ctx.decodeAudioData(ab,res,rej); if(p&&p.then) p.then(res).catch(rej);
    })).then(buf=>{ this._put(key,buf); return buf; });
  },
  _stopSrc(){
    if(this._src){ try{this._src.stop();}catch(e){} try{this._src.disconnect();}catch(e){} this._src=null; }
    if(this._gain){ try{this._gain.disconnect();}catch(e){} this._gain=null; }
  },

  init() {
    const saved = localStorage.getItem('vb_bgm_mute');
    this.isMuted = (saved === 'true');
    this._current = 'map';
    const self = this;
    if(!this.isMuted) this.play('map');
    // AudioContext는 사용자 제스처 후에만 소리가 난다
    const resumeOnInteraction = () => {
      const ctx = self._ac();
      if(ctx && ctx.state === 'suspended') ctx.resume().catch(()=>{});
      if(!self.isMuted && self._current && !self._src) self.play(self._current);
      document.removeEventListener('click', resumeOnInteraction, true);
      document.removeEventListener('touchstart', resumeOnInteraction, true);
    };
    document.addEventListener('click', resumeOnInteraction, true);
    document.addEventListener('touchstart', resumeOnInteraction, true);
    document.addEventListener('visibilitychange', () => {
      if(document.hidden) self.hardStop(); else self.restore();
    });
    window.addEventListener('pagehide', () => self.hardStop());
    try {
      const App = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App;
      if(App) App.addListener('appStateChange', st => { if(!st.isActive) self.hardStop(); else self.restore(); });
    } catch(e) {}
  },

  play(key) {
    if(!this._tracks[key]) return;
    if(this._current === key && this._src) return;
    this._current = key;
    if(this.isMuted) return;
    const ctx = this._ac(); if(!ctx) return;
    if(ctx.state === 'suspended') ctx.resume().catch(()=>{});
    const token = ++this._playToken;
    this._load(this._tracks[key], key).then(buf => {
      if(token !== this._playToken || this.isMuted) return;
      this._stopSrc();
      const src = ctx.createBufferSource();
      src.buffer = buf; src.loop = true;
      const g = ctx.createGain(); g.gain.value = 0.35;
      src.connect(g); g.connect(ctx.destination);
      try { src.start(0); } catch(e) {}
      this._src = src; this._gain = g;
    }).catch(()=>{});
  },

  // 백그라운드: 소리를 끊고 컨텍스트를 재운다(붙들 미디어 리소스가 없다)
  hardStop() {
    this._stopSrc();
    const ctx = this._ctx;
    if(ctx && ctx.state === 'running'){ try{ ctx.suspend(); }catch(e){} }
    this._released = true;
  },
  restore() {
    if(!this._released) return;
    this._released = false;
    const ctx = this._ctx;
    if(ctx && ctx.state === 'suspended') ctx.resume().catch(()=>{});
    if(!this.isMuted && this._current) this.play(this._current);
  },

  stop() { this._stopSrc(); },
};

const CAFE_KEY='vb_save_v7', EXPLORE_KEY='vb_explore_v1';

const SaveBridge = {
  loadCafe(){ try{ return JSON.parse(localStorage.getItem(CAFE_KEY))||{}; }catch(e){ return {}; } },
  patchCafe(p){ let c={}; try{ c=JSON.parse(localStorage.getItem(CAFE_KEY))||{}; }catch(e){} Object.assign(c,p); localStorage.setItem(CAFE_KEY,JSON.stringify(c)); },
  loadExplore(){ let ex={}; try{ ex=JSON.parse(localStorage.getItem(EXPLORE_KEY))||{}; }catch(e){}
    return { level:ex.level||1, exp:ex.exp||0,
      stats:Object.assign({maxHp:30,hp:30,atk:8,def:4},ex.stats||{}),
      equip:Object.assign({weapon:null,armor:null},ex.equip||{}),
      materials:ex.materials||{}, items:ex.items||[], companion:ex.companion||'none',
      map:ex.map||{zone:'forest'}, pos:ex.pos||null, steps:ex.steps||0,
      quests:ex.quests||{}, questN:ex.questN||{}, events:ex.events||{}, explored:ex.explored||{}, maps:ex.maps||{} }; },
  saveExplore(s){ localStorage.setItem(EXPLORE_KEY,JSON.stringify(s)); },
};

// 효과음 + 햅틱 (카페의 음소거 설정 공유) — 탐험이 무음이던 문제 보완
const Sfx = {
  ctx:null, muted:false,
  init(){ try{ this.muted = !!SaveBridge.loadCafe().isMuted; }catch(e){} },
  _ac(){ if(!this.ctx){ try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } }
    if(this.ctx.state==='suspended') this.ctx.resume(); return this.ctx; },
  tone(freq, dur, type, vol){ if(this.muted) return; const ac=this._ac(); if(!ac) return;
    const o=ac.createOscillator(), g=ac.createGain(); o.connect(g); g.connect(ac.destination);
    const now=ac.currentTime; o.type=type||'sine'; o.frequency.setValueAtTime(freq, now);
    g.gain.setValueAtTime(vol||0.18, now); g.gain.exponentialRampToValueAtTime(0.0001, now+(dur||0.15));
    o.start(now); o.stop(now+(dur||0.15)); },
  play(kind){
    switch(kind){
      case 'gather': this.tone(660,0.1,'sine',0.16); setTimeout(()=>this.tone(990,0.12,'sine',0.16),70); break;
      case 'hit':    this.tone(180,0.1,'square',0.14); break;
      case 'crit':   this.tone(140,0.16,'sawtooth',0.2); setTimeout(()=>this.tone(280,0.12,'square',0.16),60); break;
      case 'miss':   this.tone(200,0.12,'sine',0.1); break;
      case 'enemy':  this.tone(120,0.12,'sawtooth',0.13); break;
      case 'win':    [523,659,784,1046].forEach((f,i)=>setTimeout(()=>this.tone(f,0.16,'sine',0.18),i*90)); break;
      case 'levelup':[659,880,1318].forEach((f,i)=>setTimeout(()=>this.tone(f,0.18,'triangle',0.18),i*100)); break;
      case 'correct':this.tone(523,0.1,'sine',0.16); setTimeout(()=>this.tone(1046,0.14,'sine',0.16),90); break;
      case 'wrong':  this.tone(160,0.22,'sawtooth',0.16); break;
    }
  }
};
function exHaptic(kind){
  try { const H=window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.Haptics;
    if(H){ if(kind==='success')H.notification({type:'SUCCESS'}); else if(kind==='heavy')H.impact({style:'HEAVY'}); else H.impact({style:'LIGHT'}); return; } } catch(e){}
  if(navigator.vibrate) navigator.vibrate(kind==='heavy'?60:kind==='success'?[30,40,30]:15);
}

const Explore = {
  cafe:null, state:null,
  init(){
    const c=SaveBridge.loadCafe();
    this.cafe={ wallet:c.wallet||0, myWords:Array.isArray(c.myWords)?c.myWords:[], turnCount:c.turnCount||0,
                collectedChars:Array.isArray(c.collectedChars)?c.collectedChars:[],
                craftedItems:(c.craftedItems&&typeof c.craftedItems==='object')?c.craftedItems:{},
                // ★ 동행 채용 판정(isRecruited)이 호감도를 본다 — 이걸 빠뜨려 호감도 MAX여도 항상 잠겨 있었다.
                affection:(c.affection&&typeof c.affection==='object')?c.affection:{} };
    this.state=SaveBridge.loadExplore();
    if(!this.isRecruited(this.state.companion)) this.state.companion='none';  // 미채용 동행은 기본으로
    Sfx.init();
    Assets.preloadAll();
    this.refreshHUD();
    lockLandscape();
    World.init();
    World.updateCompChip();
  },
  persist(){ SaveBridge.patchCafe({ wallet:this.cafe.wallet, myWords:this.cafe.myWords, turnCount:this.cafe.turnCount, craftedItems:this.cafe.craftedItems }); SaveBridge.saveExplore(this.state); },
  // 스펠링 조합 정답 시 SRS 갱신(오답노트 단어면 박스↑, 졸업하면 제거)
  srsCorrect(word){ const arr=this.cafe.myWords||[]; const v=arr.find(x=>x.w&&x.w.toLowerCase()===word);
    if(v){ v.box=(v.box||1)+1; v.due=(this.cafe.turnCount||0)+(v.box*2); if(v.box>=5){ this.cafe.myWords=arr.filter(x=>x!==v); } this.persist(); } },
  // 채용 여부: 카페 손님 도감에 해당 메인 캐릭터가 등록(=만난 적 있음)되면 동행 가능
  // 동행 채용: 카페에서 그 메인 캐릭터 호감도를 MAX(100)까지 올려야 가능
  isRecruited(key){ if(!key||key==='none') return true; const c=COMPANIONS[key]; if(!(c&&c.charId)) return false;
    const aff=(this.cafe&&this.cafe.affection&&this.cafe.affection[c.charId])||0; return aff>=100; },
  // 장비+동행 패시브 보너스 합산
  effBonus(){ const b={maxHp:0,atk:0,def:0,goldPct:0}; const eq=this.state.equip||{};
    ['weapon','armor'].forEach(slot=>{ const it=(EQUIP_DB[slot]||[]).find(x=>x.id===eq[slot]); if(it){ b.atk+=it.atk||0; b.def+=it.def||0; b.maxHp+=it.hp||0; } });
    const p=COMP_PASSIVE[this.state.companion||'none']; if(p){ b.atk+=p.atk||0; b.def+=p.def||0; b.maxHp+=p.maxHp||0; b.goldPct+=p.goldPct||0; }
    return b; },
  effStats(){ const s=this.state.stats; const b=this.effBonus(); const maxHp=s.maxHp+b.maxHp;
    return { hp:Math.min(s.hp,maxHp), maxHp, atk:s.atk+b.atk, def:s.def+b.def, base:s, bonus:b }; },
  exitToCafe(){ this.persist(); try{ unlockOrientation(); }catch(e){}
    try{ localStorage.setItem('vb_resume_paused','1'); }catch(e){} // 카페 복귀 시 일시정지 화면으로
    location.href='index.html'; },
  refreshHUD(){
    const s=this.state,c=this.cafe;
    document.getElementById('hud-gold').textContent=c.wallet;
    document.getElementById('hud-level').textContent=s.level;
    const e=this.effStats(); document.getElementById('hud-hp').textContent=e.hp+'/'+e.maxHp;
    document.getElementById('hud-mats-n').textContent=Object.values(s.materials).reduce((n,v)=>n+(v||0),0);
    // 맵 회복 버튼: 보유 개수 / 비활성 상태 갱신
    const hr=CRAFT_DB.find(x=>x.effect==='heal'); const hn=hr?((c.craftedItems||{})[hr.id]||0):0;
    const hc=document.getElementById('heal-ct'), hb=document.getElementById('heal-btn');
    if(hc) hc.textContent=hn; if(hb) hb.classList.toggle('empty', hn<=0);
  },
  // 회복 물약 사용(맵 이동 중) — 전투 밖에서 체력 회복
  useHealItem(){
    const owned=this.cafe.craftedItems||{}; const r=CRAFT_DB.find(x=>x.effect==='heal');
    const e=this.effStats();
    if(e.hp>=e.maxHp){ if(window.World) World.toast(`이미 체력이 가득해요 ${UI_ICON.hp}`); return; }
    if(!r || !((owned[r.id]||0)>0)){ if(window.World) World.toast(`회복 물약이 없어요 ${UI_ICON.heal}<br><span class="ko">조합소에서 만들 수 있어요</span>`); return; }
    owned[r.id]--; if(owned[r.id]<=0) delete owned[r.id]; this.cafe.craftedItems=owned;
    const before=this.state.stats.hp;
    this.state.stats.hp=Math.min(e.maxHp, before+Math.round(e.maxHp*(r.healPct||0.4)));
    const g=this.state.stats.hp-before;
    this.persist(); this.refreshHUD();
    if(window.World) World.toast(`${UI_ICON.heal} <b>회복 물약</b> — 체력 <b>${g}</b> 회복`);
    if(window.Sfx) Sfx.play('gather'); if(window.exHaptic) exHaptic('success');
  },
  // 경험치 획득 + 레벨업(전투 win 로직과 동일 규칙) — 퀘스트·이벤트 보상용
  gainExp(n){ this.state.exp=(this.state.exp||0)+n; let ups=0;
    while(this.state.exp>=expNeed(this.state.level)){ this.state.exp-=expNeed(this.state.level); this.state.level++;
      const st=this.state.stats; st.maxHp+=8; st.atk+=3; st.def+=2; st.hp=st.maxHp; ups++; }
    return ups; },
  // 보상 지급(골드/경험치/아이템) 공용 — 퀘스트·어둠의상인
  grantReward(rw){ let parts=[];
    if(rw.gold){ this.cafe.wallet=(this.cafe.wallet||0)+rw.gold; parts.push(`${UI_ICON.coin}+${rw.gold}`); }
    if(rw.exp){ const up=this.gainExp(rw.exp); parts.push(`${UI_ICON.exp}EXP+${rw.exp}`); if(up) parts.push(`${UI_ICON.party}Lv ${this.state.level}!`); }
    if(rw.item){ if(!this.cafe.craftedItems) this.cafe.craftedItems={}; this.cafe.craftedItems[rw.item]=(this.cafe.craftedItems[rw.item]||0)+1;
      const ci=(CRAFT_DB.find(x=>x.id===rw.item)||{}); parts.push(`${ci.id?craftIcon(ci,'cr-ic sm'):''}${ci.name||'아이템'}+1`); }
    if(rw.mat){ this.state.materials[rw.mat]=(this.state.materials[rw.mat]||0)+(rw.matCount||1); const m=MATERIALS[rw.mat]||{}; parts.push(`${MAT_ICON[rw.mat]||''}${m.name||rw.mat}+${rw.matCount||1}`); }
    this.refreshHUD(); this.persist(); return parts.join(' · '); },
};

// ---------- 화면 방향 ----------
async function lockLandscape(){
  try{ const P=window.Capacitor&&window.Capacitor.Plugins; if(P&&P.ScreenOrientation) await P.ScreenOrientation.lock({orientation:'landscape'}); }catch(e){}
  try{ if(screen.orientation&&screen.orientation.lock) await screen.orientation.lock('landscape'); }catch(e){}
}
async function unlockOrientation(){
  try{ const P=window.Capacitor&&window.Capacitor.Plugins; if(P&&P.ScreenOrientation) await P.ScreenOrientation.lock({orientation:'portrait'}); }catch(e){}
  try{ if(screen.orientation&&screen.orientation.unlock) screen.orientation.unlock(); }catch(e){}
}
// 세로로 들고 있으면 콘텐츠를 90° 회전해 자동으로 가로 화면처럼(iOS 웹은 기기회전 강제 불가 → CSS 회전). 가로면 그대로.
function applyOrientation(){
  const rot = document.getElementById('rotator'); if(!rot) return;
  const portrait = window.innerHeight > window.innerWidth;
  if(portrait){
    document.body.classList.add('rot');
    rot.style.width  = window.innerHeight+'px';
    rot.style.height = window.innerWidth+'px';
    rot.style.transformOrigin = 'top left';
    rot.style.transform = 'rotate(90deg) translateY(-'+window.innerWidth+'px)';
  } else {
    document.body.classList.remove('rot');
    rot.style.width=''; rot.style.height=''; rot.style.transform=''; rot.style.transformOrigin='';
  }
  if(window.World && World.resize) World.resize();
}
function checkRotate(){ applyOrientation(); } // 하위호환

}

// 이모지는 기기마다 모양이 달라 아트와 따로 놀아서 실제 그림으로 교체.
function craftIcon(item, cls){
  if(!item || !item.id) return (item && item.icon) || '';
  // 에셋 우선, 실패 시 원래 이모지로 폴백(CRAFT_DB는 icon이 이모지)
  return `<img class="${cls||'cr-ic'}" src="sprites/${item.id}.png" alt=""
     onerror="this.replaceWith(document.createTextNode('${item.icon||''}'))">`;
}
